# yaml-language-server: $schema=schema.json
# Tests for the demo-floci example (migrated from demo-localstack to the Floci emulator).
# See examples/demo-floci/ for the example code.
#
# Note: most demo-floci commands (list/describe) eagerly authenticate against the Floci
# emulator on localhost:4566, which is only available in the CI workflow job. These tests
# cover what can be validated offline: that the example's stack manifests are well-formed.
tests:
  - name: demo-floci validate stacks
    enabled: true
    snapshot: false
    description: "Verify the demo-floci example's stack manifests are valid (offline; no emulator required)."
    workdir: "../examples/demo-floci"
    command: "atmos"
    args:
      - "validate"
      - "stacks"
    expect:
      exit_code: 0
      stderr:
        - "validated successfully"
