# yaml-language-server: $schema=schema.json

# Tests for provenance output.
# These tests capture the expected provenance output format from the initial release.
# Regression: Current output is missing the vars section and has incorrect line numbers.

tests:
  - name: describe component provenance basic
    enabled: true
    snapshot: true
    description: "Test provenance output with YAML format (default)"
    workdir: "fixtures/scenarios/provenance"
    command: "atmos"
    args:
      - "describe"
      - "component"
      - "mock"
      - "-s"
      - "acme-dev-us-east-1"
      - "--provenance"
    expect:
      exit_code: 0
      stdout:
        - "# Provenance Legend:"
        - "● \\[1\\]"  # Defined in parent stack (escaped for regex)
        - "○ \\[2\\]"  # Inherited from depth 2 (escaped for regex)
        - "○ \\[3\\]"  # Inherited from depth 3 (escaped for regex)
        - "vars:"  # Should have vars section with provenance
        - "enabled: true"
        - "region: us-east-1"

  - name: describe component provenance advanced
    enabled: true
    snapshot: true
    # Repointed off quick-start-advanced (its components now use runtime YAML functions
    # that require a live emulator). The provenance fixture merges the `mock` component's
    # `tags` across four import depths, so it exercises the same "complex multi-level
    # imports" provenance path while resolving fully offline.
    description: "Test provenance output with complex multi-level imports (tag merge across depths)"
    workdir: "fixtures/scenarios/provenance"
    command: "atmos"
    args:
      - "describe"
      - "component"
      - "mock"
      - "-s"
      - "acme-dev-us-east-1"
      - "--provenance"
    expect:
      exit_code: 0
      stdout:
        - "# Provenance Legend:"
        - "● \\[1\\]"  # Defined in parent stack
        - "○ \\[2\\]"  # Inherited from depth 2
        - "vars:"  # Should have vars section
        - "enabled: true"
        - "tags:"  # Tags are merged from multiple import depths
        - "managed_by:"  # Originates at the deepest catalog default
