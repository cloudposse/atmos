# yaml-language-server: $schema=schema.json
# Tests for the native Helm example in examples/helm.
tests:
  - name: atmos_helm_example_test
    short: false
    enabled: true
    snapshot: false
    description: "Deploy the repository-backed native Helm example chart to the k3s emulator and verify resources."
    workdir: "../examples/helm"
    env:
      ATMOS_EXPERIMENTAL: "silent"
    command: "atmos"
    args:
      - "test"
    skip:
      # The K3s emulator needs a privileged-capable container runtime. The current
      # hosted Windows acceptance runner does not provide one reliably.
      os: !not windows
    expect:
      timeout: "10m"
      exit_code: 0
