# yaml-language-server: $schema=schema.json

# Regression test cases for three reported Atmos Auth identity-resolution bugs.
# See docs/fixes/2026-04-08-atmos-auth-identity-resolution-fixes.md for the full
# analysis and proposed fixes.
#
# These test cases are committed as-is to LOCK IN THE CURRENT (BUGGY) BEHAVIOR
# so that the subsequent fix commit produces a clean, reviewable diff. Every
# assertion below is annotated with either:
#
#   CURRENT BEHAVIOR (BUG)  — the bug being reproduced; will change after fix.
#   CURRENT BEHAVIOR (OK)   — already-correct behavior we want to keep verifying.
#
# After the fix lands, the BUG-tagged assertions flip to the post-fix expected
# behavior.
#
# All three fixtures use `mock/aws` providers/identities so they run end-to-end
# in CI without real cloud credentials.

tests:

  # ============================================================================
  # Issue #2293 — default identity declared in an imported _defaults.yaml is
  # invisible to LoadStackAuthDefaults because the pre-scanner filters out
  # _defaults.yaml via `excluded_paths` and does not follow `import:` chains.
  # ============================================================================

  - name: atmos describe component — imported default identity is visible in merged map
    enabled: true
    snapshot: false
    description: >
      CURRENT BEHAVIOR (OK): when ExecuteDescribeComponent processes a stack
      that imports _defaults.yaml, the merged auth section correctly contains
      `dev-identity.default: true`. The exec-layer stack processor follows
      imports properly. This assertion guards that path so we notice if a
      future change regresses it.
    workdir: "fixtures/scenarios/auth-imported-defaults/"
    command: "atmos"
    env:
      ATMOS_KEYRING_TYPE: "memory"
      ATMOS_AUTH_REALM: "test-realm"
    args:
      - "describe"
      - "component"
      - "mycomponent"
      - "-s"
      - "acme-dev"
      - "--identity"
      - "off"
      - "-q"
      - ".auth.identities.dev-identity.default"
    expect:
      diff: []
      stdout:
        - "true"
      exit_code: 0

  # Note: there is no CLI-layer assertion that LoadStackAuthDefaults returns
  # empty — that is a pre-scanner internal, covered by the Go unit test
  # `TestLoadStackAuthDefaults_ExcludedDefaultsFile_BugIssue2293` in
  # pkg/config/stack_auth_loader_test.go.

  # ============================================================================
  # Discussion #122 — a default identity declared in ONE stack file leaks to
  # EVERY other stack because LoadStackAuthDefaults runs globally before the
  # target stack is known.
  # ============================================================================

  - name: atmos describe component — data-staging correctly sees its own default identity
    enabled: true
    snapshot: false
    description: >
      CURRENT BEHAVIOR (OK): the stack that actually declares
      `data-default.default: true` should see it as its default. This is the
      happy path for discussion #122 — we want to verify it still works after
      the fix.
    workdir: "fixtures/scenarios/auth-stack-scoping/"
    command: "atmos"
    env:
      ATMOS_KEYRING_TYPE: "memory"
      ATMOS_AUTH_REALM: "test-realm"
    args:
      - "describe"
      - "component"
      - "monitoring"
      - "-s"
      - "data-staging"
      - "--identity"
      - "off"
      - "-q"
      - ".auth.identities.data-default.default"
    expect:
      diff: []
      stdout:
        - "true"
      exit_code: 0

  - name: atmos describe component — plat-staging has NO default in the merged config
    enabled: true
    snapshot: false
    description: >
      CURRENT BEHAVIOR (OK at the exec-layer): when the stack processor merges
      plat-staging's config, it does NOT see the data-staging stack's auth
      block (correctly scoped). The LEAK happens elsewhere — in the auth
      manager's global pre-scanner. This assertion guards the correct
      exec-layer scoping.
    workdir: "fixtures/scenarios/auth-stack-scoping/"
    command: "atmos"
    env:
      ATMOS_KEYRING_TYPE: "memory"
      ATMOS_AUTH_REALM: "test-realm"
    args:
      - "describe"
      - "component"
      - "eks"
      - "-s"
      - "plat-staging"
      - "--identity"
      - "off"
      - "-q"
      - ".auth.identities"
    expect:
      diff: []
      # Both identities from atmos.yaml are present. Crucially, NEITHER has
      # `default: true` in the exec-layer merged output for this stack.
      stdout:
        - "data-default"
        - "plat-default"
      # The leak happens at a different layer (the global pre-scanner, which is
      # exercised at auth time, not describe time). The Go unit test
      # `TestLoadStackAuthDefaults_SingleDefaultLeaksGlobally_BugDiscussion122`
      # in pkg/config/stack_auth_loader_test.go locks in the buggy behavior at
      # the loader boundary.
      exit_code: 0

  # ============================================================================
  # Slack report — components.terraform.<name>.auth.identity is silently dropped
  # because schema.AuthConfig has no Identity field, so mapstructure.Decode
  # discards the key during merge.
  # ============================================================================

  - name: atmos describe component — auth.identity selector is present in merged YAML map
    enabled: true
    snapshot: false
    description: >
      CURRENT BEHAVIOR (OK at the describe layer): the `auth.identity:
      provider-role` selector the user wrote IS present in the merged YAML map
      that `describe component` renders. The exec-layer YAML merge preserves
      unknown keys. The bug is downstream — the struct decoder drops it when
      converting the map to schema.AuthConfig for the auth manager.
    workdir: "fixtures/scenarios/auth-component-identity-selector/"
    command: "atmos"
    env:
      ATMOS_KEYRING_TYPE: "memory"
      ATMOS_AUTH_REALM: "test-realm"
    args:
      - "describe"
      - "component"
      - "s3-bucket"
      - "-s"
      - "dev"
      - "--identity"
      - "off"
      - "-q"
      - ".auth.identity"
    expect:
      diff: []
      stdout:
        - "provider-role"
      exit_code: 0

  - name: atmos describe component — no-override component inherits the global default
    enabled: true
    snapshot: false
    description: >
      CURRENT BEHAVIOR (OK): a component in the same stack that does NOT
      declare `auth.identity` should continue to use the global default
      (`backend-role`). Guards that the fix stays scoped to the component that
      declares the override.
    workdir: "fixtures/scenarios/auth-component-identity-selector/"
    command: "atmos"
    env:
      ATMOS_KEYRING_TYPE: "memory"
      ATMOS_AUTH_REALM: "test-realm"
    args:
      - "describe"
      - "component"
      - "no-override"
      - "-s"
      - "dev"
      - "--identity"
      - "off"
      - "-q"
      - ".auth.identities.backend-role.default"
    expect:
      diff: []
      stdout:
        - "true"
      exit_code: 0

  - name: atmos describe component — no-override component does NOT have an auth.identity key
    enabled: true
    snapshot: false
    description: >
      CURRENT BEHAVIOR (OK): the component WITHOUT an override should not
      accidentally inherit the sibling component's `auth.identity` selector
      via some future merge bug.
    workdir: "fixtures/scenarios/auth-component-identity-selector/"
    command: "atmos"
    env:
      ATMOS_KEYRING_TYPE: "memory"
      ATMOS_AUTH_REALM: "test-realm"
    args:
      - "describe"
      - "component"
      - "no-override"
      - "-s"
      - "dev"
      - "--identity"
      - "off"
      - "-q"
      - ".auth.identity"
    expect:
      diff: []
      # yq returns "null" for a missing key.
      stdout:
        - "null"
      exit_code: 0
