  # Global terraform compatibility flags tests
  - name: atmos terraform -version passthrough
    enabled: true
    snapshot: true
    # Parity test: exercises the real terraform binary (not the suite-default
    # OpenTofu) to verify atmos passes args straight through to terraform.
    preconditions: ["terraform"]
    description: "'atmos terraform -version' should pass -version to terraform directly"
    workdir: "./"
    env:
      ATMOS_VERSION_CHECK_ENABLED: "false"
      ATMOS_COMPONENTS_TERRAFORM_COMMAND: "terraform"
    command: atmos
    args:
      - "terraform"
      - "-version"
    expect:
      stdout_contains:
        - "Terraform v"
      exit_code: 0
      # Filter out lines that vary between terraform versions
      diff:
        - "out of date"  # "Your version of Terraform is out of date!" warning
        - "You can update"  # Update instructions that follow the warning
        - "^$"  # Empty lines that may appear with the warning
      # Normalize terraform version output which varies by environment
      sanitize:
        "Terraform v[0-9]+\\.[0-9]+\\.[0-9]+": "Terraform vX.X.X"
        "on (darwin|linux|windows)_(arm64|amd64|386)": "on linux_amd64"
        "is [0-9]+\\.[0-9]+\\.[0-9]+": "is X.X.X"
        # Normalize download URL which varies between terraform versions
        "https://www\\.terraform\\.io/downloads\\.html": "https://developer.hashicorp.com/terraform/install"
  - name: atmos terraform -help passthrough
    enabled: true
    snapshot: true
    # Parity test: exercises the real terraform binary (not the suite-default
    # OpenTofu) to verify atmos passes args straight through to terraform.
    preconditions: ["terraform"]
    description: "'atmos terraform -help' should pass -help to terraform directly"
    workdir: "./"
    env:
      ATMOS_VERSION_CHECK_ENABLED: "false"
      ATMOS_COMPONENTS_TERRAFORM_COMMAND: "terraform"
    command: atmos
    args:
      - "terraform"
      - "-help"
    expect:
      stdout_contains:
        - "Usage: terraform"
        - "Main commands:"
      exit_code: 0
      # Filter out lines that vary between terraform versions
      diff:
        - "^\\s+test\\s+"  # Test command description varies between versions
        - "^\\s+modules\\s+"  # modules subcommand only in newer terraform versions
        - "^\\s+stacks\\s+"  # stacks subcommand only in newer terraform versions (HCP Terraform)
        - "^\\s+query\\s+"  # query subcommand only in certain terraform versions
      # Normalize minor punctuation differences between terraform versions
      sanitize:
        "output, or the help": "output or the help"
  - name: atmos --help config aliases section
