    description: "Ensure atmos CLI returns an error for a non-existent command."
    workdir: "../"
    env:
      ATMOS_VERSION_CHECK_ENABLED: "false"
    command: "atmos"
    args:
      - "non-existent"
    expect:
      exit_code: 1
