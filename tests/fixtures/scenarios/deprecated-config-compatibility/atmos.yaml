base_path: "."

components:
  terraform:
    base_path: "components/terraform"
  helmfile:
    base_path: "components/helmfile"
    helm_aws_profile_pattern: "{tenant}-{environment}"
    cluster_name_pattern: "{namespace}-{stage}-cluster"

stacks:
  base_path: "stacks"
  included_paths:
    - "deploy/**/*"
  name_pattern: "{stage}"

settings:
  terminal:
    no_color: true
  docs:
    max-width: 100
    pagination: true

auth:
  providers:
    legacy:
      kind: aws/iam-identity-center
      provider_type: legacy-driver

version:
  providers:
    legacy:
      type: github

logs:
  level: Info
