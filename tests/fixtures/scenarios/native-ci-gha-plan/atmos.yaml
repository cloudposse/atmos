base_path: "./"

components:
  terraform:
    base_path: "components/terraform"
    apply_auto_approve: false
    deploy_run_init: true
    init_run_reconfigure: true
    auto_generate_backend_file: true

stacks:
  base_path: "stacks"
  included_paths:
    - "orgs/**/*"
  excluded_paths:
    - "**/_defaults.yaml"
  name_pattern: "{tenant}-{environment}-{stage}"

logs:
  verbose: false
  colors: true

ci:
  enabled: true
  output:
    enabled: true
  summary:
    enabled: true
  checks:
    enabled: true
    context_prefix: "atmos"
  comments:
    enabled: true
    behavior: upsert
