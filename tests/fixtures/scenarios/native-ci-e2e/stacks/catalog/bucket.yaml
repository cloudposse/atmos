components:
  terraform:
    bucket:
      metadata:
        component: bucket
      dependencies:
        tools:
          terraform: "1.9.7"
          checkov: "3.2.529"
          trivy: "0.70.0"
      hooks:
        checkov-policy:
          events:
            - after-terraform-plan
          kind: checkov
          args:
            - "-f"
            - "$ATMOS_COMPONENT_PATH/checkov_target.tf"
            - "-o"
            - "sarif"
            - "--output-file-path"
            - "$ATMOS_OUTPUT_DIR"
            - "--quiet"
            - "--soft-fail"
            # Scope to versioning + access logging; the logging check is
            # suppressed inline in checkov_target.tf so only versioning reports.
            - "--check"
            - "CKV_AWS_21,CKV_AWS_18"
          on_failure: warn
        trivy-policy:
          events:
            - after-terraform-plan
          kind: trivy
          args:
            - "config"
            - "--format"
            - "sarif"
            - "--output"
            - "$ATMOS_OUTPUT_FILE"
            - "--quiet"
            # Scope to LOW+MEDIUM; with the public-access block in place the
            # only findings are AWS-0090 (versioning, MEDIUM) and AWS-0089
            # (logging, LOW). The logging finding is suppressed inline in
            # trivy_target.tf so only versioning reports.
            - "--severity"
            - "MEDIUM,LOW"
            - "$ATMOS_COMPONENT_PATH/trivy_target.tf"
          on_failure: warn
