components:
  terraform:
    bucket:
      metadata:
        component: bucket
      dependencies:
        tools:
          terraform: "1.9.7"
          checkov: "3.2.529"
          kics: "2.1.20"
      hooks:
        checkov-policy:
          events:
            - after-terraform-plan
          kind: checkov
          args:
            - "-f"
            - "$ATMOS_COMPONENT_PATH/checkov_target.tf"
            - "-o"
            - "sarif"
            - "--output-file-path"
            - "$ATMOS_OUTPUT_DIR"
            - "--quiet"
            - "--soft-fail"
            - "--check"
            - "CKV_AWS_21"
          on_failure: warn
        trivy-policy:
          events:
            - after-terraform-plan
          kind: trivy
          args:
            - "config"
            - "--format"
            - "sarif"
            - "--output"
            - "$ATMOS_OUTPUT_FILE"
            - "--quiet"
            - "$ATMOS_COMPONENT_PATH/trivy_target.tf"
          on_failure: warn
        kics-policy:
          events:
            - after-terraform-plan
          kind: kics
          args:
            - "scan"
            - "-p"
            - "$ATMOS_COMPONENT_PATH/kics_target.tf"
            - "-o"
            - "$ATMOS_OUTPUT_DIR"
            - "--report-formats"
            - "sarif"
            - "--no-progress"
            # Exclude the account-level "IAM Access Analyzer Not Enabled" query;
            # it is not a per-bucket property and would add unrelated noise.
            - "--exclude-queries"
            - "e592a0c5-5bdb-414c-9066-5dba7cdea370"
          env:
            KICS_QUERIES_PATH: "$KICS_QUERIES_PATH"
          on_failure: warn
