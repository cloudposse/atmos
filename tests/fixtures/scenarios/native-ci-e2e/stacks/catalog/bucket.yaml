components:
  terraform:
    bucket:
      metadata:
        component: bucket
      dependencies:
        tools:
          terraform: "1.9.7"
          checkov: "3.2.529"
          kics: "2.1.20"
      hooks:
        checkov-policy:
          events:
            - after-terraform-plan
          kind: checkov
          args:
            - "-f"
            - "$ATMOS_COMPONENT_PATH/checkov_target.tf"
            - "-o"
            - "sarif"
            - "--output-file-path"
            - "$ATMOS_OUTPUT_DIR"
            - "--quiet"
            - "--soft-fail"
            - "--check"
            - "CKV_AWS_21"
          on_failure: warn
        trivy-policy:
          events:
            - after-terraform-plan
          kind: trivy
          args:
            - "config"
            - "--format"
            - "sarif"
            - "--output"
            - "$ATMOS_OUTPUT_FILE"
            - "--quiet"
            # Limit to MEDIUM severity; on a bare bucket AWS-0090 (versioning)
            # is the only MEDIUM check, so exactly one finding is reported.
            - "--severity"
            - "MEDIUM"
            - "$ATMOS_COMPONENT_PATH/trivy_target.tf"
          on_failure: warn
        kics-policy:
          events:
            - after-terraform-plan
          kind: kics
          args:
            - "scan"
            - "-p"
            - "$ATMOS_COMPONENT_PATH/kics_target.tf"
            - "-o"
            - "$ATMOS_OUTPUT_DIR"
            - "--report-formats"
            - "sarif"
            - "--no-progress"
            # Include only the S3 versioning query so exactly one finding is
            # reported (S3 Bucket Without Versioning).
            - "--include-queries"
            - "568a4d22-3517-44a6-a7ad-6a7eed88722c"
          env:
            KICS_QUERIES_PATH: "$KICS_QUERIES_PATH"
          on_failure: warn
