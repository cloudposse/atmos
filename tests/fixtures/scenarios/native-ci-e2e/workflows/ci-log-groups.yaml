name: Native CI Log Groups
description: Small workflow for inspecting CI log grouping modes in GitHub Actions.

workflows:
  ci-log-groups:
    description: Emit simple shell output under the active CI grouping mode.
    steps:
      - name: first workflow group
        type: shell
        command: |
          echo "workflow step: first"
          echo "ATMOS_CI_LOG_GROUP_ACTIVE=${ATMOS_CI_LOG_GROUP_ACTIVE:-<unset>}"
          echo "payload: first step output should be inside the active Atmos group when grouping is enabled"

      - name: second workflow group
        type: shell
        command: |
          echo "workflow step: second"
          echo "ATMOS_CI_LOG_GROUP_ACTIVE=${ATMOS_CI_LOG_GROUP_ACTIVE:-<unset>}"
          echo "payload: second step output should be inside the active Atmos group when grouping is enabled"
