# Test fixture for flag inheritance scenarios.
# Tests that custom commands can inherit flags from global/parent commands.

base_path: "."

components:
  terraform:
    base_path: "../../components/terraform"

stacks:
  base_path: "stacks"
  included_paths:
    - "**/*"
  name_pattern: "{stage}"

# Custom commands that test flag inheritance
commands:
  # Test 1: Custom command inheriting global --verbose flag (bool)
  - name: echo
    description: Echo commands with verbose support
    commands:
      - name: info
        description: Echo information with optional verbose output
        flags:
          - name: verbose
            shorthand: v
            type: bool
            description: Enable verbose output
        steps:
          - 'echo "Info: This is a basic message"'
          - '{{ if .Flags.verbose }}echo "Verbose: Additional details enabled"{{ end }}'

  # Test 2: Custom command with --stack flag (same as terraform's parent flag)
  - name: deploy
    description: Deploy commands with stack support
    commands:
      - name: component
        description: Deploy a component to a stack
        arguments:
          - name: component
            description: Name of the component
        flags:
          - name: stack
            shorthand: s
            description: Name of the stack
            required: true
        steps:
          - 'echo "Deploying component: {{ .Arguments.component }}"'
          - 'echo "To stack: {{ .Flags.stack }}"'

  # Test 3: Custom subcommand under the built-in terraform command.
  - name: terraform
    description: Execute Terraform commands with custom extensions
    commands:
      - name: provision
        description: This command provisions terraform components
        arguments:
          - name: component
            description: Name of the component
        flags:
          - name: stack
            shorthand: s
            description: Name of the stack
            required: true
        steps:
          - 'echo "Provisioning component: {{ .Arguments.component }}"'
          - 'echo "In stack: {{ .Flags.stack }}"'

  # Test 4: Custom command using component_config with --stack.
  - name: show
    description: Execute 'show' commands
    commands:
      - name: component
        description: Execute 'show component' command
        arguments:
          - name: component
            description: Name of the component
        flags:
          - name: stack
            shorthand: s
            description: Name of the stack
            required: true
        component_config:
          component: "{{ .Arguments.component }}"
          stack: "{{ .Flags.stack }}"
        env:
          - key: ATMOS_COMPONENT
            value: "{{ .Arguments.component }}"
        steps:
          - 'echo "Atmos component from argument: {{ .Arguments.component }}"'
          - 'echo "ATMOS_COMPONENT: $ATMOS_COMPONENT"'
          - 'echo "Atmos stack: {{ .Flags.stack }}"'
          - 'echo "Terraform component: {{ .ComponentConfig.component }}"'
          - 'echo "Stage: {{ .ComponentConfig.vars.stage }}"'
