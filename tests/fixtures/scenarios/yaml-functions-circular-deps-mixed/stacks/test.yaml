# Regression fixture for issue #2005: a cross-component cycle that MIXES
# !terraform.state and !terraform.output. component-a reads component-b via
# !terraform.state; component-b reads component-a via !terraform.output. The
# YAML-function resolver must detect the cycle and return ErrCircularDependency
# instead of recursing until the runtime stack overflows.
#
# The sibling fixture yaml-functions-circular-deps covers the state↔state case;
# this one guards the mixed state↔output path, which is what #2005 reported.

vars:
  stage: test

components:
  terraform:
    component-a:
      metadata:
        component: yaml-functions
      vars:
        string_var: !terraform.state component-b test string_var
    component-b:
      metadata:
        component: yaml-functions
      vars:
        string_var: !terraform.output component-a test string_var
