base_path: "./"

components:
  terraform:
    base_path: "components/terraform"

stacks:
  base_path: "stacks"
  included_paths:
    - "orgs/**/*"
  excluded_paths:
    - "**/_defaults.yaml"
  name_template: "{{ .vars.namespace }}-{{ .vars.stage }}"

logs:
  file: "/dev/stderr"
  level: Info

templates:
  settings:
    enabled: true
