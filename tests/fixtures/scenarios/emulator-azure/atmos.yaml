# Minimal scenario proving the Azure emulator (floci/az) comes up via the emulator-component
# path: `atmos emulator up azure` (atmos manages the container). Used by
# TestEmulatorAzureLifecycle (opt-in, runtime-gated).
base_path: "./"

stacks:
  base_path: "stacks"
  included_paths:
    - "deploy/**/*"
  name_pattern: "{stage}"

logs:
  file: "/dev/stderr"
  level: Info
