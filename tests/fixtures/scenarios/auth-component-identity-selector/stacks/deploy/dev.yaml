# dev stack — the `s3-bucket` component uses a DIFFERENT identity than the
# stack default. The `auth.identity: provider-role` line is the bug report's
# input: currently it is silently dropped by the schema decoder.

vars:
  stage: dev

components:
  terraform:
    s3-bucket:
      metadata:
        component: mock_caller_identity
      auth:
        # Component-level identity selector — points to a global identity
        # defined in atmos.yaml. This is the form the user tried to use in
        # the Slack report and is currently not supported by the schema.
        identity: provider-role
      vars:
        enabled: true

    # Second component with NO auth override. It should continue to use the
    # global default (backend-role). Used to assert the fix is scoped to the
    # specific component and does not affect siblings.
    no-override:
      metadata:
        component: mock_caller_identity
      vars:
        enabled: true
