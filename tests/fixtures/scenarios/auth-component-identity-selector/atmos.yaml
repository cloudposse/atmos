# Test fixture for the Slack-reported component-level identity selector bug.
#
# Scenario: the user declares two identities in atmos.yaml — one for reading
# and writing the Terraform backend state, another for creating resources in
# a different AWS account. The user's stack config marks the backend role as
# the default identity and declares a per-component override via
# `components.terraform.<name>.auth.identity: <other-identity>`.
#
# Currently this override is SILENTLY DROPPED because
# `schema.ComponentAuthConfig` has no `Identity string` field — mapstructure
# decodes unknown keys as no-ops. Result: the resource-creation component runs
# with the backend role's credentials and Terraform fails with a permission
# error at the target account boundary.
#
# Expected current (buggy) behavior:
#   atmos describe component s3-bucket -s dev -q '.auth.identity'
#     → returns `null` (field is not in the schema)
#   atmos auth env --component s3-bucket -s dev
#     → exports credentials for `backend-role` (the default)
#
# Expected behavior after the fix:
#   atmos describe component s3-bucket -s dev -q '.auth.identity'
#     → returns `"provider-role"`
#   atmos auth env --component s3-bucket -s dev
#     → exports credentials for `provider-role`

base_path: "./"

components:
  terraform:
    base_path: "../../components/terraform"

stacks:
  base_path: "stacks"
  included_paths:
    - "deploy/**/*"
  excluded_paths: []
  name_template: "{{ .vars.stage }}"

# Global auth config: two mock identities, with backend-role marked as the
# default. This mirrors the user's Slack-reported layout:
#   - `backend-role` is used by the Terraform S3 backend to read/write state
#   - `provider-role` is used by the AWS provider to create resources in a
#     different account
auth:
  providers:
    mock-provider:
      kind: mock/aws
      config:
        description: "Mock AWS provider for component-identity-selector tests"

  identities:
    backend-role:
      kind: mock/aws
      default: true
      via:
        provider: mock-provider
      principal:
        account:
          id: "111111111111"

    provider-role:
      kind: mock/aws
      via:
        provider: mock-provider
      principal:
        account:
          id: "222222222222"

logs:
  level: Info
