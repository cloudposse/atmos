name: Detect Base Image Update

# OPTIONAL companion workflow.
#
# On a schedule, read the latest Amazon Linux 2023 AMI from the AWS public SSM
# parameter, compare it against a tracked state file, and trigger the AMI
# pipeline automatically when Amazon publishes a new base image.
#
# Disable by removing this file or the `schedule` trigger. Requires the same
# AWS_OIDC_ROLE_ARN / AWS_REGION repository variables as ami.yml, plus
# `contents: write` to commit the updated tracker.

on:
  schedule:
    # 1st and 15th of each month at 06:00 UTC.
    - cron: "0 6 1,15 * *"
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: write
  actions: write # Needed to dispatch ami.yml.

env:
  # Public SSM parameter that always points at the latest minimal AL2023 x86_64 AMI.
  SSM_PARAMETER: /aws/service/ami-amazon-linux-latest/al2023-ami-minimal-kernel-default-x86_64
  TRACKER_FILE: .github/al2023-latest.json

jobs:
  detect:
    name: Detect new base AMI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-aws-credentials
        with:
          role-arn: ${{ vars.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Read latest base AMI from SSM
        id: latest
        run: |
          ami_id="$(aws ssm get-parameter \
            --region "${{ vars.AWS_REGION }}" \
            --name "$SSM_PARAMETER" \
            --query 'Parameter.Value' --output text)"
          # Resolve the human-readable image name for the tracker and pipeline input.
          ami_name="$(aws ec2 describe-images \
            --region "${{ vars.AWS_REGION }}" \
            --image-ids "$ami_id" \
            --query 'Images[0].Name' --output text)"
          echo "ami_id=${ami_id}" >> "$GITHUB_OUTPUT"
          echo "ami_name=${ami_name}" >> "$GITHUB_OUTPUT"

      - name: Compare against tracker
        id: compare
        run: |
          previous=""
          if [[ -f "$TRACKER_FILE" ]]; then
            previous="$(jq -r '.ami_id // ""' "$TRACKER_FILE")"
          fi
          if [[ "$previous" == "${{ steps.latest.outputs.ami_id }}" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No new base image (still ${previous})." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "New base image: ${previous:-<none>} -> ${{ steps.latest.outputs.ami_id }}" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Update tracker
        if: ${{ steps.compare.outputs.changed == 'true' }}
        run: |
          jq -n \
            --arg id "${{ steps.latest.outputs.ami_id }}" \
            --arg name "${{ steps.latest.outputs.ami_name }}" \
            '{ami_id: $id, ami_name: $name}' > "$TRACKER_FILE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$TRACKER_FILE"
          git commit -m "chore: base AMI updated to ${{ steps.latest.outputs.ami_id }}"
          git push

      - name: Trigger AMI pipeline
        if: ${{ steps.compare.outputs.changed == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run ami.yml \
            -f source_ami_name="${{ steps.latest.outputs.ami_name }}" \
            -f stack=al2023 \
            -f component=al2023
