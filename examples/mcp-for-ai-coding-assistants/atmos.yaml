# Atmos MCP for AI Coding Assistants
#
# Configure once in atmos.yaml, then use the same MCP servers from
# Claude Code, OpenAI Codex CLI, and Google Gemini CLI. Atmos handles
# toolchain (uvx/npx) and AWS credential injection — your AI coding
# assistant just calls tools.
#
# Workflow:
#   1. Edit auth section below to match your AWS organization.
#   2. atmos auth login                         # AWS SSO login (once)
#   3. atmos toolchain install astral-sh/uv     # ensure uvx is available
#   4. atmos mcp export                         # generates .mcp.json
#   5. Open Claude Code / Codex / Gemini in this directory and ask away.
#
# Docs:
#   https://atmos.tools/cli/configuration/mcp
#   https://atmos.tools/cli/configuration/auth
#   https://atmos.tools/cli/configuration/toolchain

base_path: "."

# ---------------------------------------------------------------------------
# Atmos Toolchain
# ---------------------------------------------------------------------------
# Map `uv` to the aqua registry so the toolchain can resolve and install it.
# This ensures `uvx` is available to spawn AWS MCP servers from the AI CLIs.
# Install with: atmos toolchain install astral-sh/uv
toolchain:
  aliases:
    uv: astral-sh/uv

# ---------------------------------------------------------------------------
# MCP — enable both modes
# ---------------------------------------------------------------------------
# enabled: true allows `atmos mcp start` to run, so this Atmos project's own
# AI tools (describe_component, list_stacks, validate_stacks, …) can be
# exposed to AI coding assistants as a regular MCP server. The `atmos` entry
# under `servers` below wires that in.
#
# servers: …    configures external MCP servers Atmos manages. `atmos mcp
#               export` writes these to .mcp.json (Claude Code, Gemini) or
#               you can hand-translate to ~/.codex/config.toml.
mcp:
  enabled: true

  servers:
    # =======================================================================
    # The Atmos MCP server itself
    # =======================================================================
    # Exposes Atmos AI tools (describe_component, list_stacks, validate_stacks,
    # read_component_file, write_stack_file, search_files, execute_atmos_command,
    # describe_affected, …) to your AI coding assistant. No identity needed —
    # the server uses your local atmos.yaml, no remote auth involved.
    atmos:
      command: atmos
      args: ["mcp", "start"]
      description: "Atmos AI tools — describe/list/validate stacks and components, read/write files"

    # =======================================================================
    # AWS MCP servers — credentials injected via Atmos Auth
    # =======================================================================

    # AWS Documentation — search and fetch AWS docs.
    # No credentials needed — accesses public documentation endpoints.
    aws-docs:
      command: uvx
      args: ["awslabs.aws-documentation-mcp-server@latest"]
      env:
        FASTMCP_LOG_LEVEL: "ERROR"
      description: "AWS Documentation — search and fetch AWS docs"

    # AWS Knowledge — managed remote knowledge base.
    # Fully managed remote MCP server providing up-to-date AWS documentation,
    # code samples, agent SOPs, and regional availability information.
    aws-knowledge:
      command: uvx
      args:
        - "fastmcp"
        - "run"
        - "https://knowledge-mcp.global.api.aws"
      description: "AWS Knowledge — managed AWS knowledge base (remote)"

    # AWS Pricing — real-time pricing and cost analysis.
    # All Pricing API calls are free of charge.
    # IAM permissions: pricing:*
    aws-pricing:
      command: uvx
      args: ["awslabs.aws-pricing-mcp-server@latest"]
      env:
        AWS_REGION: "us-east-1"
        FASTMCP_LOG_LEVEL: "ERROR"
      description: "AWS Pricing — real-time pricing and cost analysis"
      identity: "readonly"

    # AWS Billing & Cost Management — billing summaries, payment history,
    # cost allocation tags.
    # IAM permissions: ce:*, billing:*
    aws-billing:
      command: uvx
      args: ["awslabs.billing-cost-management-mcp-server@latest"]
      env:
        AWS_REGION: "us-east-1"
        FASTMCP_LOG_LEVEL: "ERROR"
      description: "AWS Billing — billing summaries and payment history"
      identity: "readonly"

    # AWS IAM — role/policy analysis and access patterns. Read-only.
    # IAM permissions: iam:Get*, iam:List*
    aws-iam:
      command: uvx
      args: ["awslabs.iam-mcp-server@latest"]
      env:
        AWS_REGION: "us-east-1"
        FASTMCP_LOG_LEVEL: "ERROR"
      description: "AWS IAM — role/policy analysis and access patterns"
      identity: "readonly"

    # AWS CloudTrail — event history and API call auditing.
    # IAM permissions: cloudtrail:LookupEvents
    aws-cloudtrail:
      command: uvx
      args: ["awslabs.cloudtrail-mcp-server@latest"]
      env:
        AWS_REGION: "us-east-1"
        FASTMCP_LOG_LEVEL: "ERROR"
      description: "AWS CloudTrail — event history and API call auditing"
      identity: "readonly"

    # AWS Security — Well-Architected security posture assessment. Read-only.
    # IAM permissions: GuardDuty/Inspector/SecurityHub/Access Analyzer read,
    # plus S3/EBS/RDS/ELB read for encryption/TLS checks.
    aws-security:
      command: uvx
      args: ["awslabs.well-architected-security-mcp-server@latest"]
      env:
        AWS_REGION: "us-east-1"
        FASTMCP_LOG_LEVEL: "ERROR"
      description: "AWS Security — Well-Architected security posture assessment"
      identity: "readonly"

    # AWS API — direct AWS CLI access via AI, with built-in safety controls.
    # READ_OPERATIONS_ONLY=true blocks mutations entirely; flip to false +
    # REQUIRE_MUTATION_CONSENT=true if you want approval-gated mutations.
    aws-api:
      command: uvx
      args: ["awslabs.aws-api-mcp-server@latest"]
      env:
        AWS_REGION: "us-east-1"
        READ_OPERATIONS_ONLY: "true"
        REQUIRE_MUTATION_CONSENT: "true"
      description: "AWS API — direct AWS CLI access with security controls"
      identity: "readonly"

# ---------------------------------------------------------------------------
# Atmos Auth — automatic credential injection for AWS MCP servers
# ---------------------------------------------------------------------------
# Servers with `identity` are wrapped (in the exported .mcp.json) with
# `atmos auth exec -i <identity> --`. When the AI CLI spawns them, the
# subprocess inherits AWS credentials resolved by Atmos Auth — no need to
# touch ~/.aws/config, AWS_PROFILE, or other credential files.
#
# Update the three values marked "← Change this" to match your AWS org,
# then: atmos auth login
auth:
  providers:
    aws-sso:
      kind: aws/iam-identity-center
      start_url: "https://your-org.awsapps.com/start"   # ← Change this
      region: "us-east-1"
  identities:
    # Read-only identity for cost analysis, IAM/security audits, etc.
    readonly:
      kind: aws/permission-set
      provider: aws-sso
      default: true
      principal:
        permission_set: "ReadOnlyAccess"                 # ← Change this
        account:
          id: "123456789012"                             # ← Change this

# ---------------------------------------------------------------------------
# AI Configuration
# ---------------------------------------------------------------------------
# This block enables `atmos ai ask` / `atmos ai chat` as an *alternative*
# to using Claude Code / Codex / Gemini directly. The MCP servers above are
# reused — same auth, same tools — just driven by Atmos's own AI loop
# instead of an external CLI.
#
# You can also leave ai.enabled: false if you only intend to use the
# external CLIs; the MCP servers will still work for them.
ai:
  enabled: true
  default_provider: "anthropic"
  timeout_seconds: 120
  max_tool_iterations: 25

  providers:
    anthropic:
      model: "claude-sonnet-4-6"
      api_key: !env "ANTHROPIC_API_KEY"
      max_tokens: 4096
      cache:
        enabled: true

  tools:
    enabled: true
    require_confirmation: true
    allowed_tools:
      - atmos_describe_component
      - atmos_list_stacks
      - atmos_validate_stacks
      - read_stack_file

  sessions:
    enabled: true
    path: ".atmos/sessions"

# Minimal stacks config (required for Atmos to load).
stacks:
  base_path: stacks
  included_paths:
    - "**/*.yaml"
  excluded_paths: []
  name_template: "{{ .vars.stage }}"

components:
  terraform:
    base_path: components/terraform
