# Example stack for the MCP-for-AI-coding-assistants demo.
# The mock vpc component below has no real cloud resources; it exists so
# the Atmos MCP tools (describe_component, list_stacks, validate_stacks)
# have something concrete to report when the AI CLI asks about this project.
vars:
  stage: dev

components:
  terraform:
    vpc:
      vars:
        vpc_cidr: "10.0.0.0/16"
        availability_zones:
          - "us-east-2a"
          - "us-east-2b"
        tags:
          Environment: dev
          ManagedBy: atmos
