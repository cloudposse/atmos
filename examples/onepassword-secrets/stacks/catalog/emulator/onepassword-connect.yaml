# yaml-language-server: $schema=https://atmos.tools/schemas/atmos/atmos-manifest/1.0/atmos-manifest.json

components:
  emulator:
    onepassword-connect:
      driver: mockoon/1password-connect
      container:
        ports:
          - host: 18080
            container: 3000
        mounts:
          - type: bind
            source: ./mockoon/1password-connect.json
            target: /data/1password-connect.json
            read_only: true
