# yaml-language-server: $schema=https://atmos.tools/schemas/atmos/atmos-manifest/1.0/atmos-manifest.json

# The emulator is a stack-scoped component. `atmos emulator up aws -s <stack>`
# starts (or reuses) it; the `local-aws` identity in atmos.yaml resolves its live
# endpoint and the provider-config contributor wires Terraform to it.
components:
  emulator:
    aws:
      driver: floci/aws
      region: us-east-1
      # Pin the Floci image to the known-good release the test suite verifies
      # (1.5.23). The driver default is `floci/floci:latest`, which can drift to a
      # newer build that rejects the dummy `test`/`test` credentials (403
      # InvalidAccessKeyId). Keep this digest in sync with tests/floci_containers_test.go.
      container:
        image: floci/floci@sha256:c88ec20bf221630dd195d38a14eeb0ac52ddfa72c37ebb3c8aa17f63ae27c5f2
