base_path: "./"

# https://pkg.go.dev/text/template
templates:
  settings:
    enabled: true
    evaluations: 2
    sprig:
      enabled: true

components:
  terraform:
    base_path: "components/terraform"
    apply_auto_approve: false
    deploy_run_init: true
    init_run_reconfigure: true
    auto_generate_backend_file: false

stacks:
  base_path: "stacks"
  included_paths:
    - "deploy/**/*"
  excluded_paths:
    - "**/_defaults.yaml"

  name_template: "{{.providers.context.values.product}}-{{.providers.context.values.region}}-{{.providers.context.values.environment}}"

logs:
  file: "/dev/stderr"
  level: Info

commands:
- name: "test"
  description: "Run all tests"
  steps:
  - atmos validate stacks
  - atmos terraform plan demo -s acme-west-dev
  - atmos terraform plan demo -s acme-west-staging
  - atmos terraform plan demo -s acme-west-prod
  - atmos terraform apply demo -s acme-west-dev -auto-approve
  - atmos terraform apply demo -s acme-west-staging -auto-approve
  - atmos terraform apply demo -s acme-west-prod -auto-approve
- name: "lint"
  description: "Lint example components"
  commands:
  - name: "terraform"
    description: "Lint one Terraform component with tflint"
    dependencies:
      tools:
        tflint: "0.59.1"
    arguments:
    - name: "component"
      description: "Terraform component to lint"
      required: true
    flags:
    - name: "stack"
      shorthand: "s"
      description: "Stack containing the component"
      required: true
    steps:
    - type: tflint
      with:
        component: "{{ .Arguments.component }}"
        stack: "{{ .Flags.stack }}"
        args:
        - "--enable-rule=terraform_unused_declarations"
        - "--disable-rule=terraform_typed_variables"
        - "--minimum-failure-severity=warning"
        - "--config=$ATMOS_COMPONENT_PATH/../../../../.tflint.hcl"
