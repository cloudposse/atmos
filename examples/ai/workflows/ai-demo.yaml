# AI Demo Workflow
# Demonstrates using Atmos AI features in workflows.

name: AI Demo Workflow
description: Demonstrates Atmos AI features with multi-region infrastructure

workflows:
  # List all available stacks
  list-stacks:
    description: List all stacks in the project
    steps:
      - command: list stacks

  # Describe network components
  describe-ue1-network:
    description: Describe the VPC in the ue1-network stack
    steps:
      - command: describe component vpc -s ue1-network

  describe-uw2-network:
    description: Describe the VPC in the uw2-network stack
    steps:
      - command: describe component vpc -s uw2-network

  # Describe production components
  describe-ue1-prod:
    description: Describe the VPC in the ue1-prod stack
    steps:
      - command: describe component vpc -s ue1-prod

  # Compare network stacks across regions
  compare-network-regions:
    description: Compare network VPC configurations across regions
    steps:
      - command: describe component vpc -s ue1-network
      - command: describe component vpc -s uw2-network

  # Validate all stacks
  validate-all:
    description: Validate all stack configurations
    steps:
      - command: validate stacks

  # AI-assisted analysis (if AI is enabled)
  ai-analyze:
    description: Use AI to analyze the infrastructure
    steps:
      - command: ai ask "Analyze the VPC and Transit Gateway configuration across all stacks. What are the component dependencies and how does cross-region connectivity work?"
