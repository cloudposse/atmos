# Demo: the Atmos Version Tracker.
#
# One catalog of external versions in atmos.yaml, resolved deterministically
# into versions.lock.yaml, and applied to project files by the file managers:
#
#   atmos version track lock      # resolve desired versions into the lock
#   atmos version track update    # advance within the update policy
#   atmos version track apply     # rewrite managed files from the lock
#   atmos version track verify    # CI gate: lock fresh AND files current
#
# Desired versions here are concrete, so every command works offline.
base_path: "."

version:
  track: demo

  tracks:
    demo:
      versions:
        # GitHub Actions ref rewritten in workflows/ci.yaml by the
        # github-actions file manager.
        checkout:
          ecosystem: github-actions
          package: actions/checkout
          desired: v6.1.0

        # Tool version rewritten in the Dockerfile via a marker comment.
        opentofu:
          ecosystem: toolchain
          package: opentofu
          desired: 1.10.6

        # Rendered into versions.json from versions.json.tmpl.
        nginx:
          ecosystem: oci
          package: library/nginx
          desired: 1.29.0

  files:
    - manager: github-actions
      paths:
        - workflows/*.yaml
    - manager: marker
      paths:
        - Dockerfile
    - manager: template
      paths:
        - "*.tmpl"
