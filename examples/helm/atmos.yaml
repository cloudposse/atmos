# Atmos configuration for the native Helm component demo.
# See https://atmos.tools for documentation.

base_path: "."

components:
  helm:
    # Base path for native Helm components (local charts live here).
    base_path: "components/helm"

auth:
  identities:
    local-k3s:
      kind: kubernetes/emulator
      emulator: kubernetes

stacks:
  base_path: "stacks"
  included_paths:
    - "deploy/**/*"
  excluded_paths:
    - "**/_defaults.yaml"
  name_pattern: "{stage}"

logs:
  file: "/dev/stderr"
  level: Info

commands:
  - name: "test"
    description: "Bring up the local Kubernetes emulator, deploy the Helm chart, verify it, then tear it down"
    steps:
      - type: shell
        command: |
          set -e
          teardown() {
            atmos helm delete demo -s dev --identity local-k3s || true
            atmos emulator down kubernetes -s dev || true
          }
          trap teardown EXIT

          atmos validate stacks
          atmos emulator up kubernetes -s dev
          atmos helm apply demo -s dev --identity local-k3s
          atmos emulator exec kubernetes -s dev -- kubectl -n demo get deployment demo
          atmos emulator exec kubernetes -s dev -- kubectl -n demo get service demo
