vars:
  stage: dev

components:
  emulator:
    kubernetes:
      driver: k3s
      ephemeral: true

  helm:
    demo:
      metadata:
        component: demo
      # The chart reference. "." is the component directory itself
      # (components/helm/demo), which contains Chart.yaml.
      chart: "."
      namespace: demo
      # Atmos `values:` are the Helm chart values, merged via Atmos inheritance.
      values:
        replicaCount: 2
        image:
          tag: "1.27"
        service:
          port: 8080

    demo-repo:
      metadata:
        component: demo
      repositories:
        - name: local
          url: !env HELM_DEMO_REPO_URL
      chart: local/demo
      version: 0.1.0
      namespace: demo-repo
      values:
        replicaCount: 2
        image:
          tag: "1.27"
        service:
          port: 8080
