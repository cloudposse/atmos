# `atmos test` — end-to-end proof for the SOPS secrets example.
#
# Proves the full declarative-secrets lifecycle against a git-committed, age-encrypted SOPS
# file with NO cloud credentials and NO `sops` binary. Atmos encrypts/decrypts in-process via
# the getsops/sops Go SDK, then deploys the Terraform component that consumes the secrets.
#
# Run:
#   atmos test
commands:
  - name: test
    description: Run the end-to-end SOPS secrets proof.
    env:
      - key: ATMOS_EXPERIMENTAL
        value: silence
    steps:
      - name: prepare-test-dir
        type: shell
        output: none
        command: mkdir -p .context/test/empty-home .context/test/empty-xdg

      - name: backup-secret-file
        type: shell
        output: none
        command: cp secrets/dev.enc.yaml .context/test/dev.enc.yaml.bak

      - name: describe-masked-secrets
        type: shell
        command: atmos describe component api --stack=dev | grep -E '^  (datadog_api_key|redis_url):'

      - name: set-datadog-api-key
        type: atmos
        command: secret set DATADOG_API_KEY=dd-abc123secret --stack=dev --component=api

      - name: set-redis-url
        type: atmos
        command: secret set REDIS_URL=redis://prod:6379 --stack=dev --component=api

      - name: show-encrypted-values
        type: shell
        command: grep -E 'DATADOG_API_KEY|REDIS_URL' secrets/dev.enc.yaml | sed 's/,iv:.*//'

      - name: list-secret-status
        type: atmos
        command: secret list --stack=dev --component=api

      - name: validate-secrets
        type: atmos
        command: secret validate --stack=dev --component=api

      - name: prepare-workspace
        type: shell
        output: none
        command: atmos terraform workspace new api --stack=dev >/dev/null 2>&1 || atmos terraform workspace select api --stack=dev >/dev/null 2>&1

      - name: deploy-api
        type: atmos
        command: terraform deploy api --stack=dev

      - name: output-api
        type: atmos
        command: terraform output api --stack=dev

      - name: reveal-datadog-api-key
        type: atmos
        command: secret get DATADOG_API_KEY --stack=dev --component=api --mask=false

      - name: hide-age-key
        type: shell
        output: none
        command: mv secrets/keys.txt secrets/keys.txt.bak

      - name: reveal-without-key-fails
        type: shell
        command: |
          if env \
            -u SOPS_AGE_KEY \
            -u SOPS_AGE_KEY_FILE \
            -u SOPS_AGE_KEY_CMD \
            -u SOPS_AGE_SSH_PRIVATE_KEY_FILE \
            -u SOPS_AGE_SSH_PRIVATE_KEY_CMD \
            HOME="$PWD/.context/test/empty-home" \
            XDG_CONFIG_HOME="$PWD/.context/test/empty-xdg" \
            atmos describe component api --stack=dev --mask=false >/dev/null 2>&1; then
            echo "UNEXPECTED: reveal without key succeeded"
            exit 1
          fi
          echo "OK: reveal without key failed as expected"

      - name: restore-age-key
        type: shell
        when: always
        output: none
        command: '[ ! -f secrets/keys.txt.bak ] || mv -f secrets/keys.txt.bak secrets/keys.txt'

      - name: destroy-api
        type: shell
        when: always
        output: none
        command: atmos terraform destroy api --stack=dev -auto-approve >/dev/null 2>&1 || true

      - name: clean-api
        type: shell
        when: always
        output: none
        command: atmos terraform clean api --stack=dev --everything --force >/dev/null 2>&1 || true

      - name: restore-secret-file
        type: shell
        when: always
        output: none
        command: '[ ! -f .context/test/dev.enc.yaml.bak ] || mv -f .context/test/dev.enc.yaml.bak secrets/dev.enc.yaml'

      - name: remove-test-dir
        type: shell
        when: always
        output: none
        command: rm -rf .context/test

      - name: done
        type: toast
        level: success
        content: All proofs passed.
