# `atmos test` — end-to-end proof for the SOPS secrets example.
#
# Proves the full declarative-secrets lifecycle against a git-committed, age-encrypted SOPS
# file with NO cloud credentials and NO `sops` binary. Atmos encrypts/decrypts in-process via
# the getsops/sops Go SDK, then deploys the Terraform component that consumes the secrets.
#
# Run:
#   atmos test
commands:
  - name: test
    description: Run the end-to-end SOPS secrets proof.
    env:
      - key: ATMOS_EXPERIMENTAL
        value: silence
    steps:
      - name: lifecycle
        type: shell
        command: |
          set -euo pipefail

          secret_file="secrets/dev.enc.yaml"
          backup_file="$(mktemp)"
          empty_home=""
          empty_xdg_config=""
          cp "${secret_file}" "${backup_file}"

          cleanup() {
            set +e
            [ -f secrets/keys.txt.bak ] && mv -f secrets/keys.txt.bak secrets/keys.txt
            atmos terraform destroy api --stack=dev -auto-approve >/dev/null 2>&1
            atmos terraform clean api --stack=dev --everything --force >/dev/null 2>&1
            cp "${backup_file}" "${secret_file}"
            rm -f "${backup_file}"
            [ -n "${empty_home:-}" ] && rm -rf "${empty_home}"
            [ -n "${empty_xdg_config:-}" ] && rm -rf "${empty_xdg_config}"
          }
          trap cleanup EXIT

          echo "[1/8] describe (masking on): !secret resolves to <MASKED>, no retrieval"
          atmos describe component api --stack=dev | grep -E '^  (datadog_api_key|redis_url):'

          echo "[2/8] set values (encrypted in place)"
          atmos secret set DATADOG_API_KEY=dd-abc123secret --stack=dev --component=api
          atmos secret set REDIS_URL=redis://prod:6379 --stack=dev --component=api
          grep -E 'DATADOG_API_KEY|REDIS_URL' "${secret_file}" | sed 's/,iv:.*//'

          echo "[3/8] list status"
          atmos secret list --stack=dev --component=api

          echo "[4/8] validate (CI gate)"
          atmos secret validate --stack=dev --component=api

          atmos terraform workspace new api --stack=dev >/dev/null 2>&1 \
            || atmos terraform workspace select api --stack=dev >/dev/null 2>&1

          echo "[5/8] deploy the component that consumes the secrets"
          atmos terraform deploy api --stack=dev

          echo "[6/8] inspect deployed output"
          atmos terraform output api --stack=dev

          echo "[7/8] reveal real value (needs key)"
          atmos secret get DATADOG_API_KEY --stack=dev --component=api --mask=false

          echo "[8/8] reveal with the key removed must FAIL"
          mv secrets/keys.txt secrets/keys.txt.bak
          empty_home="$(mktemp -d)"
          empty_xdg_config="$(mktemp -d)"
          if env \
            -u SOPS_AGE_KEY \
            -u SOPS_AGE_KEY_FILE \
            -u SOPS_AGE_KEY_CMD \
            -u SOPS_AGE_SSH_PRIVATE_KEY_FILE \
            -u SOPS_AGE_SSH_PRIVATE_KEY_CMD \
            HOME="${empty_home}" \
            XDG_CONFIG_HOME="${empty_xdg_config}" \
            atmos describe component api --stack=dev --mask=false >/dev/null 2>&1; then
            echo "UNEXPECTED: reveal without key succeeded"
            exit 1
          fi
          mv -f secrets/keys.txt.bak secrets/keys.txt
          echo "OK: reveal without key failed as expected"
      - name: done
        type: toast
        level: success
        content: All proofs passed.
