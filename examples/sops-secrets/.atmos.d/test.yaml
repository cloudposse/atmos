# `atmos test` — end-to-end proof for the SOPS secrets example.
#
# Proves the full declarative-secrets lifecycle against a git-committed, age-encrypted SOPS
# file with NO cloud credentials and NO `sops` binary — Atmos encrypts/decrypts in-process via
# the getsops/sops Go SDK. Only an age key (SOPS_AGE_KEY_FILE) is required.
#
# This command dogfoods Atmos structured custom-command step types: `style` for the section
# headers, `toast` for the final status, with the shared environment hoisted into a
# command-level `env:` block. `atmos secret delete --all` resets the encrypted store in-process.
#
# Atmos prepends its own binary dir to PATH for custom-command steps, so bare `atmos` resolves to
# the SAME binary — `./build/atmos test` works without atmos on PATH.
#
# Run:
#   atmos test
commands:
  - name: test
    description: Run the end-to-end SOPS secrets proof (set/get/list/validate + masking).
    # Shared environment for every step — resolved once here instead of re-exported per step.
    env:
      # Silence the `secret` experimental-feature notice in this proof's output.
      - key: ATMOS_EXPERIMENTAL
        value: silence
      # NOTE: no SOPS_AGE_KEY_FILE here — the age key is declared in the stack via
      # `spec.age_key_file: secrets/keys.txt`, so this proof needs no env setup at all.
    steps:
      # Reset the encrypted store to a clean state (clears declared secrets, in-process).
      - name: reset-before
        type: shell
        command: 'atmos secret delete --all --force --stack dev --component api'

      - name: header-describe
        type: style
        bold: true
        foreground: "4"
        content: "[1/6] describe (masking on): !secret resolves to <MASKED>, no retrieval"
      - name: describe-masked
        type: shell
        command: |
          set -euo pipefail
          atmos describe component api --stack dev \
            | grep -E '^  (datadog_api_key|redis_url):'

      - name: header-set
        type: style
        bold: true
        foreground: "4"
        content: "[2/6] set values (encrypted in place)"
      - name: set-values
        type: shell
        command: |
          set -euo pipefail
          atmos secret set DATADOG_API_KEY=dd-abc123secret --stack dev --component api
          atmos secret set REDIS_URL=redis://prod:6379 --stack dev --component api
          echo "    encrypted at rest:"
          grep -E 'DATADOG_API_KEY|REDIS_URL' secrets/dev.enc.yaml | sed 's/,iv:.*//'

      - name: header-list
        type: style
        bold: true
        foreground: "4"
        content: "[3/6] list status"
      - name: list-status
        type: shell
        command: 'atmos secret list --stack dev --component api'

      - name: header-reveal
        type: style
        bold: true
        foreground: "4"
        content: "[4/6] reveal real value (needs key)"
      - name: reveal-value
        type: shell
        command: 'atmos secret get DATADOG_API_KEY --stack dev --component api --mask=false'

      - name: header-validate
        type: style
        bold: true
        foreground: "4"
        content: "[5/6] validate (CI gate)"
      - name: validate
        type: shell
        command: 'atmos secret validate --stack dev --component api'

      - name: header-fail
        type: style
        bold: true
        foreground: "4"
        content: "[6/6] reveal with the key removed must FAIL (retrieval genuinely decrypts)"
      - name: reveal-no-key-fails
        type: shell
        # Temporarily move the age key aside (restored on exit via trap) to prove that revealing
        # real values genuinely decrypts and cannot succeed without the key.
        command: |
          set -euo pipefail
          mv secrets/keys.txt secrets/keys.txt.bak
          trap 'mv -f secrets/keys.txt.bak secrets/keys.txt' EXIT
          if env -u SOPS_AGE_KEY_FILE atmos describe component api --stack dev --mask=false >/dev/null 2>&1; then
            echo "UNEXPECTED: reveal without key succeeded"; exit 1
          else
            echo "OK: reveal without key failed as expected"
          fi

      # Reset to a clean state (clears declared secrets, in-process).
      - name: reset-after
        type: shell
        command: 'atmos secret delete --all --force --stack dev --component api'

      - name: done
        type: toast
        level: success
        content: All proofs passed.
