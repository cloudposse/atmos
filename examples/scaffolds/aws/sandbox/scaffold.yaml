apiVersion: atmos/v1
kind: AtmosScaffoldConfig
metadata:
  # Display name only. The template is invoked by its catalog key `aws/sandbox`;
  # manifest names avoid slashes, so the directory namespace is not repeated here.
  name: aws-sandbox
  description: Bare-bones AWS Atmos project that plans and applies one component against the Floci emulator.
  author: Cloud Posse
  version: 1.0.0
spec:
  fields:
    - name: project_name
      label: Project name
      description: Name of the project, also used as the directory slug.
      type: input
      default: my-sandbox
      required: true
      validation:
        pattern: "^[a-z][a-z0-9-]{1,30}$"
        message: Use lowercase letters, digits, and hyphens (2-31 characters).
    - name: namespace
      label: Namespace
      description: Org or namespace short code used in resource names.
      type: input
      default: acme
      required: true
      validation:
        pattern: "^[a-z0-9]{2,10}$"
        message: Use 2-10 lowercase alphanumeric characters.
    - name: region
      label: AWS region
      description: Default AWS region for the project.
      type: select
      default: us-east-1
      required: true
      options:
        - us-east-1
        - us-west-2
        - eu-west-1
        - ap-southeast-1
