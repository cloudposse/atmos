# atmos:template
# Atmos configuration for {{ .Config.project_name }} (AWS sandbox).
# https://atmos.tools/cli/configuration

base_path: "./"

components:
  terraform:
    base_path: "components/terraform"
    apply_auto_approve: false
    auto_generate_backend_file: false

stacks:
  base_path: "stacks"
  included_paths:
    - "**/*"
  excluded_paths:
    - "**/_defaults.yaml"
  name_pattern: "{stage}"

logs:
  file: "/dev/stderr"
  level: Info

# Authentication. The sandbox targets the Floci emulator, which accepts any
# credentials. The provider endpoints are wired in stacks/mixins/floci.yaml,
# which every deploy stack imports.
auth:
  identities:
    floci-superuser:
      kind: aws/user
      credentials:
        access_key_id: test
        secret_access_key: test
        region: {{ .Config.region }}
      spec:
        endpoint_url: "http://localhost:4566"
      default: true

commands:
  - name: test
    description: Validate stacks and provision the bucket component against Floci.
    steps:
      - atmos validate stacks
      - atmos terraform plan bucket -s dev
      - atmos terraform apply bucket -s dev -auto-approve
      - atmos terraform destroy bucket -s dev -auto-approve
