# atmos:template
# yaml-language-server: $schema=https://atmos.tools/schemas/atmos/atmos-manifest/1.0/atmos-manifest.json

# Abstract `bucket` component. Deploy stacks import this and mark the component
# `real` to provision it for a given stage.
components:
  terraform:
    bucket:
      metadata:
        type: abstract
      vars:
        name: "{{ .Config.namespace }}-{{ .Config.project_name }}"
