apiVersion: atmos/v1
kind: AtmosScaffoldConfig
metadata:
  name: aws-app
  description: AWS application SDLC repository — dev/staging/prod stacks and one emulator-proven app component.
  author: Cloud Posse
  version: 1.0.0
spec:
  delimiters: ["[[", "]]"]
  fields:
    - name: project_name
      label: Project name
      description: Name of the application; used in resource names.
      type: input
      default: my-app
      required: true
      validation:
        pattern: "^[a-z][a-z0-9-]{1,30}$"
        message: Use lowercase letters, digits, and hyphens (2-31 characters).
    - name: region
      label: Primary AWS region
      description: Default AWS region for the application.
      type: select
      default: us-east-1
      required: true
      options:
        - us-east-1
        - us-west-2
        - eu-west-1
        - ap-southeast-1
    - name: terraform_command
      label: Terraform binary
      description: Which binary Atmos invokes for Terraform operations.
      type: select
      default: terraform
      required: true
      options:
        - terraform
        - tofu
