# atmos:template
# Atmos configuration for [[ .Config.project_name ]] (AWS app SDLC).
# https://atmos.tools/cli/configuration

base_path: "./"

components:
  terraform:
    command: [[ .Config.terraform_command ]]
    base_path: "components/terraform"
    apply_auto_approve: false
    deploy_run_init: true
    init_run_reconfigure: true
    auto_generate_backend_file: false

stacks:
  base_path: "stacks"
  included_paths:
    - "**/*"
  excluded_paths:
    - "**/_defaults.yaml"
  name_template: "{{ .vars.stage }}"

auth:
  identities:
    local:
      kind: aws/emulator
      emulator: aws
      default: true

ci:
  enabled: true
  output:
    enabled: true
  summary:
    enabled: true
  annotations:
    enabled: true

logs:
  file: "/dev/stderr"
  level: Info

commands:
  - name: test
    description: Validate stacks, then provision and destroy every app environment on the local emulator.
    steps:
      - atmos validate stacks
      - atmos emulator up aws -s dev
      - atmos terraform apply app -s dev -i false
      - atmos terraform destroy app -s dev -i false
      - atmos emulator down aws -s dev
      - atmos emulator up aws -s staging
      - atmos terraform apply app -s staging -i false
      - atmos terraform destroy app -s staging -i false
      - atmos emulator down aws -s staging
      - atmos emulator up aws -s prod
      - atmos terraform apply app -s prod -i false
      - atmos terraform destroy app -s prod -i false
      - atmos emulator down aws -s prod
