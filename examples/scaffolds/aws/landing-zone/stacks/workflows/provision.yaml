name: provision
description: Provision the landing zone against the Floci emulator.

workflows:
  up:
    description: Apply the workload bucket (auto-provisions its backend) and the secret consumer in the dev stack.
    steps:
      - command: terraform apply bucket -s dev -auto-approve
      - command: terraform apply secret-consumer -s dev -auto-approve

  down:
    description: Destroy everything in the dev stack.
    steps:
      - command: terraform destroy secret-consumer -s dev -auto-approve
      - command: terraform destroy bucket -s dev -auto-approve
