# yaml-language-server: $schema=https://atmos.tools/schemas/atmos/atmos-manifest/1.0/atmos-manifest.json

# Abstract secret consumer. Declares secrets backed by SSM and Secrets Manager
# and wires them into Terraform variables via the `!secret` YAML function.
components:
  terraform:
    secret-consumer:
      metadata:
        type: abstract
      secrets:
        vars:
          SSM_INSTANCE_TOKEN:
            description: Instance-scoped token stored in SSM (SecureString).
            store: secrets/ssm
            required: true
          ASM_DATABASE_CONFIG:
            description: Structured database config stored in AWS Secrets Manager.
            store: secrets/asm
            required: true
          GLOBAL_SHARED_TOKEN:
            description: Global token shared across stacks using this store.
            store: secrets/ssm
            scope: global
            required: true
      vars:
        ssm_instance_token: !secret SSM_INSTANCE_TOKEN
        ssm_stack_token: !secret SSM_STACK_TOKEN
        asm_database_password: !secret ASM_DATABASE_CONFIG | path ".password"
        global_shared_token: !secret GLOBAL_SHARED_TOKEN
