# atmos:template
# yaml-language-server: $schema=https://atmos.tools/schemas/atmos/atmos-manifest/1.0/atmos-manifest.json

# Abstract workload bucket. Demonstrates:
#   - Atmos native backend provisioning: Atmos creates the S3 state bucket on
#     `before.terraform.init` (provision.backend.enabled), then Terraform stores
#     its state there. The backend points at the Floci emulator via the standard
#     Terraform S3 backend custom-endpoint settings (endpoints/use_path_style),
#     so no S3-compatible-store-specific code is required.
#   - JSON Schema + OPA validation.
components:
  terraform:
    bucket:
      metadata:
        type: abstract
      backend_type: s3
      backend:
        bucket: "{{ .Config.namespace }}-{{ .Config.project_name }}-tfstate"
        workspace_key_prefix: bucket
        key: terraform.tfstate
        region: "{{ .Config.region }}"
        # Custom-endpoint settings so both the Atmos backend provisioner and
        # Terraform's own S3 backend talk to the emulator instead of AWS.
        access_key: test
        secret_key: test
        use_path_style: true
        skip_credentials_validation: true
        skip_region_validation: true
        skip_metadata_api_check: true
        skip_requesting_account_id: true
        endpoints:
          s3: "http://localhost:4566"
      provision:
        # Atmos creates the state bucket automatically before `terraform init`.
        backend:
          enabled: true
      settings:
        validation:
          bucket-jsonschema:
            schema_type: jsonschema
            schema_path: "bucket/validate-bucket-component.json"
            description: Validate the bucket component variables with JSON Schema.
          bucket-opa:
            schema_type: opa
            schema_path: "bucket/validate-bucket-component.rego"
            description: Check the bucket component configuration with an OPA policy.
      vars:
        name: "{{ .Config.namespace }}-{{ .Config.project_name }}"
