# yaml-language-server: $schema=https://atmos.tools/schemas/atmos/atmos-manifest/1.0/atmos-manifest.json

import:
  - mixins/stage/dev
  - catalog/secret-consumer

# Stack-scoped secret shared by components in this stack.
secrets:
  vars:
    SSM_STACK_TOKEN:
      description: Stack-scoped token shared by components in this stack.
      store: secrets/ssm
      required: true

components:
  terraform:
    secret-consumer:
      metadata:
        type: real
