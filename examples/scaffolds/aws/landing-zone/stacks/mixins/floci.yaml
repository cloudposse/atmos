# atmos:template
# yaml-language-server: $schema=https://atmos.tools/schemas/atmos/atmos-manifest/1.0/atmos-manifest.json

# Floci emulator wiring. Points the AWS provider at the local emulator so
# Terraform plans and applies run without real AWS credentials.
env:
  AWS_PROFILE: ""
  TF_CLI_ARGS_plan: "-compact-warnings"
  TF_CLI_ARGS_apply: "-compact-warnings"

terraform:
  providers:
    aws:
      region: "{{ .Config.region }}"
      access_key: "test"
      secret_key: "test"
      s3_use_path_style: true
      skip_credentials_validation: true
      skip_metadata_api_check: true
      skip_requesting_account_id: true
      endpoints:
        sts: &floci_url "http://localhost:4566"
        s3: *floci_url
        dynamodb: *floci_url
        iam: *floci_url
        secretsmanager: *floci_url
        ssm: *floci_url
        kms: *floci_url
