# yaml-language-server: $schema=https://atmos.tools/schemas/atmos/atmos-manifest/1.0/atmos-manifest.json

# Production environment: multi-region audit trail, long retention, protected
# log bucket, and a tight alarm threshold.

import:
  - _defaults

vars:
  stage: prod

components:
  terraform:
    audit-trail:
      vars:
        # Never let a destroy empty the production audit trail.
        force_destroy: false
        multi_region: true
    monitoring:
      vars:
        retention_in_days: 365
        # 256 MiB per 5 minutes — unusual log volume should alert.
        alarm_threshold_bytes: 268435456
    baseline:
      vars:
        parameters:
          environment: production
          log-level: warn
