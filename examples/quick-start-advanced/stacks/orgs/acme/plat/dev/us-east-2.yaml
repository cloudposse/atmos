# Top-level stack `plat-ue2-dev` — a composition manifest, not where config lives.
# It assembles a deployment from two reusable layers:
#   - orgs/acme/plat/dev/_defaults  → what makes `dev` different (ephemeral settings)
#   - mixins/region/us-east-2       → region + environment context vars
import:
  - orgs/acme/plat/dev/_defaults
  - mixins/region/us-east-2
