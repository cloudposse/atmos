components:
  terraform:
    sns-topic:
      metadata:
        component: sns-topic
        description: "SNS topic for application events."
      # https://atmos.tools/stacks/dependencies/components
      dependencies:
        components:
          - name: kms-key
      hooks:
        publish-coordinates:
          events:
            - after-terraform-apply
          kind: store
          name: config/ssm
          outputs:
            topic_arn: .topic_arn
      vars:
        name: events
        kms_key_arn: "alias/{{ .vars.namespace }}-{{ .vars.tenant }}-{{ .vars.environment }}-{{ .vars.stage }}-app"
