components:
  terraform:
    sns-topic:
      metadata:
        component: sns-topic
        description: "SNS topic for application events."
        tags: [messaging]
        labels:
          tier: application
      # https://atmos.tools/stacks/dependencies/components
      dependencies:
        components:
          - name: kms-key
      hooks:
        publish-coordinates:
          events:
            - after-terraform-apply
          kind: store
          name: config/ssm
          outputs:
            topic_arn: .topic_arn
      vars:
        name: events
        # Read the KMS key ARN straight from the kms-key component's Terraform state.
        kms_key_arn: !terraform.state kms-key ".key_arn // ""pending"""
