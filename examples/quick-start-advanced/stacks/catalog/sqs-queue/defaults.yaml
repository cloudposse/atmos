components:
  terraform:
    sqs-queue:
      metadata:
        component: sqs-queue
        description: "SQS queue subscribed to the events topic."
        tags: [messaging]
        labels:
          tier: application
      # https://atmos.tools/stacks/dependencies/components
      dependencies:
        components:
          - name: sns-topic
      hooks:
        publish-coordinates:
          events:
            - after-terraform-apply
          kind: store
          name: config/ssm
          outputs:
            queue_url: .queue_url
      vars:
        name: events
        # Read the SNS topic ARN straight from the sns-topic component's Terraform state.
        topic_arn: !terraform.state sns-topic .topic_arn // "pending"
