# yaml-language-server: $schema=https://atmos.tools/schemas/atmos/atmos-manifest/1.0/atmos-manifest.json

components:
  kubernetes:
    demo/defaults:
      metadata:
        type: abstract
        component: demo
      provider: kubectl
      paths:
        - files
      vars:
        namespace: atmos-demo
        app_name: demo
        image: nginx:1.27-alpine
        replicas: 1
        service_port: 80
      manifests:
        - apiVersion: v1
          kind: Namespace
          metadata:
            name: '{{ .vars.namespace }}'
            labels:
              app.kubernetes.io/managed-by: atmos
        - |
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: "{{ .vars.app_name }}"
            namespace: "{{ .vars.namespace }}"
            labels:
              app.kubernetes.io/name: "{{ .vars.app_name }}"
          spec:
            replicas: {{ .vars.replicas }}
            selector:
              matchLabels:
                app.kubernetes.io/name: "{{ .vars.app_name }}"
            template:
              metadata:
                labels:
                  app.kubernetes.io/name: "{{ .vars.app_name }}"
              spec:
                containers:
                  - name: nginx
                    image: "{{ .vars.image }}"
                    ports:
                      - name: http
                        containerPort: 80
        - |
          apiVersion: v1
          kind: Service
          metadata:
            name: "{{ .vars.app_name }}"
            namespace: "{{ .vars.namespace }}"
          spec:
            type: ClusterIP
            selector:
              app.kubernetes.io/name: "{{ .vars.app_name }}"
            ports:
              - name: http
                port: {{ .vars.service_port }}
                targetPort: http
