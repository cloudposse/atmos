# yaml-language-server: $schema=https://atmos.tools/schemas/atmos/atmos-manifest/1.0/atmos-manifest.json

components:
  terraform:
    random-pet:
      metadata:
        component: random-pet
      # Atmos resolves and installs OpenTofu before executing the component, then
      # adds it to PATH. Any compatible 1.x version.
      dependencies:
        tools:
          opentofu: "^1.10.0"
      vars:
        length: 2
        separator: "-"
