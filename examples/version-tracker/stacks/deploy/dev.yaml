# Dev stack: asserts the "dev" version track, so !version and {{ .version.* }}
# resolve dev's locked versions for this stack (pkg/version/manager:
# EffectiveTrackFromStack).
version:
  track: dev

vars:
  stage: dev

components:
  terraform:
    app:
      vars:
        environment: dev
        kubectl_version: !version kubectl
        redis_image: "redis:{{ .version.redis }}"
        ci_action_ref: !version setup_node
