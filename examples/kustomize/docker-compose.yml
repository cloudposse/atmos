x-environment: &default-env
  K3S_TOKEN: ${K3S_TOKEN:-test}

services:
  server:
    container_name: kustomize-k3s-server
    image: "rancher/k3s:${K3S_VERSION:-v1.30.2-k3s1}"
    command:
      - "server"
    tmpfs:
      - /run
      - /var/run
    ulimits:
      nproc: 65535
      nofile:
        soft: 65535
        hard: 65535
    privileged: true
    restart: always
    environment:
      <<: *default-env
      K3S_KUBECONFIG_OUTPUT: /output/kubeconfig.yaml
      # 644 drops world-write from the default 666 while keeping the kubeconfig
      # readable by the host user that runs Atmos (the file is written as root in
      # the container and bind-mounted back, so a stricter 600/640 would block it).
      K3S_KUBECONFIG_MODE: 644
    volumes:
      - k3s-server:/var/lib/rancher/k3s
      - .:/output
    ports:
      - 6444:6443
      - 8081:80
      - 8444:443
    networks:
      - k3s

  agent:
    container_name: kustomize-k3s-agent
    image: "rancher/k3s:${K3S_VERSION:-v1.30.2-k3s1}"
    tmpfs:
      - /run
      - /var/run
    ulimits:
      nproc: 65535
      nofile:
        soft: 65535
        hard: 65535
    privileged: true
    restart: always
    environment:
      <<: *default-env
      K3S_URL: https://server:6443
    volumes:
      - k3s-agent:/var/lib/rancher/k3s
    networks:
      - k3s

volumes:
  k3s-server: {}
  k3s-agent: {}

networks:
  k3s:
    driver: bridge
