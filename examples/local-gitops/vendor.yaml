apiVersion: atmos/v1
kind: AtmosVendorConfig
metadata:
  name: local-gitops
  description: Vendor the upstream Flux install manifest for the local GitOps demo
spec:
  sources:
    # The Flux controllers + CRDs as a single self-contained manifest (a Flux
    # release asset). Vendored — not committed — to keep the example light; pinned
    # by tag for reproducibility. `atmos vendor pull` fetches it into the flux
    # component's files/ directory, where the kubernetes component renders it.
    - component: flux
      source: "https://github.com/fluxcd/flux2/releases/download/v2.6.4/install.yaml"
      targets:
        - "components/kubernetes/flux/files/install.yaml"
      tags:
        - gitops
