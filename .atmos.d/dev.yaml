commands:
  - name: dev
    description: Development workflow commands for Atmos development
    commands:
      - name: setup
        description: Set up local development environment
        steps:
          - |
            echo "Setting up Atmos development environment..."

            echo "1. Installing Go dependencies..."
            go mod download

            echo "2. Installing pre-commit and golangci-lint..."
            if ! command -v pre-commit >/dev/null 2>&1; then
              if command -v brew >/dev/null 2>&1; then
                echo "Installing pre-commit via Homebrew..."
                brew install pre-commit
              elif command -v apt-get >/dev/null 2>&1; then
                echo "Installing pre-commit via apt..."
                sudo apt-get update && sudo apt-get install -y pre-commit
              else
                echo "Installing pre-commit via pip..."
                pip install --user pre-commit || pip install pre-commit
              fi
            else
              echo "pre-commit is already installed: $(pre-commit --version)"
            fi

            if ! command -v golangci-lint >/dev/null 2>&1; then
              if command -v brew >/dev/null 2>&1; then
                echo "Installing golangci-lint via Homebrew..."
                brew install golangci-lint
              else
                echo "Installing golangci-lint via curl..."
                curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b "$(go env GOPATH)/bin"
              fi
            else
              echo "golangci-lint is already installed: $(golangci-lint --version)"
            fi

            echo "3. Installing pre-commit hooks..."
            pre-commit install

            echo "4. Installing Go tools..."
            go install mvdan.cc/gofumpt@latest

            echo "Development environment setup complete."
            echo ""
            echo "Run 'atmos check staged' to check staged files (read-only)"
            echo "Run 'atmos check pr' to check PR changes (read-only)"
            echo "Run 'atmos format staged' to auto-format staged files"
            echo "Run 'atmos format pr' to auto-format PR changes"

      - name: build
        description: Build the Atmos binary
        steps:
          - atmos build

      - name: shell
        description: Start a development shell with build/ first on PATH
        steps:
          - type: exec
            command: |
              set -euo pipefail
              root="$(git rev-parse --show-toplevel)"
              cd "$root"
              export PATH="$root/build:$PATH"
              exec "${SHELL:-/bin/sh}"

      - name: validate
        description: Validate code by running build, lint, and tests
        steps:
          - |
            set -euo pipefail
            echo "Building..."
            atmos build

            echo "Linting..."
            if command -v golangci-lint >/dev/null 2>&1; then
              golangci-lint run --config=.golangci.yml
            else
              echo "golangci-lint not found, falling back to go vet..."
              go vet ./...
            fi

            echo "Testing..."
            atmos test short

            echo "Validation complete."

      - name: quick
        description: Quick build and test
        steps:
          - |
            set -euo pipefail
            echo "Running quick build and test..."
            atmos build
            atmos test short
            echo "Quick check complete."

      - name: coverage
        description: Run tests with coverage report
        steps:
          - atmos test coverage
