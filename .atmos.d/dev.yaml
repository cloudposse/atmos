commands:
  - name: dev
    description: Development workflow commands for Atmos development
    commands:
      - name: setup
        description: Set up local development environment
        steps:
          - |
            echo "Setting up Atmos development environment..."

            echo "1. Installing Go dependencies..."
            go mod download

            echo "2. Installing pre-commit and golangci-lint..."
            if ! command -v pre-commit >/dev/null 2>&1; then
              if command -v brew >/dev/null 2>&1; then
                echo "Installing pre-commit via Homebrew..."
                brew install pre-commit
              elif command -v apt-get >/dev/null 2>&1; then
                echo "Installing pre-commit via apt..."
                sudo apt-get update && sudo apt-get install -y pre-commit
              else
                echo "Installing pre-commit via pip..."
                pip install --user pre-commit || pip install pre-commit
              fi
            else
              echo "pre-commit is already installed: $(pre-commit --version)"
            fi

            if ! command -v golangci-lint >/dev/null 2>&1; then
              if command -v brew >/dev/null 2>&1; then
                echo "Installing golangci-lint via Homebrew..."
                brew install golangci-lint
              else
                echo "Installing golangci-lint via curl..."
                curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b "$(go env GOPATH)/bin"
              fi
            else
              echo "golangci-lint is already installed: $(golangci-lint --version)"
            fi

            echo "3. Installing pre-commit hooks..."
            pre-commit install

            echo "4. Installing Go tools..."
            go install mvdan.cc/gofumpt@latest

            echo "Development environment setup complete."
            echo ""
            echo "Run 'atmos check staged' to check staged files (read-only)"
            echo "Run 'atmos check pr' to check PR changes (read-only)"
            echo "Run 'atmos format staged' to auto-format staged files"
            echo "Run 'atmos format pr' to auto-format PR changes"

      - name: build
        description: Build the Atmos binary
        steps:
          - atmos build

      - name: shell
        description: Start a development shell with build/ first on PATH
        # Custom commands install only explicitly declared dependencies. Keep
        # this in sync with the development tool pins in .tool-versions so a
        # fresh `atmos dev shell` is immediately usable after cache cleanup.
        dependencies:
          tools:
            hashicorp/terraform: 1.15.6
            opentofu/opentofu: 1.12.2
            peteretelej/tree: v1.3.0
            sharkdp/bat: v0.26.1
            tofu: v1.11.6
        steps:
          - type: exec
            command: |
              set -eu
              root="$(git rev-parse --show-toplevel)"
              cd "$root"
              export ATMOS_DEV_SHELL=1
              export PATH="$root/build:$PATH"
              exec "${SHELL:-/bin/sh}"

      - name: validate
        description: Validate code by running build, lint, and tests
        env: &go_auto_env
          GOTOOLCHAIN: auto
        steps:
          - type: toast
            level: info
            content: Building...
          - type: atmos
            command: build
          - type: toast
            level: info
            content: Linting...
          - |
            set -eu
            if ! command -v golangci-lint >/dev/null 2>&1; then
              echo "golangci-lint not found; run 'atmos dev setup' first."
              exit 1
            fi
            golangci-lint run --config=.golangci.yml
          - type: toast
            level: info
            content: Testing...
          - type: atmos
            command: test short
          - type: toast
            level: success
            content: Validation complete.

      - name: quick
        description: Quick build and test
        env: *go_auto_env
        steps:
          - type: toast
            level: info
            content: Running quick build and test...
          - type: atmos
            command: build
          - type: atmos
            command: test short
          - type: toast
            level: success
            content: Quick check complete.

      - name: coverage
        description: Run tests with coverage report
        steps:
          - atmos test coverage

      - name: generate
        description: Generate development artifacts
        commands:
          - name: notices
            description: Regenerate NOTICE from Go dependency licenses
            # No working_directory here: scripts/generate-notice.sh already
            # resolves the repo root itself via its own script path. Avoiding
            # the !repo-root tag also keeps this file parseable by the older
            # bootstrap atmos binary used to self-host CI's first build (see
            # .atmos.d/build.yaml for the same constraint).
            env: *go_auto_env
            steps:
              - type: spin
                title: Generating NOTICE from Go dependency licenses
                command: cd "$(git rev-parse --show-toplevel)" && ./scripts/generate-notice.sh
                timeout: 10m
              - type: toast
                level: success
                content: NOTICE regenerated.

          - name: mocks
            description: Regenerate auth/http mocks using go:generate directives
            env: *go_auto_env
            steps:
              - type: atmos
                command: test generate-auth-http-mocks

          - name: snapshots
            description: Regenerate CLI golden snapshots
            # No working_directory here (see the "notices" command above for
            # why): cd's to the repo root inline in the step below instead.
            env:
              - key: GOTOOLCHAIN
                value: auto
              - key: ATMOS_SNAPSHOT_FILTER
                value: "{{ .Flags.filter }}"
            flags:
              - name: all
                type: bool
                description: Regenerate all CLI golden snapshots
                default: false
              - name: filter
                type: string
                description: Go test -run regex for focused CLI snapshot regeneration
                default: ""
            steps:
              - type: shell
                command: |
                  set -eu
                  cd "$(git rev-parse --show-toplevel)"
                  filter="${ATMOS_SNAPSHOT_FILTER:-}"

                  selected=0
                  [ "{{ .Flags.all }}" = "true" ] && selected=$((selected + 1))
                  [ -n "$filter" ] && selected=$((selected + 1))

                  if [ "$selected" -ne 1 ]; then
                    echo "Usage: atmos dev generate snapshots --all" >&2
                    echo "   or: atmos dev generate snapshots --filter '<go-test-run-regex>'" >&2
                    echo "Select exactly one of --all or --filter." >&2
                    exit 1
                  fi

                  if [ "{{ .Flags.all }}" = "true" ]; then
                    go test ./tests -v -count=1 -timeout 40m -regenerate-snapshots
                  else
                    go test ./tests -v -count=1 -timeout 40m -run "$filter" -regenerate-snapshots
                  fi

          - name: schema
            description: Regenerate the atmos-manifest JSON Schema website copy from the embedded schema
            # No working_directory here (see the "notices" command above for why).
            env:
              <<: *go_auto_env
              # go run . builds the whole atmos binary graph, which pulls in cgo-linked
              # hardware-security-key deps (e.g. github.com/bearsh/hid) that need system
              # libudev headers most CI runners don't have. atmos itself always builds
              # with CGO disabled (see .goreleaser.yml, scripts/build-atmos.sh), so match
              # that here too.
              CGO_ENABLED: "0"
              SCHEMA_OUTPUT: website/static/schemas/atmos/atmos-manifest/1.0/atmos-manifest.json
            steps:
              - type: spin
                title: Generating atmos-manifest schema
                command: go run . stack schema {{ .env.SCHEMA_OUTPUT }}
                timeout: 2m
              - type: toast
                level: success
                content: atmos-manifest schema regenerated at {{ .env.SCHEMA_OUTPUT }}.
