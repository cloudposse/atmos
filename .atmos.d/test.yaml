commands:
  - name: test
    description: Test commands for Atmos development
    commands:
      - name: acc
        description: Run acceptance tests
        steps:
          - |
            set -euo pipefail
            atmos build deps
            echo "Running acceptance tests"
            go test ${TEST:-$(go list ./...)} ${TESTARGS:-} -timeout 40m

      - name: acc-cover
        description: Run acceptance tests with subprocess coverage collection
        steps:
          - |
            set -euo pipefail
            atmos build deps
            scripts/collect-coverage.sh "${TEST:-$(go list ./...)}" "${TESTARGS:-}"

      - name: acc-coverage
        description: Run acceptance tests and generate an HTML coverage report
        steps:
          - |
            set -euo pipefail
            atmos test acc-cover
            go tool cover -html=coverage.out -o coverage.html
            echo "Coverage report generated: coverage.html"

      - name: short
        description: Run quick tests only
        steps:
          - |
            set -euo pipefail
            atmos build deps
            echo "Running quick tests (skipping long-running tests)"
            go test -short ${TEST:-$(go list ./...)} ${TESTARGS:-} -timeout 5m

      - name: short-cover
        description: Run quick tests with coverage
        steps:
          - |
            set -euo pipefail
            atmos build deps
            echo "Running quick tests with coverage (skipping long-running tests)"
            GOCOVERDIR=coverage go test -short -cover ${TEST:-$(go list ./...)} ${TESTARGS:-} -timeout 5m

      - name: coverage
        description: Run tests with coverage report
        steps:
          - |
            set -euo pipefail
            atmos build deps
            echo "Running tests with coverage"
            go test -coverprofile=coverage.out ${TEST:-$(go list ./...)} ${TESTARGS:-}
            go tool cover -html=coverage.out -o coverage.html
            echo "Coverage report generated: coverage.html"

      - name: race
        description: Run quick tests with race detector and shuffled order
        steps:
          - |
            set -euo pipefail
            atmos build deps
            echo "Running tests with -race -shuffle=on"
            CGO_ENABLED=1 go test -race -shuffle=on ${TEST:-$(go list ./...)} ${TESTARGS:-} -timeout 10m

      - name: generate-mocks
        description: Regenerate mocks using go:generate directives
        steps:
          - |
            set -euo pipefail
            echo "Regenerating mocks using go:generate directives..."
            go generate ./pkg/auth/types/...
            go generate ./pkg/http/...
            echo "Mocks regenerated successfully"
