commands:
  - name: test
    description: Test commands for Atmos development
    flags:
      - name: short
        type: bool
        description: Run quick tests only
        default: false
      - name: full
        type: bool
        description: Run the full acceptance test suite
        default: false
      - name: coverage
        type: bool
        description: Run full tests and generate an HTML coverage report
        default: false
      - name: race
        type: bool
        description: Run quick tests with race detector and shuffled order
        default: false
      - name: generate-mocks
        type: bool
        description: Regenerate mocks using go:generate directives
        default: false
    steps:
      - type: shell
        command: |
          set -eu

          selected=0
          [ "{{ .Flags.short }}" = "true" ] && selected=$((selected + 1))
          [ "{{ .Flags.full }}" = "true" ] && selected=$((selected + 1))
          [ "{{ .Flags.coverage }}" = "true" ] && selected=$((selected + 1))
          [ "{{ .Flags.race }}" = "true" ] && selected=$((selected + 1))
          [ "{{ index .Flags "generate-mocks" }}" = "true" ] && selected=$((selected + 1))

          if [ "$selected" -gt 1 ]; then
            echo "Select only one test mode: --short, --full, --coverage, --race, or --generate-mocks" >&2
            exit 1
          fi
      - type: atmos
        command: >-
          test
          {{- if .Flags.full }} acc
          {{- else if .Flags.coverage }} acc-coverage
          {{- else if .Flags.race }} race
          {{- else if index .Flags "generate-mocks" }} generate-mocks
          {{- else }} short
          {{- end }}
    commands:
      - name: acc
        description: Run acceptance tests
        env: &go_auto_env
          - &go_auto_toolchain
            key: GOTOOLCHAIN
            value: auto
          - &go_cgo_disabled
            key: CGO_ENABLED
            value: "0"
        steps:
          - type: atmos
            command: build deps
          - type: shell
            command: go test ${TEST:-$(go list ./...)} ${TESTARGS:-} -timeout 40m

      - name: acc-cover
        description: Run acceptance tests with subprocess coverage collection
        env: *go_auto_env
        steps:
          - type: atmos
            command: build deps
          - type: shell
            command: scripts/collect-coverage.sh "${TEST:-$(go list ./...)}" "${TESTARGS:-}"

      - name: acc-coverage
        description: Run acceptance tests and generate an HTML coverage report
        env: *go_auto_env
        steps:
          - type: atmos
            command: test acc-cover
          - type: shell
            command: go tool cover -html=coverage.out -o coverage.html

      - name: short
        description: Run quick tests only
        env: *go_auto_env
        steps:
          - type: atmos
            command: build deps
          - type: shell
            command: go test -short ${TEST:-$(go list ./...)} ${TESTARGS:-} -timeout 5m

      - name: short-cover
        description: Run quick tests with coverage
        env:
          - *go_auto_toolchain
          - *go_cgo_disabled
          - key: GOCOVERDIR
            value: coverage
        steps:
          - type: atmos
            command: build deps
          - type: shell
            command: go test -short -cover ${TEST:-$(go list ./...)} ${TESTARGS:-} -timeout 5m

      - name: coverage
        description: Run tests with coverage report
        env: *go_auto_env
        steps:
          - type: atmos
            command: build deps
          - type: shell
            command: go test -coverprofile=coverage.out ${TEST:-$(go list ./...)} ${TESTARGS:-}
          - type: shell
            command: go tool cover -html=coverage.out -o coverage.html

      - name: race
        description: Run quick tests with race detector and shuffled order
        env:
          - key: GOTOOLCHAIN
            value: auto
          - key: CGO_ENABLED
            value: "1"
        steps:
          - type: atmos
            command: build deps
          - type: shell
            command: go test -race -shuffle=on ${TEST:-$(go list ./...)} ${TESTARGS:-} -timeout 10m

      - name: generate-mocks
        description: Regenerate mocks using go:generate directives
        env: *go_auto_env
        steps:
          - type: shell
            command: go generate ./pkg/auth/types/...
          - type: shell
            command: go generate ./pkg/http/...
