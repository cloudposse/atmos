commands:
  - name: build
    description: Build and documentation commands for Atmos development
    default: binary
    # No working_directory here (unlike other custom commands): this command
    # bootstraps the very first build using a pinned, possibly-older atmos
    # release (see .github/workflows/version-tracker.yaml's
    # ATMOS_BOOTSTRAP_VERSION), so it must not depend on YAML tags newer than
    # that pin (e.g. !repo-root). Each step below resolves the repo root
    # itself via `git rev-parse --show-toplevel` instead.
    env: &build_env
      - key: GOTOOLCHAIN
        value: auto
      - key: ATMOS_BUILD_TARGET
        value: "{{ .Flags.target }}"
      - key: ATMOS_BUILD_VERSION
        value: "{{ .Flags.version }}"
    flags:
      - name: target
        description: "Build target: default, linux, windows, macos, or macos-intel"
        default: default
      - name: version
        description: Version string to embed in the binary
        default: test
    steps:
      - type: toast
        level: info
        content: Building Atmos...
      - &build_binary_step |
          set -eu
          sh scripts/build-atmos.sh "${ATMOS_BUILD_TARGET:-default}" "${ATMOS_BUILD_VERSION:-test}"
      - &build_success_step
        type: toast
        level: success
        content: 'Atmos binary built successfully: `./build/atmos{{ if eq .Flags.target "windows" }}.exe{{ end }}`'
      - &build_dev_shell_hint_step
        type: hint
        when: '!("ATMOS_DEV_SHELL" in env) || env["ATMOS_DEV_SHELL"] != "1"'
        content: 'Run `atmos dev shell` so `atmos` resolves to `./build/atmos`.'
    commands:
      - name: deps
        description: Download Go module dependencies, retrying on transient network failures
        env:
          - key: GOTOOLCHAIN
            value: auto
        steps:
          - command: cd "$(git rev-parse --show-toplevel)" && go mod download
            type: shell
            retry:
              max_attempts: 3
              initial_delay: 10s
              backoff_strategy: constant

      - name: binary
        description: Build the Atmos binary
        env: *build_env
        flags:
          - name: target
            description: "Build target: default, linux, windows, macos, or macos-intel"
            default: default
          - name: version
            description: Version string to embed in the binary
            default: test
        steps:
          - type: toast
            level: info
            content: Building Atmos...
          - *build_binary_step
          - *build_success_step
          - *build_dev_shell_hint_step

      - name: version
        description: Print the version from an already-built Atmos binary
        env:
          - key: ATMOS_BUILD_TARGET
            value: "{{ .Flags.target }}"
        flags:
          - name: target
            description: "Build target: default, linux, windows, macos, or macos-intel"
            default: default
        steps:
          - |
            set -eu
            cd "$(git rev-parse --show-toplevel)"

            target="${ATMOS_BUILD_TARGET:-default}"

            case "$target" in
              windows)
                ./build/atmos.exe version
                ;;
              default|linux|macos|macos-intel)
                chmod +x ./build/atmos
                ./build/atmos version
                ;;
              *)
                echo "Unsupported version target: $target" >&2
                echo "Expected one of: default, linux, windows, macos, macos-intel" >&2
                exit 1
                ;;
            esac

      - name: readme
        description: Regenerate README.md from README.yaml
        env:
          - key: GOTOOLCHAIN
            value: auto
        steps:
          - |
            set -eu
            cd "$(git rev-parse --show-toplevel)"
            atmos build
            ./build/atmos docs generate readme
