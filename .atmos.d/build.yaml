commands:
  - name: build
    description: Build and documentation commands for Atmos development
    default: binary
    env: &go_auto_env
      - key: GOTOOLCHAIN
        value: auto
    flags:
      - name: target
        description: "Build target: default, linux, windows, macos, or macos-intel"
        default: default
      - name: version
        description: Version string to embed in the binary
        default: test
    steps:
      - type: toast
        level: info
        content: Building Atmos...
      - &build_binary_step |
          set -eu

          target="{{ .Flags.target }}"
          version="{{ .Flags.version }}"

          case "$target" in
            default)
              goos="${GOOS:-}"
              goarch="${GOARCH:-}"
              output="build/atmos"
              ;;
            linux)
              goos="linux"
              goarch="${GOARCH:-}"
              output="build/atmos"
              ;;
            windows)
              goos="windows"
              goarch="${GOARCH:-}"
              output="build/atmos.exe"
              ;;
            macos)
              goos="darwin"
              goarch="${GOARCH:-}"
              output="build/atmos"
              ;;
            macos-intel)
              goos="darwin"
              goarch="amd64"
              output="build/atmos"
              ;;
            *)
              echo "Unsupported build target: $target" >&2
              echo "Expected one of: default, linux, windows, macos, macos-intel" >&2
              exit 1
              ;;
          esac

          export CGO_ENABLED="${CGO_ENABLED:-0}"
          if [ "$(git rev-parse --git-dir 2>/dev/null)" != "$(git rev-parse --git-common-dir 2>/dev/null)" ]; then
            export GOFLAGS="${GOFLAGS:--buildvcs=false}"
          fi

          go mod download

          mkdir -p build

          env ${goos:+GOOS=$goos} ${goarch:+GOARCH=$goarch} \
            go build -o "$output" -v \
            -ldflags "-X 'github.com/cloudposse/atmos/pkg/version.Version=$version'"
    commands:
      - name: deps
        description: Download Go module dependencies
        env: *go_auto_env
        steps:
          - go mod download

      - name: binary
        description: Build the Atmos binary
        env: *go_auto_env
        flags:
          - name: target
            description: "Build target: default, linux, windows, macos, or macos-intel"
            default: default
          - name: version
            description: Version string to embed in the binary
            default: test
        steps:
          - type: toast
            level: info
            content: Building Atmos...
          - *build_binary_step

      - name: version
        description: Print the version from an already-built Atmos binary
        flags:
          - name: target
            description: "Build target: default, linux, windows, macos, or macos-intel"
            default: default
        steps:
          - |
            set -eu

            case "{{ .Flags.target }}" in
              windows)
                ./build/atmos.exe version
                ;;
              default|linux|macos|macos-intel)
                chmod +x ./build/atmos
                ./build/atmos version
                ;;
              *)
                echo "Unsupported version target: {{ .Flags.target }}" >&2
                echo "Expected one of: default, linux, windows, macos, macos-intel" >&2
                exit 1
                ;;
            esac

      - name: readme
        description: Regenerate README.md from README.yaml
        env: *go_auto_env
        steps:
          - |
            set -eu
            atmos build
            ./build/atmos docs generate readme
