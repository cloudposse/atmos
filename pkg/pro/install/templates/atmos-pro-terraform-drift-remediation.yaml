# Atmos Pro - Drift Remediation workflow.
# Triggered when a drift issue is labeled for remediation.
#
# Prerequisites:
#   - Configure the `profiles/github/atmos.yaml` auth profile
#   - Set the `ATMOS_VERSION` repository variable in GitHub Settings
#
# See: https://atmos-pro.com/docs/howto/aws
name: Atmos Pro - Drift Remediation

on:
  issues:
    types:
      - labeled

permissions:
  id-token: write
  contents: read
  issues: write

jobs:
  remediate:
    if: contains(github.event.issue.labels.*.name, 'remediate')
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cloudposse/atmos:${{ vars.ATMOS_VERSION }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6

      - name: Remediate Drift
        env:
          ATMOS_PROFILE: github
        run: |
          atmos pro drift remediate --issue ${{ github.event.issue.number }}
