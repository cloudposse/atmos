# Atmos Pro stack mixin.
# Configures Atmos Pro workflow triggers for plan/apply operations.
#
# Import this mixin in your stack defaults to enable Atmos Pro integration.
#
# See: https://atmos-pro.com/docs/howto/aws
plan-wf-config: &plan-wf-config
  atmos-pro-terraform-plan.yaml:
    inputs:
      component: "{{ .atmos_component }}"
      stack: "{{ .atmos_stack }}"

apply-wf-config: &apply-wf-config
  atmos-pro-terraform-apply.yaml:
    inputs:
      component: "{{ .atmos_component }}"
      stack: "{{ .atmos_stack }}"

settings:
  pro:
    enabled: false # Enable on a stack-by-stack basis in _defaults.yaml.
    pull_request:
      opened:
        workflows: *plan-wf-config
      synchronize:
        workflows: *plan-wf-config
      reopened:
        workflows: *plan-wf-config
      # merged is a custom event for Atmos Pro that is triggered when a PR is closed and merged.
      merged:
        workflows: *apply-wf-config
