# Atmos Pro GitHub Actions auth profile.
# Configure OIDC authentication for GitHub Actions workflows.
#
# Replace placeholder values:
#   - <region>: Your AWS region (e.g., us-east-2)
#   - <role-arn>: IAM role ARN for Terraform operations
#
# See: https://atmos-pro.com/docs/howto/aws
auth:
  providers:
    github-oidc:
      kind: github/oidc
      region: <region>
      spec:
        audience: sts.amazonaws.com

  identities:
    terraform:
      default: true
      kind: aws/assume-role
      via:
        provider: github-oidc
      principal:
        assume_role: <role-arn>
