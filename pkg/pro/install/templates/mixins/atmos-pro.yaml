# Atmos Pro stack mixin.
# Import this mixin to configure Atmos Pro workflow triggers.
#
# This mixin configures which GitHub Actions workflows Atmos Pro dispatches
# for each event (PR opened/merged, drift detection/remediation).
#
# Auth profiles (profiles/github-plan/ and profiles/github-apply/) handle
# OIDC authentication and per-account identity mapping separately.
#
# Usage:
#   import:
#     - mixins/atmos-pro
settings:
  pro:
    enabled: false
    drift_detection:
      enabled: true
      detect:
        workflows:
          atmos-pro-terraform-plan.yaml:
            inputs:
              component: "{{ .atmos_component }}"
              stack: "{{ .atmos_stack }}"
      remediate:
        workflows:
          atmos-pro-terraform-apply.yaml:
            inputs:
              component: "{{ .atmos_component }}"
              stack: "{{ .atmos_stack }}"
    pull_request:
      opened: &plan-workflow
        workflows:
          atmos-pro-terraform-plan.yaml:
            inputs:
              component: "{{ .atmos_component }}"
              stack: "{{ .atmos_stack }}"
      synchronize: *plan-workflow
      reopened: *plan-workflow
      merged:
        workflows:
          atmos-pro-terraform-apply.yaml:
            inputs:
              component: "{{ .atmos_component }}"
              stack: "{{ .atmos_stack }}"
              github_environment: "{{ .vars.tenant }}-{{ .vars.stage }}"
