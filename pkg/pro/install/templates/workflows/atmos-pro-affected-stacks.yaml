# Atmos Pro - Determine Affected Stacks.
# Runs on pull request events to identify which stacks are affected by code changes
# and uploads the result to Atmos Pro for orchestration.
#
# Prerequisites:
#   - Set the ATMOS_PRO_WORKSPACE_ID repository variable
#   - Set the ATMOS_VERSION repository variable
#   - Configure profiles/github-plan/atmos.yaml with your AWS account identities
#
# See: https://atmos.tools/pro/
name: "Atmos Pro - Determine Affected Stacks"

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - closed
    branches:
      - main

concurrency:
  group: "${{ github.ref }}"
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  affected:
    name: Trigger Affected Stacks
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cloudposse/atmos:${{ vars.ATMOS_VERSION }}

    if: |
      !contains(github.event.pull_request.labels.*.name, 'no-apply') &&
      (github.event.action != 'closed' || (github.event.action == 'closed' && github.event.pull_request.merged == true))

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Determine Affected Stacks
        env:
          ATMOS_PRO_WORKSPACE_ID: ${{ vars.ATMOS_PRO_WORKSPACE_ID }}
          ATMOS_PROFILE: github-plan
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: atmos describe affected --upload
