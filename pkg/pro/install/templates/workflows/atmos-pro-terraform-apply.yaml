# Atmos Pro - Terraform Apply workflow.
# Dispatched by Atmos Pro when a pull request is merged.
#
# Prerequisites:
#   - Set the ATMOS_PRO_WORKSPACE_ID repository variable
#   - Set the ATMOS_VERSION repository variable
#   - Configure profiles/github-apply/atmos.yaml with your AWS account identities
#   - Create GitHub Environments matching your tenant-stage naming convention
#
# See: https://atmos.tools/pro/
name: "Atmos Pro - Terraform Apply"

on:
  workflow_dispatch:
    inputs:
      sha:
        description: "Commit SHA"
        type: string
      component:
        description: "Atmos component"
        required: true
        type: string
      stack:
        description: "Atmos stack"
        required: true
        type: string
      github_environment:
        description: "GitHub Environment"
        required: true
        type: string

concurrency:
  group: "${{ inputs.stack }}-${{ inputs.component }}"
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read
  checks: write
  statuses: write

jobs:
  atmos-apply:
    name: ${{ inputs.component }}-${{ inputs.stack }}
    environment: ${{ inputs.github_environment }}
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cloudposse/atmos:${{ vars.ATMOS_VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.sha || github.sha }}

      - name: Apply Atmos Component
        env:
          ATMOS_PRO_WORKSPACE_ID: ${{ vars.ATMOS_PRO_WORKSPACE_ID }}
          ATMOS_PROFILE: github-apply
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMPONENT: ${{ inputs.component }}
          STACK: ${{ inputs.stack }}
        run: atmos terraform deploy "${COMPONENT}" -s "${STACK}" --upload-status
