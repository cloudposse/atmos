# Atmos Pro - Drift Detection workflow.
# Runs on a schedule to detect Terraform drift across all components and stacks.
#
# Prerequisites:
#   - Configure the `profiles/github/atmos.yaml` auth profile
#   - Set the `ATMOS_VERSION` repository variable in GitHub Settings
#
# See: https://atmos-pro.com/docs/howto/aws
name: Atmos Pro - Drift Detection

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read
  issues: write

jobs:
  detect:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cloudposse/atmos:${{ vars.ATMOS_VERSION }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6

      - name: Detect Drift
        env:
          ATMOS_PROFILE: github
        run: |
          atmos pro drift detect
