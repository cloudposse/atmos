# NOTE: logging defaults (logs.file, logs.level) intentionally do NOT live here.
# This file merges into Viper's CONFIG layer, which outranks the defaults layer —
# a key set here can never be rolled back by an edition pin (see pkg/edition) and
# silently shadows setDefaultConfiguration in pkg/config/load.go. Journaled keys
# must stay out of this file (enforced by TestJournalKeysNotInEmbeddedConfig).

diagnostics:
  # Machine-readable JSONL diagnostic events. Disabled by default.
  # Can also be set using 'ATMOS_DIAGNOSTICS_ENABLED' ENV var.
  enabled: false
  # Can also be set using 'ATMOS_DIAGNOSTICS_FILE' ENV var.
  file: ""
  # Include masked subprocess stdout/stderr chunks in diagnostics.
  # Can also be set using 'ATMOS_DIAGNOSTICS_INCLUDE_OUTPUT' ENV var.
  include_output: false

settings:
  telemetry:
    enabled: true
    endpoint: "https://us.i.posthog.com"
    token: "phc_7s7MrHWxPR2if1DHHDrKBRgx7SvlaoSM59fIiQueexS"
    logging: false
