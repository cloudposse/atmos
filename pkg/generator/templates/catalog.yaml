# Atmos scaffold catalog.
#
# Advertises the distributable, emulator-validated project scaffolds that
# `atmos init <name>` and `atmos scaffold generate <name>` can produce. Entries
# are listed cheaply (no download); the template is only fetched from `source`
# when one is selected.
#
# The content lives in this repository under examples/scaffolds/<cloud>/<key>/
# and is fetched remotely via a go-getter git-subdir URL. CI resolves these from
# the working tree instead of the network by setting
# ATMOS_SCAFFOLD_SOURCE_OVERRIDE=<repo>/examples/scaffolds.
#
# `source` intentionally has no `?ref=`: CatalogEntry.ResolvedSource appends one
# at runtime, pinned to `version.Commit` (the exact commit this atmos binary was
# built from — see scripts/build-atmos.sh and .goreleaser*.yml). That makes
# every build, not just tagged releases, resolve against content that actually
# exists at that commit, including on unmerged branches. Binaries built without
# ldflags (`go run`, `go install`) fall back to `main`.
apiVersion: atmos/v1
kind: AtmosScaffoldCatalog
templates:
  - name: aws/app
    cloud: aws
    tier: app
    version: v1.0.0
    description: AWS application SDLC repository — dev/staging/prod stacks, native CI, and one emulator-proven app component.
    source: github.com/cloudposse/atmos.git//examples/scaffolds/aws/app
  - name: aws/landing-zone
    cloud: aws
    tier: landing-zone
    version: v2.0.0
    description: AWS landing zone — dev/staging/prod environments with a conventional baseline (audit trail, KMS, SSM, monitoring, IAM), provisioned end to end on the local emulator.
    source: github.com/cloudposse/atmos.git//examples/scaffolds/aws/landing-zone
  - name: gcp/landing-zone
    cloud: gcp
    tier: landing-zone
    version: v1.0.0
    description: GCP landing zone — dev/staging/prod environments with GCS, Secret Manager, service account, and bucket IAM, provisioned on the local emulator.
    source: github.com/cloudposse/atmos.git//examples/scaffolds/gcp/landing-zone
  - name: azure/landing-zone
    cloud: azure
    tier: landing-zone
    version: v1.0.0
    description: Azure landing zone — dev/staging/prod environments with resource group, virtual network, subnet, and NSG, provisioned on the local emulator.
    source: github.com/cloudposse/atmos.git//examples/scaffolds/azure/landing-zone
