name: 'Set up and Build Atmos'
description: 'Set up Go, bootstrap Atmos via github-action-setup-atmos, then build Atmos from source and add it to PATH'

inputs:
  atmos-bootstrap-version:
    description: 'Atmos version to install for bootstrapping (running repo-local custom commands)'
    required: true

runs:
  using: composite
  steps:
    - name: Set up Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
      with:
        go-version-file: "go.mod"

    - name: Set up Atmos
      uses: cloudposse/github-action-setup-atmos@82ed6d959532148e602fbbbe28b95c4628081561 # v3.1.0
      with:
        atmos-version: ${{ inputs.atmos-bootstrap-version }}
        install-wrapper: false

    - name: Build Atmos
      shell: bash
      run: |
        # TODO: switch back to `atmos build --target linux` after the bug
        # fix for running repo-local custom commands is in the bootstrap Atmos version.
        sh scripts/build-atmos.sh linux test
        echo "${{ github.workspace }}/build" >> "$GITHUB_PATH"
