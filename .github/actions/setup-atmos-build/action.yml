name: 'Set up and Build Atmos'
description: 'Set up Go, build Atmos from source, and add it to PATH'

runs:
  using: composite
  steps:
    - name: Set up Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
      with:
        go-version-file: "go.mod"

    - name: Build Atmos
      shell: bash
      run: |
        # This script is standalone and builds the checked-out source directly;
        # it does not require a previously installed Atmos binary.
        sh scripts/build-atmos.sh linux test
        echo "${{ github.workspace }}/build" >> "$GITHUB_PATH"
