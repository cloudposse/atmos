name: Set up Colima
description: Installs Colima dependencies, starts Colima, and verifies Docker is ready.

runs:
  using: composite
  steps:
    - name: Start Docker-compatible runtime on macOS
      shell: bash
      run: |
        set -euo pipefail

        run_with_timeout() {
          local timeout_seconds="$1"
          shift

          "$@" &
          local cmd_pid=$!

          (
            sleep "$timeout_seconds"
            if kill -0 "$cmd_pid" 2>/dev/null; then
              echo "::error::Timed out after ${timeout_seconds}s: $*"
              kill -TERM "$cmd_pid" 2>/dev/null || true
              sleep 10
              kill -KILL "$cmd_pid" 2>/dev/null || true
            fi
          ) &
          local timer_pid=$!

          local status=0
          wait "$cmd_pid" || status=$?
          kill "$timer_pid" 2>/dev/null || true
          wait "$timer_pid" 2>/dev/null || true
          return "$status"
        }

        diagnose_colima() {
          echo "::group::Colima diagnostics"
          colima status || true
          limactl list || true
          pgrep -fl 'colima|lima|qemu' || true
          for log in "$HOME"/.colima/_lima/colima/serial*.log "$HOME"/.colima/_lima/colima/ha.stderr.log; do
            if [ -f "$log" ]; then
              echo "---- $log ----"
              tail -n 200 "$log" || true
            fi
          done
          echo "::endgroup::"
        }

        if brew tap | grep -qx 'aws/tap'; then
          brew untap aws/tap
        fi

        run_with_timeout 600 brew install colima docker qemu

        for attempt in 1 2; do
          echo "::group::Start Colima attempt ${attempt}"
          if run_with_timeout 720 colima start --runtime docker --vm-type qemu --cpu 2 --memory 4 --disk 20; then
            echo "::endgroup::"
            break
          fi

          status=$?
          echo "::endgroup::"
          diagnose_colima

          run_with_timeout 180 colima delete -f || true

          if [ "$attempt" -eq 2 ]; then
            exit "$status"
          fi

          sleep 5
        done

        docker context use colima || true
        run_with_timeout 120 docker version
