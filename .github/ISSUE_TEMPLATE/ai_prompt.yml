---
name: AI Prompt (Feature Request)
description: Submit a prompt describing a feature or improvement you'd like AI to help build
labels: ["ai-prompt", "feature request"]
assignees: [""]
body:
  - type: markdown
    attributes:
      value: |
        Describe what you want in plain language. Write it as if you're giving
        instructions to an AI assistant. Be as specific or as broad as you like.

  - type: textarea
    id: prompt
    attributes:
      label: Prompt
      description: Describe the feature or improvement you'd like to see.
      placeholder: |
        e.g. "Add a command that lists all stacks where a specific component
        is used, with an option to filter by environment."
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: How would you know this is done? What should the result look like?
      placeholder: |
        e.g. "The command should output a table with stack name, environment,
        and component version columns."
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: |
        Links, screenshots, examples, or any other context that would help.
    validations:
      required: false
