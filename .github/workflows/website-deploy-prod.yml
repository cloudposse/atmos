name: "Website Deploy Prod"

on:
  workflow_dispatch:
  push:
    branches:
      - main
  release:
    types:
      - released

env:
  AWS_REGION: us-east-2
  IAM_ROLE_ARN: arn:aws:iam::557075604627:role/cplive-plat-ue2-prod-atmos-docs-gha
  IAM_ROLE_SESSION_NAME: cloudposse-atmos-ci-deploy-release
  S3_BUCKET_NAME: cplive-plat-ue2-prod-atmos-docs-origin
  DEPLOYMENT_HOST: atmos.tools

# These permissions are needed to interact with the GitHub's OIDC Token endpoint
permissions:
  id-token: write
  contents: read

jobs:
  website-deploy-prod:
    runs-on: ubuntu-latest

    environment:
      name: production
      url: https://${{ env.DEPLOYMENT_HOST }}

    steps:
      # https://github.com/marketplace/actions/configure-aws-credentials-action-for-github-actions
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.IAM_ROLE_ARN }}
          role-session-name: ${{ env.IAM_ROLE_SESSION_NAME }}

      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: "website/.nvmrc"

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: 9

      - name: Set up Go
        # setup-go v6 requires runner v2.327.1+ and can affect toolchain handling.
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: "go.mod"

      - name: Generate atmos-manifest schema
        # website/static/schemas/atmos/atmos-manifest/ is gitignored (see .gitignore) — it is
        # never hand-maintained or committed, only generated here from the embedded schema
        # (pkg/datafetcher/schema/atmos/manifest/1.0.json), the single source of truth. The
        # 1.0 path always floats to the schema shipped by the atmos version at HEAD.
        # CGO_ENABLED=0: `go run .` builds the whole atmos binary graph, which pulls in
        # cgo-linked hardware-security-key deps (e.g. github.com/bearsh/hid) that need
        # system libudev headers this runner doesn't have. atmos itself always builds with
        # CGO disabled (see .goreleaser.yml, scripts/build-atmos.sh); match that here too.
        env:
          CGO_ENABLED: "0"
        run: go run . stack schema website/static/schemas/atmos/atmos-manifest/1.0/atmos-manifest.json

      - name: Publish pinned atmos-manifest schema snapshot
        # Only on an actual GitHub release (not the push-to-main or workflow_dispatch
        # triggers): publish an immutable, version-pinned snapshot alongside the floating
        # 1.0 path, so users can pin `schemas.atmos.manifest` to the exact schema that
        # shipped with a given atmos release instead of always tracking HEAD. Closes #2592.
        if: ${{ github.event_name == 'release' }}
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          CGO_ENABLED: "0"
        run: |
          version="${RELEASE_TAG#v}"
          go run . stack schema "website/static/schemas/atmos/atmos-manifest/${version}/atmos-manifest.json"

      - name: Install Dependencies and Build Website
        run: |
          node --version
          cd website
          pnpm install --frozen-lockfile
          pnpm run build:site
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy Website to S3 Bucket
        run: |
          ./.github/scripts/s3-deploy-with-charset.sh \
            website/build \
            s3://${{ env.S3_BUCKET_NAME }}/

      - name: Trigger ReIndexing of atmos.tools and docs.cloudposse.com Docs
        run: |
          curl \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.TRIGGER_DOCS_REDEPLOY_WORKFLOW_REFARCH }}" \
            -H "Accept: application/vnd.github.everest-preview+json" \
            https://api.github.com/repos/cloudposse/refarch-scaffold/dispatches \
            -d '{"event_type": "reindex"}'

  # Algolia crawler config deploy + reindex are owned by .github/workflows/algolia.yaml,
  # which is triggered via workflow_run after this workflow succeeds. That ordering
  # guarantees the reindex runs against the freshly-deployed site AND the just-PATCHed
  # crawler config — neither can race the other.
