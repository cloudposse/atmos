---
name: Verify SHA Pinning
on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.github/actions/verify-sha-pinning/**'
  schedule:
    # Weekly Monday 9am UTC — catch upstream tag mutations
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/verify-sha-pinning
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
