# End-to-end test for the `github/artifacts` planfile store.
#
# This is the one path that CANNOT be exercised by a Go unit test: it needs a
# real GitHub Actions runner, because the backend talks to the GitHub Actions
# Artifacts API directly using the runner-only ACTIONS_RUNTIME_TOKEN /
# ACTIONS_RESULTS_URL credentials. GitHub withholds those from `run:` steps, so
# we dogfood the in-repo `actions/github-runtime` action (mode: env) to surface
# them — exactly the wiring documented at /ci/planfile-storage.
#
# Flow: plan --ci (uploads to github/artifacts) -> list -> download (round-trip).
name: Planfile Artifacts E2E

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'pkg/ci/artifact/**'
      - 'cmd/terraform/planfile/**'
      - 'pkg/ci/plugins/terraform/**'
      - 'actions/github-runtime/**'
      - 'tests/fixtures/scenarios/native-ci/**'
      - '.github/workflows/planfile-artifacts-e2e.yml'

permissions:
  contents: read
  actions: read # Required for the GITHUB_TOKEN to list/download artifacts via the REST API.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  planfile-artifacts:
    name: github/artifacts round-trip
    runs-on: ubuntu-latest
    env:
      # Pin the SHA so upload and readback derive the identical planfile key.
      ATMOS_CI_SHA: ${{ github.sha }}
      # Needed by `planfile list`/`download`, which read artifacts via the REST API.
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: "go.mod"

      - name: Build atmos
        run: |
          make build
          echo "$PWD/build" >> "$GITHUB_PATH"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_wrapper: false # atmos invokes terraform directly; the wrapper corrupts output parsing.

      # Surface the runner's ACTIONS_* credentials to every later run step.
      # This is the entire reason github/artifacts works from a `run:` step.
      - name: Expose GitHub Actions runtime credentials
        uses: ./actions/github-runtime
        with:
          mode: env

      - name: Plan (uploads planfile to github/artifacts)
        working-directory: tests/fixtures/scenarios/native-ci
        run: atmos terraform plan mycomponent -s prod --ci

      - name: List planfiles from github/artifacts
        working-directory: tests/fixtures/scenarios/native-ci
        run: |
          set -euo pipefail
          # Use the store TYPE (github/artifacts), not the named "github" store, so
          # owner/repo resolve from GITHUB_REPOSITORY (this run) — matching where the
          # runtime-API upload landed — instead of the fixture's hard-coded repo.
          atmos terraform planfile list --store=github/artifacts | tee list.out
          grep -Eq 'mycomponent|prod' list.out

      - name: Download planfile from github/artifacts
        working-directory: tests/fixtures/scenarios/native-ci
        run: |
          set -euo pipefail
          atmos terraform planfile download mycomponent -s prod \
            --store=github/artifacts -o "$RUNNER_TEMP/downloaded.planfile"
          test -s "$RUNNER_TEMP/downloaded.planfile"
          echo "Round-trip OK: planfile uploaded to and retrieved from GitHub Artifacts."
