name: "Website Preview Build"

on:
  workflow_dispatch:

  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - "website/**"

# These permissions are needed to interact with the GitHub's OIDC Token endpoint
permissions:
  id-token: write
  contents: read

jobs:
  website-deploy-preview:
    # Do not deploy the website to the preview environment if the PR has the label 'website-no-deploy'
    if: ${{ !contains(github.event.*.labels.*.name, 'website-no-deploy') }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: "website/.nvmrc"

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: 9

      - name: Set up Go
        # setup-go v6 requires runner v2.327.1+ and can affect toolchain handling.
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: "go.mod"

      - name: Generate atmos-manifest schema
        # website/static/schemas/atmos/atmos-manifest/ is gitignored (see .gitignore) — it is
        # never hand-maintained or committed, only generated here from the embedded schema
        # (pkg/datafetcher/schema/atmos/manifest/1.0.json), the single source of truth.
        # CGO_ENABLED=0: `go run .` builds the whole atmos binary graph, which pulls in
        # cgo-linked hardware-security-key deps (e.g. github.com/bearsh/hid) that need
        # system libudev headers this runner doesn't have. atmos itself always builds with
        # CGO disabled (see .goreleaser.yml, scripts/build-atmos.sh); match that here too.
        env:
          CGO_ENABLED: "0"
        run: go run . stack schema website/static/schemas/atmos/atmos-manifest/1.0/atmos-manifest.json

      - name: Install Dependencies and Build Website
        run: |
          node --version
          cd website
          pnpm install --frozen-lockfile
          pnpm run build:site
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEPLOYMENT_HOST: ${{ github.event.pull_request.number && format('pr-{0}.atmos-docs.ue2.dev.plat.cloudposse.org', github.event.pull_request.number) || '' }}
          # Landing-page demo videos are published out-of-band to the prod docs-origin
          # bucket (see .github/workflows/landing-demos.yaml) and are NOT in the git
          # checkout, so they're absent from this build. Point DemoVideo at the public
          # production copies so preview players aren't blank. Reflects current prod;
          # demo *changes* won't preview until published. See DemoVideo/index.js.
          ATMOS_DEMOS_BASE_URL: https://atmos.tools/img/demos

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: website
          path: website/build
          if-no-files-found: error
          retention-days: 1
