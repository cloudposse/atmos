name: landing-demos-debug
# Throwaway diagnostic harness for the landing-demos render hang.
#
# `atmos terraform init s3-bucket -s dev` (the off-camera step in demo/landing/dx.tape)
# hangs for the full VHS WaitTimeout (~6 min) in GitHub Actions Docker but works locally,
# so we can't reproduce it on a laptop. This workflow reproduces it WITHOUT VHS as raw
# shell, fails fast (timeout), captures Atmos + Terraform TRACE logs and Docker/network
# state to files, and uploads them as an artifact — so we can read the actual hang point.
#
# Manual only. Does not publish anything. Delete once the hang is diagnosed and fixed.
#
# Triggered by the `landing-demos-debug` PR label (workflow_dispatch only works once a
# workflow is on the default branch; this one lives only on the feature branch). Remove
# and re-apply the label to re-run.
on:
  workflow_dispatch:
  pull_request:
    types: [labeled]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'landing-demos-debug'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ATMOS_CONTAINER_RUNTIME: docker
      # Full Atmos + Terraform tracing to files we can upload (ATMOS_LOGS_FILE is honored
      # by pkg/config/config.go; TF_LOG_PATH captures the terraform subprocess).
      ATMOS_LOGS_LEVEL: Trace
      ATMOS_LOGS_FILE: ${{ github.workspace }}/diag/atmos.log
      TF_LOG: TRACE
      TF_LOG_PATH: ${{ github.workspace }}/diag/terraform.log
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # setup-go caches modules + build output by default (keyed on go.sum), so
      # re-dispatches rebuild in ~1-2 min for fast iteration.
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build atmos
        run: |
          make build
          echo "${{ github.workspace }}/build" >> "$GITHUB_PATH"

      # ATMOS_LOGS_FILE / TF_LOG_PATH point into diag/; create it before the first
      # atmos command (Atmos does not mkdir -p the log dir).
      - name: Prepare diagnostics dir
        run: mkdir -p "${{ github.workspace }}/diag"

      # Terraform is needed by `atmos terraform init demo` below.
      - name: Install Terraform via Atmos toolchain
        run: |
          atmos toolchain install hashicorp/terraform
          atmos toolchain env --format=github

      # HYPOTHESIS UNDER TEST: emulators.tape's off-camera `atmos terraform init demo`
      # hangs ~10 min, even though the emulator-not-running path (Manager.endpoint) already
      # fails fast. Faithfully reproduce the tape: bring up gcp/azure/k3s but NOT aws (the
      # tape's ordering bug), then run `terraform init demo` bounded by a timeout, with
      # Atmos + Terraform TRACE, to capture WHERE it actually blocks (emulator resolve vs
      # provider download vs in-process AWS SDK retry).
      - name: Reproduce emulators terraform init (bounded, instrumented)
        run: |
          set -uo pipefail
          D="${{ github.workspace }}/diag"
          cd demo/landing/fixtures/emulators
          atmos version > "$D/atmos-version.txt" 2>&1 || true

          echo "::group::bring up gcp/azure/k3s (NOT aws — reproduce the tape)"
          atmos terraform clean demo -s dev --everything --force --skip-lock-file > "$D/clean.txt" 2>&1 || true
          for e in aws gcp azure k3s; do atmos emulator reset "$e" -s dev --force > "$D/reset-$e.txt" 2>&1 || true; done
          atmos emulator up gcp   -s dev > "$D/up-gcp.txt"   2>&1 || true
          atmos emulator up azure -s dev > "$D/up-azure.txt" 2>&1 || true
          atmos emulator up k3s   -s dev > "$D/up-k3s.txt"   2>&1 || true
          atmos emulator up aws   -s dev > "$D/up-aws.txt"   2>&1 || true   # matches the fixed tape
          echo "::endgroup::"

          docker ps -a > "$D/docker-ps.txt" 2>&1 || true

          echo "::group::terraform init demo (aws UP) — bounded 150s"
          set +e
          ATMOS_LOGS_FILE="$D/init.log" timeout 150 atmos terraform init demo -s dev
          code=$?
          set -e
          echo "::endgroup::"
          echo "init_exit=$code" | tee "$D/init-exit.txt"   # 124 == hung; fast non-zero == fails fast
          ls -la "$D/terraform.log" 2>/dev/null && echo "terraform RAN" || echo "terraform did NOT run"
          true

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ttyd-toolchain-diagnostics
          path: ${{ github.workspace }}/diag/
          if-no-files-found: warn
