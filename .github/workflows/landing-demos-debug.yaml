name: landing-demos-debug
# Throwaway diagnostic harness for the landing-demos render hang.
#
# `atmos terraform init s3-bucket -s dev` (the off-camera step in demo/landing/dx.tape)
# hangs for the full VHS WaitTimeout (~6 min) in GitHub Actions Docker but works locally,
# so we can't reproduce it on a laptop. This workflow reproduces it WITHOUT VHS as raw
# shell, fails fast (timeout), captures Atmos + Terraform TRACE logs and Docker/network
# state to files, and uploads them as an artifact — so we can read the actual hang point.
#
# Manual only. Does not publish anything. Delete once the hang is diagnosed and fixed.
#
# Triggered by the `landing-demos-debug` PR label (workflow_dispatch only works once a
# workflow is on the default branch; this one lives only on the feature branch). Remove
# and re-apply the label to re-run.
on:
  workflow_dispatch:
  pull_request:
    types: [labeled]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'landing-demos-debug'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ATMOS_CONTAINER_RUNTIME: docker
      # Full Atmos + Terraform tracing to files we can upload (ATMOS_LOGS_FILE is honored
      # by pkg/config/config.go; TF_LOG_PATH captures the terraform subprocess).
      ATMOS_LOGS_LEVEL: Trace
      ATMOS_LOGS_FILE: ${{ github.workspace }}/diag/atmos.log
      TF_LOG: TRACE
      TF_LOG_PATH: ${{ github.workspace }}/diag/terraform.log
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # setup-go caches modules + build output by default (keyed on go.sum), so
      # re-dispatches rebuild in ~1-2 min for fast iteration.
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build atmos
        run: |
          make build
          echo "${{ github.workspace }}/build" >> "$GITHUB_PATH"

      # ATMOS_LOGS_FILE / TF_LOG_PATH point into diag/; create it before the first
      # atmos command (Atmos does not mkdir -p the log dir).
      - name: Prepare diagnostics dir
        run: mkdir -p "${{ github.workspace }}/diag"

      # HYPOTHESIS UNDER TEST: on Linux CI ttyd does not end up on PATH from the toolchain,
      # even though vhs/ffmpeg do (the record/check command's `command -v ttyd` gate fails).
      # `atmos demo check hero` triggers the SAME `dependencies.tools` auto-install
      # (vhs v0.11.0 / ffmpeg 8.1.1 / ttyd 1.7.7) as `record`, but `hero` is a non-emulator
      # tape so no docker is needed — fast. Capture the toolchain TRACE, then explicitly
      # install ttyd to see if that path differs, and dump what `atmos toolchain path`
      # resolves + the .tools tree.
      - name: Probe ttyd toolchain install (vhs/ffmpeg/ttyd)
        run: |
          set -uo pipefail
          D="${{ github.workspace }}/diag"
          cd demo/landing
          uname -srm    > "$D/uname.txt"         2>&1 || true
          atmos version > "$D/atmos-version.txt" 2>&1 || true

          # (1) Faithful path: the command's dependencies.tools auto-install + gate.
          echo "::group::atmos demo check hero (Trace)"
          set +e
          ATMOS_LOGS_FILE="$D/demo-check.log" atmos demo check hero > "$D/demo-check.txt" 2>&1
          echo "demo_check_exit=$?" | tee "$D/demo-check-exit.txt"
          set -e
          echo "::endgroup::"

          # (2) Explicit per-tool install for comparison (does ttyd install on its own?).
          # NOTE: requires owner/repo@version — the key question is whether
          # tsl0922/ttyd@1.7.7 resolves an aqua binary on this Linux runner.
          for spec in "charmbracelet/vhs@v0.11.0" "Tyrrrz/FFmpegBin@8.1.1" "tsl0922/ttyd@1.7.7"; do
            base="$(basename "$spec")"
            echo "::group::toolchain install $spec"
            set +e
            ATMOS_LOGS_FILE="$D/install-$base.log" atmos toolchain install "$spec" > "$D/install-$base.txt" 2>&1
            echo "$spec exit=$?" | tee -a "$D/install-results.txt"
            set -e
            echo "::endgroup::"
          done

          atmos toolchain path > "$D/toolchain-path.txt" 2>&1 || true
          atmos toolchain list > "$D/toolchain-list.txt" 2>&1 || true
          find .tools -maxdepth 7 -type f 2>/dev/null | sort > "$D/tools-tree.txt" || true

          export PATH="$(atmos toolchain path 2>/dev/null | tr '\n' ':')$PATH"
          { for t in vhs ttyd ffmpeg; do printf '%s -> ' "$t"; command -v "$t" || echo MISSING; done; } | tee "$D/which.txt"
          true

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ttyd-toolchain-diagnostics
          path: ${{ github.workspace }}/diag/
          if-no-files-found: warn
