name: Setup Go Cache Warmup
on:
  workflow_dispatch:
  schedule:
  # Run at 00:35 UTC (12:35 AM UTC) daily.
  # • Pacific Time (PT): 4:35 PM (previous day)
  # • Mountain Time (MT): 5:35 PM (previous day)
  # • Central Time (CT): 6:35 PM (previous day)
  # • Eastern Time (ET): 7:35 PM (previous day)
    - cron: "35 0 * * *"

env:
  ATMOS_BOOTSTRAP_VERSION: "1.223.0"

jobs:
  cache-warmup:
    name: Cache warmup (${{ matrix.target }})
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows
          - os: macos-latest
            target: macos
          # Build (macos-intel) uses this Intel runner and has no self-hosted
          # s3-cache like Linux, so without a nightly warmup here its Go build
          # cache is always cold — risking the 30m build timeout that a warm
          # ARM `macos` cache comfortably avoids.
          - os: macos-15-intel
            target: macos-intel
    runs-on: ${{ matrix.os }}
    steps:
      - name: Add GNU tar to PATH (significantly faster than windows tar)
        if: matrix.target == 'windows'
        shell: pwsh
        run: echo "C:\Program Files\Git\usr\bin" >> $Env:GITHUB_PATH

      - name: Check out code into the Go module directory
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"
        id: go

      - name: Set up Atmos
        uses: cloudposse/github-action-setup-atmos@82ed6d959532148e602fbbbe28b95c4628081561 # v3.1.0
        with:
          atmos-version: ${{ env.ATMOS_BOOTSTRAP_VERSION }}
          install-wrapper: false

      - name: Get deps
        run: go mod download
