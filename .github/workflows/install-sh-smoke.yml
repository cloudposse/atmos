name: install.sh smoke

on:
  pull_request:
    paths:
      - "website/static/install.sh"
      - ".github/workflows/install-sh-smoke.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  install:
    name: install.sh (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-15
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run installer
        shell: bash
        run: bash website/static/install.sh binary

      - name: Verify installed Atmos
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p verify
          cd verify
          if [ "$RUNNER_OS" = "Windows" ]; then
            ../atmos.exe version
          else
            ../atmos version
          fi
