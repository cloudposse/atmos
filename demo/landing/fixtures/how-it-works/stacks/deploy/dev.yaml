import:
  - catalog/app/defaults

vars:
  stage: dev

components:
  terraform:
    app:
      vars:
        stage: dev
  # Same stack, four workload types — Atmos ships them all.
  helmfile:
    ingress:
      vars:
        stage: dev
  packer:
    ami:
      settings:
        packer:
          template: main.pkr.hcl
      vars:
        stage: dev
  ansible:
    web:
      settings:
        ansible:
          playbook: site.yml
          inventory: inventory.ini
      vars:
        stage: dev
