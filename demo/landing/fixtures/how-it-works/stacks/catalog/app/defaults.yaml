components:
  terraform:
    app:
      metadata:
        component: app
        type: real
      vars:
        stage: "{{ .vars.stage }}"
        service: api
        image: ghcr.io/cloudposse/demo-api:1.0.0
      settings:
        identity: local-dev
        secrets:
          DB_PASSWORD:
            store: app-secrets
            description: Database password injected only at runtime.
