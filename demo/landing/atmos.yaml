# Atmos config for the landing-page demo recorder.
#
# This project exists only to host the `atmos demo …` custom commands that render
# the VHS tapes in this directory. Run it from here:
#
#     cd demo/landing
#     atmos demo record all      # render every tape
#     atmos demo record hero     # render one tape
#     atmos demo publish         # sync rendered assets to S3/CDN
#     atmos demo clean           # remove local renders + stray emulator containers
#
# The same commands run in CI (see .github/workflows/landing-demos.yaml) — local = CI.
#
# Recording prerequisites: the `record`/`check` commands auto-install the recording
# toolchain (vhs + ffmpeg + ttyd) via the Atmos toolchain — no manual install needed on
# Linux/CI. Two caveats: a container runtime (Docker or Podman, a system daemon) is still
# required for the emulator-backed tapes; and `ttyd` has no macOS aqua binary (the registry
# ships it for Linux/Windows only), so on macOS its auto-install is skipped with a warning —
# run `brew install ttyd` once. The Kubernetes tape's helm/helmfile/kubectl are provisioned
# separately by the k8s example's own component `dependencies.tools`. Publishing assumes the
# `docs/publish` identity (GitHub OIDC → S3) and needs the AWS CLI.

base_path: "./"

# The recording toolchain. `vhs` shells out to `ttyd` and `ffmpeg` at runtime. vhs,
# ffmpeg, and ttyd are pinned in the `record`/`check` commands' `dependencies.tools`
# (below) and auto-installed before the steps run; those steps put them on PATH via
# `atmos toolchain path`. ttyd has no macOS aqua binary (the registry ships it for
# Linux/Windows only), so on macOS its install is skipped with a warning and ttyd falls
# back to the system (`brew install ttyd`); on Linux/CI it installs from aqua. (podman/
# docker is a container runtime, not an aqua single-binary, so it stays a system
# prerequisite.)
toolchain:
  install_path: .tools
  aliases:
    vhs: charmbracelet/vhs
    ttyd: tsl0922/ttyd
    ffmpeg: Tyrrrz/FFmpegBin
  registries:
    - name: aqua-public
      type: aqua
      source: https://github.com/aquaproj/aqua-registry/tree/main/pkgs
      priority: 10

# No stacks of our own — the tapes cd into examples/* which carry their own config.
stacks:
  base_path: "stacks"
  included_paths:
    - "**/*"
  name_template: "{{ .vars.stage }}"

logs:
  file: "/dev/stderr"
  level: Info

# Publishing identity for `atmos demo publish` (used in CI by .github/workflows/landing-demos.yaml).
# Assumes the existing prod docs role via GitHub OIDC — no static credentials, no separate
# bucket/role. The role ARN, region, and session name are read from the SAME workflow env vars
# the old `aws-actions/configure-aws-credentials` step used (IAM_ROLE_ARN / AWS_REGION /
# IAM_ROLE_SESSION_NAME) via `!env`, so the workflow stays the single source of truth and
# nothing is hardcoded here. The audience must match the role's trust-policy `aud` condition
# (`sts.amazonaws.com` — the configure-aws-credentials default the role already trusts).
auth:
  providers:
    github-oidc:
      kind: github/oidc
      spec:
        audience: sts.amazonaws.com
  identities:
    docs/publish:
      kind: aws/assume-role
      default: true
      via:
        provider: github-oidc
      principal:
        assume_role: !env IAM_ROLE_ARN
        region: !env AWS_REGION
        session_name: !env IAM_ROLE_SESSION_NAME

commands:
  - name: demo
    description: Record and publish the landing-page demos (VHS).
    commands:
      - name: record
        description: Render one tape (by name) or all of them to website/static/img/demos/.
        arguments:
          - name: name
            description: 'Tape name without extension (e.g. "hero"), or "all" for every tape.'
        # Pinned recording toolchain, auto-installed before the step runs. Declaring it
        # here (not in .tool-versions) means it works in CI with no checked-in
        # .tool-versions and overrides any local one. ttyd auto-installs on Linux/CI; on
        # macOS it has no aqua binary, so its install is skipped with a warning and it
        # falls back to the system (`brew install ttyd`).
        dependencies:
          tools:
            vhs: "v0.11.0"
            ffmpeg: "8.1.1"
            ttyd: "1.7.7"
        steps:
          - |
            set -euo pipefail
            repo="$(git rev-parse --show-toplevel)"
            landing="$repo/demo/landing"
            # The tapes type `atmos …`; make sure the inner VHS shell uses the freshly
            # built binary (emulator is newer than any published release), not whatever
            # `atmos` is on PATH. `make build` writes ./build/atmos.
            export PATH="$repo/build:$PATH"
            command -v atmos >/dev/null 2>&1 || { echo "atmos not found — run 'make build'"; exit 1; }
            # vhs, ffmpeg, and ttyd are auto-installed from this command's
            # `dependencies.tools` (pinned above) and put on PATH. ttyd has NO macOS aqua
            # binary, so on macOS its install is skipped with a warning and it must come
            # from the system (`brew install ttyd`); on Linux/CI it installs from aqua.
            export PATH="$( cd "$landing" && atmos toolchain path 2>/dev/null | tr '\n' ':' )$PATH"
            missing=""
            for t in vhs ttyd ffmpeg; do command -v "$t" >/dev/null 2>&1 || missing="$missing $t"; done
            [ -z "$missing" ] || { echo "missing recording tools:$missing (auto-install via toolchain; on macOS run: brew install ttyd)"; exit 1; }
            cd "$repo"
            mkdir -p website/static/img/demos
            name='{{ .Arguments.name }}'
            # Only emulator-backed tapes require a container runtime.
            case "$name" in
              all|dx|emulators|kubernetes)
                command -v podman >/dev/null 2>&1 || command -v docker >/dev/null 2>&1 || {
                  echo "no container runtime — install podman or docker (needed for emulator-backed tapes)"
                  exit 1
                }
                ;;
            esac
            if [ "$name" = "all" ]; then
              for tape in demo/landing/*.tape; do
                base="$(basename "$tape")"
                [ "$base" = "defaults.tape" ] && continue
                echo "▶ recording $tape"
                vhs "$tape"
              done
            else
              tape="demo/landing/${name}.tape"
              [ -f "$tape" ] || { echo "no such tape: $tape"; exit 1; }
              echo "▶ recording $tape"
              vhs "$tape"
            fi
            echo "✔ wrote assets to website/static/img/demos/ (gitignored — publish with: atmos demo publish)"

      - name: check
        description: Fast dry-run — render a tape to inspectable .ascii (no video), short timeout.
        arguments:
          - name: name
            description: 'Tape name without extension (e.g. "hero").'
        # Pinned recording toolchain, auto-installed before the step runs (see `record`).
        dependencies:
          tools:
            vhs: "v0.11.0"
            ffmpeg: "8.1.1"
            ttyd: "1.7.7"
        steps:
          - |
            set -euo pipefail
            repo="$(git rev-parse --show-toplevel)"
            landing="$repo/demo/landing"
            export PATH="$repo/build:$PATH"  # use the freshly built atmos (see `record`).
            command -v atmos >/dev/null 2>&1 || { echo "atmos not found — run 'make build'"; exit 1; }
            # vhs, ffmpeg, and ttyd auto-install from this command's `dependencies.tools`;
            # put them on PATH (ttyd on macOS comes from brew — see `record`).
            export PATH="$( cd "$landing" && atmos toolchain path 2>/dev/null | tr '\n' ':' )$PATH"
            missing=""
            for t in vhs ttyd ffmpeg; do command -v "$t" >/dev/null 2>&1 || missing="$missing $t"; done
            [ -z "$missing" ] || { echo "missing recording tools:$missing (auto-install via toolchain; on macOS run: brew install ttyd)"; exit 1; }
            cd "$repo"
            name='{{ .Arguments.name }}'
            src="demo/landing/${name}.tape"
            [ -f "$src" ] || { echo "no such tape: $src"; exit 1; }
            mkdir -p website/static/img/demos
            out="website/static/img/demos/${name}.ascii"
            tmp="$(mktemp -t atmos-demo-check-XXXXXX).tape"
            # Drop the video Output/Screenshot lines, emit a single .ascii instead, and
            # shorten the wait timeout so a broken tape fails in ~90s, not minutes.
            awk -v out="$out" '
              /^[[:space:]]*Output /  { next }
              /^[[:space:]]*Screenshot / { next }
              { print }
              /Source .*defaults\.tape/ { print "Output " out; print "Set WaitTimeout 150s" }
            ' "$src" > "$tmp"
            echo "▶ dry-run $src → $out (vhs, ascii)"
            if vhs "$tmp"; then status=0; else status=$?; fi
            rm -f "$tmp"
            echo "──────── last frame of $name ────────"
            # Show the final terminal frame (last screen between rule lines).
            awk 'BEGIN{RS="────────────────────────────────────────────────────────────────────────────────"} {f=$0} END{print f}' "$out" 2>/dev/null || cat "$out"
            exit $status

      - name: publish
        description: Sync rendered demos to the S3/CDN bucket (set ATMOS_DEMOS_S3_URI).
        # Self-authenticates via the `docs/publish` identity (GitHub OIDC → assume role);
        # Atmos injects the AWS credentials into the step env, so `aws s3 sync` needs no
        # `atmos auth exec` wrapper. CI sets IAM_ROLE_ARN / AWS_REGION / IAM_ROLE_SESSION_NAME.
        identity: docs/publish
        steps:
          - |
            set -euo pipefail
            : "${ATMOS_DEMOS_S3_URI:?set ATMOS_DEMOS_S3_URI, e.g. s3://atmos-website-demos/demos}"
            repo="$(git rev-parse --show-toplevel)"
            cd "$repo"
            [ -d website/static/img/demos ] || { echo "nothing to publish — run 'atmos demo record all' first"; exit 1; }
            aws s3 sync website/static/img/demos "$ATMOS_DEMOS_S3_URI" \
              --exclude '*' --include '*.webm' --include '*.mp4' --include '*.png' \
              --cache-control 'public, max-age=86400'
            echo "✔ synced website/static/img/demos/ → $ATMOS_DEMOS_S3_URI"

      - name: clean
        description: Remove local renders and stop any stray emulator containers.
        steps:
          - |
            set -euo pipefail
            repo="$(git rev-parse --show-toplevel)"
            cd "$repo"
            rm -rf website/static/img/demos
            # Best-effort: stop containers Atmos labels as emulators (Docker and Podman).
            # Iterate both so stray containers from either runtime are removed.
            for runtime in docker podman; do
              command -v "$runtime" >/dev/null 2>&1 || continue
              ids="$("$runtime" ps -aq --filter 'label=tools.atmos.component_type=emulator' 2>/dev/null || true)"
              [ -n "$ids" ] && "$runtime" rm -f $ids || true
            done
            echo "✔ cleaned local demo renders"
