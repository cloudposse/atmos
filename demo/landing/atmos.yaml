# Atmos config for the landing-page demo recorder.
#
# This project exists only to host the `atmos demo …` custom commands that render
# the VHS tapes in this directory. Run it from here:
#
#     cd demo/landing
#     atmos demo record all      # render every tape
#     atmos demo record hero     # render one tape
#     atmos demo publish         # sync rendered assets to S3/CDN
#     atmos demo clean           # remove local renders + stray emulator containers
#
# The same commands run in CI (see .github/workflows/landing-demos.yaml) — local = CI.
#
# Recording prerequisites: the `record`/`check` commands auto-install `vhs` and `ffmpeg`
# via the Atmos toolchain. `ttyd` is required at runtime but is not declared as a command
# dependency because the aqua registry package is Linux/Windows only; install it with
# `brew install ttyd` on macOS, while CI installs it from this toolchain on Linux. A
# container runtime (Docker or Podman, a system daemon) is still required for the
# emulator-backed tapes. The Kubernetes tape's helm/helmfile/kubectl are provisioned
# separately by the k8s example's own component `dependencies.tools`. Publishing assumes
# the `docs/publish` identity (GitHub OIDC → S3) and needs the AWS CLI.

base_path: "./"

# The recording toolchain. `vhs` shells out to `ttyd` and `ffmpeg` at runtime.
# FFmpeg publishes source only; the `ffmpeg` alias uses aqua's third-party
# Tyrrrz/FFmpegBin package for prebuilt binaries.
toolchain:
  install_path: .tools
  aliases:
    vhs: charmbracelet/vhs
    ttyd: tsl0922/ttyd
    ffmpeg: Tyrrrz/FFmpegBin
  registries:
    - name: aqua-public
      type: aqua
      source: https://github.com/aquaproj/aqua-registry/tree/main/pkgs
      priority: 10

# No stacks of our own — the tapes cd into examples/* which carry their own config.
stacks:
  base_path: "stacks"
  included_paths:
    - "**/*"
  name_template: "{{ .vars.stage }}"

logs:
  file: "/dev/stderr"
  level: Info

# Publishing identity for `atmos demo publish` (used in CI by .github/workflows/landing-demos.yaml).
# Assumes the existing prod docs role via GitHub OIDC — no static credentials, no separate
# bucket/role. The audience must match the role's trust-policy `aud` condition
# (`sts.amazonaws.com` — the configure-aws-credentials default the role already trusts).
auth:
  providers:
    github-oidc:
      kind: github/oidc
      spec:
        audience: sts.amazonaws.com
  identities:
    docs/publish:
      kind: aws/assume-role
      default: true
      via:
        provider: github-oidc
      principal:
        assume_role: arn:aws:iam::557075604627:role/cplive-plat-ue2-prod-atmos-docs-gha
        region: us-east-2
        session_name: cloudposse-atmos-ci-deploy-demos

commands:
  - name: demo
    description: Record and publish the landing-page demos (VHS).
    commands:
      - name: record
        description: Render one tape (by name) or all of them to website/static/img/demos/.
        arguments:
          - name: name
            description: 'Tape name without extension (e.g. "hero"), or "all" for every tape.'
        # Pinned recording toolchain, auto-installed before the step runs. Declaring it
        # here (not in .tool-versions) means it works in CI with no checked-in
        # .tool-versions and overrides any local one. ttyd is checked by a require step
        # because its aqua package has no macOS binary; install it with `brew install ttyd`
        # locally, while CI installs it from this toolchain on Linux.
        dependencies:
          tools:
            vhs: "v0.11.0"
            ffmpeg: "8.1.1"
        steps:
          - name: require built atmos
            type: require
            files:
              - ../../build/atmos
            hint: "run `make build` from the repository root before recording"
          - name: require recording tools
            type: require
            tools:
              - vhs
              - ttyd
              - ffmpeg
            hint: "ttyd has no macOS aqua binary; on macOS run: brew install ttyd"
          - type: shell
            command: |
              set -euo pipefail
              repo="$(git rev-parse --show-toplevel)"
              # The tapes type `atmos …`; make sure the inner VHS shell uses the freshly
              # built binary (emulator is newer than any published release), not whatever
              # `atmos` is on PATH. `make build` writes ./build/atmos.
              export PATH="$repo/build:$PATH"
              # Slow the spinner redraw rate for recordings only. The default (~10/sec) of
              # off-camera `atmos emulator up` spinners scrolls enough to trip VHS's
              # scrollback handling (charmbracelet/vhs#657/#659). 4/sec keeps a visible
              # spinner with ~2.5x fewer redraws. Only affects VHS recording, not normal use.
              export ATMOS_SPINNER_FPS="${ATMOS_SPINNER_FPS:-4}"
              cd "$repo"
              mkdir -p website/static/img/demos
              name='{{ .Arguments.name }}'
              # Preconditions (fail in milliseconds, not by wedging VHS for minutes):
              # emulator-backed tapes need a container runtime, and the dx/emulators tapes
              # drive `atmos terraform`, which needs a real terraform/tofu binary on PATH.
              case "$name" in
                all|dx|emulators|kubernetes)
                  command -v podman >/dev/null 2>&1 || command -v docker >/dev/null 2>&1 || {
                    echo "no container runtime — install podman or docker (needed for emulator-backed tapes)"; exit 1; }
                  ;;
              esac
              case "$name" in
                all|dx|emulators)
                  command -v terraform >/dev/null 2>&1 || command -v tofu >/dev/null 2>&1 || {
                    echo "no terraform/opentofu on PATH — the emulator tapes run 'atmos terraform'"; exit 1; }
                  ;;
              esac
              # Fail-fast recording: a wedged tape (a command exits the shell, so VHS waits
              # for a prompt that never returns) would otherwise burn its full 300-600s
              # WaitTimeout. Cap each render with `timeout` so it aborts in minutes. Degrade
              # gracefully where no timeout binary exists (e.g. macOS without coreutils).
              record_timeout="${ATMOS_DEMO_RECORD_TIMEOUT:-420}"
              timeout_bin="$(command -v timeout || command -v gtimeout || true)"
              record_one() {
                echo "▶ recording $1"
                set +e
                if [ -n "$timeout_bin" ]; then
                  "$timeout_bin" --kill-after=10s "${record_timeout}s" vhs "$1"
                else
                  vhs "$1"
                fi
                code=$?
                set -e
                [ "$code" -eq 0 ] && return 0
                if [ "$code" -eq 124 ]; then
                  echo "✗ $1 exceeded ${record_timeout}s — a command likely wedged VHS (the shell exited; VHS is waiting for a prompt that won't return). Try: atmos demo check $(basename "${1%.tape}")" >&2
                else
                  echo "✗ $1 failed (vhs exit $code)" >&2
                fi
                return "$code"
              }
              if [ "$name" = "all" ]; then
                for tape in demo/landing/*.tape; do
                  base="$(basename "$tape")"
                  [ "$base" = "defaults.tape" ] && continue
                  record_one "$tape" || exit $?
                done
              else
                tape="demo/landing/${name}.tape"
                [ -f "$tape" ] || { echo "no such tape: $tape"; exit 1; }
                record_one "$tape" || exit $?
              fi
          - type: toast
            level: success
            content: "Wrote assets to website/static/img/demos/ (gitignored; publish with: atmos demo publish)"

      - name: check
        description: Fast dry-run — render a tape to inspectable .ascii (no video), short timeout.
        arguments:
          - name: name
            description: 'Tape name without extension (e.g. "hero").'
        # Pinned recording toolchain, auto-installed before the step runs (see `record`).
        dependencies:
          tools:
            vhs: "v0.11.0"
            ffmpeg: "8.1.1"
        steps:
          - name: require built atmos
            type: require
            files:
              - ../../build/atmos
            hint: "run `make build` from the repository root before checking a tape"
          - name: require recording tools
            type: require
            tools:
              - vhs
              - ttyd
              - ffmpeg
            hint: "ttyd has no macOS aqua binary; on macOS run: brew install ttyd"
          - type: shell
            command: |
              set -euo pipefail
              repo="$(git rev-parse --show-toplevel)"
              export PATH="$repo/build:$PATH"  # use the freshly built atmos (see `record`).
              cd "$repo"
              name='{{ .Arguments.name }}'
              src="demo/landing/${name}.tape"
              [ -f "$src" ] || { echo "no such tape: $src"; exit 1; }
              mkdir -p website/static/img/demos
              out="website/static/img/demos/${name}.ascii"
              tmp="$(mktemp -t atmos-demo-check-XXXXXX).tape"
              # Drop the video Output/Screenshot lines, emit a single .ascii instead, and
              # shorten the wait timeout so a broken tape fails in ~90s, not minutes.
              awk -v out="$out" '
                /^[[:space:]]*Output /  { next }
                /^[[:space:]]*Screenshot / { next }
                { print }
                /Source .*defaults\.tape/ { print "Output " out; print "Set WaitTimeout 150s" }
              ' "$src" > "$tmp"
              echo "▶ dry-run $src → $out (vhs, ascii)"
              if vhs "$tmp"; then status=0; else status=$?; fi
              rm -f "$tmp"
              echo "──────── last frame of $name ────────"
              # Show the final terminal frame (last screen between rule lines).
              awk 'BEGIN{RS="────────────────────────────────────────────────────────────────────────────────"} {f=$0} END{print f}' "$out" 2>/dev/null || cat "$out"
              exit $status
          - type: toast
            level: success
            content: "Wrote dry-run output to website/static/img/demos/{{ .Arguments.name }}.ascii"

      - name: publish
        description: Sync rendered demos to the S3/CDN bucket.
        # Self-authenticates via the `docs/publish` identity (GitHub OIDC → assume role);
        # Atmos injects the AWS credentials into the step env, so `aws s3 sync` needs no
        # `atmos auth exec` wrapper.
        identity: docs/publish
        steps:
          - name: require publish inputs
            type: require
            tools:
              - aws
            dirs:
              - ../../website/static/img/demos
            hint: "run `atmos demo record all` before publishing"
          - name: sync demos
            type: spin
            title: Syncing demo renders
            command: |
              set -euo pipefail
              demos_s3_uri="s3://cplive-plat-ue2-prod-atmos-docs-origin/img/demos"
              repo="$(git rev-parse --show-toplevel)"
              cd "$repo"
              aws s3 sync website/static/img/demos "$demos_s3_uri" \
                --exclude '*' --include '*.webm' --include '*.mp4' --include '*.png' \
                --cache-control 'public, max-age=86400'
          - type: toast
            level: success
            content: "Synced website/static/img/demos/ to s3://cplive-plat-ue2-prod-atmos-docs-origin/img/demos"

      - name: clean
        description: Remove local renders and stop any stray emulator containers.
        steps:
          - name: clean demo renders
            type: spin
            title: Cleaning local demo renders
            command: |
              set -euo pipefail
              repo="$(git rev-parse --show-toplevel)"
              cd "$repo"
              rm -rf website/static/img/demos
              # Best-effort: stop containers Atmos labels as emulators (Docker and Podman).
              # Iterate both so stray containers from either runtime are removed.
              for runtime in docker podman; do
                command -v "$runtime" >/dev/null 2>&1 || continue
                ids="$("$runtime" ps -aq --filter 'label=tools.atmos.component_type=emulator' 2>/dev/null || true)"
                [ -n "$ids" ] && "$runtime" rm -f $ids || true
              done
          - type: toast
            level: success
            content: "Cleaned local demo renders"
