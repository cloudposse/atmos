commands:
  - name: casts
    description: Generate published website asciicast demos
    commands:
      - name: setup
        description: Prepare isolated fixtures and build the local Atmos binary
        env:
          GOBIN: '{{ env "PWD" }}/../../.context/bin'
        steps:
          - type: workdir
            name: native-terraform-fixture
            source: fixtures/native-terraform
            path: ../../.context/cast-fixtures/native-terraform
            reset: true

          - type: workdir
            name: demo-vendoring-fixture
            source: fixtures/demo-vendoring
            path: ../../.context/cast-fixtures/demo-vendoring
            reset: true

          - type: workdir
            name: basic-fixture
            source: fixtures/basic
            path: ../../.context/cast-fixtures/basic
            reset: true

          - type: workdir
            name: emulator-aws-fixture
            source: ../../examples/emulator-aws
            path: ../../.context/cast-fixtures/emulator-aws
            reset: true

          - type: workdir
            name: quick-start-simple-fixture
            source: ../../examples/quick-start-simple
            path: ../../.context/cast-fixtures/quick-start-simple
            reset: true

          - type: workdir
            name: quick-start-advanced-fixture
            source: ../../examples/quick-start-advanced
            path: ../../.context/cast-fixtures/quick-start-advanced
            reset: true

          - type: workdir
            name: sops-secrets-fixture
            source: ../../examples/sops-secrets
            path: ../../.context/cast-fixtures/sops-secrets
            reset: true

          - type: workdir
            name: toolchain-fixture
            source: ../../examples/toolchain
            path: ../../.context/cast-fixtures/toolchain
            reset: true

          - type: workdir
            name: custom-commands-fixture
            source: ../../examples/custom-commands
            path: ../../.context/cast-fixtures/custom-commands
            reset: true

          - type: shell
            name: build-atmos
            command: go install ../..

      - name: generate
        description: Regenerate committed website cast demos
        commands:
          - name: all
            description: Regenerate every committed website cast demo
            env: &cast_bin_env
              PATH: '{{ env "PWD" }}/../../.context/bin:{{ env "PATH" }}'
            steps:
              - type: shell
                name: setup
                command: atmos casts setup

              - type: shell
                name: terraform-plan
                command: atmos casts generate terraform-plan

              - type: shell
                name: terraform-deploy
                command: atmos casts generate terraform-deploy

              - type: shell
                name: terraform-output
                command: atmos casts generate terraform-output

              - type: shell
                name: vendor-pull
                command: atmos casts generate vendor-pull

              - type: shell
                name: list-stacks
                command: atmos casts generate list-stacks

              - type: shell
                name: describe-component
                command: atmos casts generate describe-component

              - type: shell
                name: describe-stacks
                command: atmos casts generate describe-stacks

              - type: shell
                name: emulator-aws-lifecycle
                command: atmos casts generate emulator-aws-lifecycle

              - type: shell
                name: featured
                command: atmos casts generate featured

              - type: shell
                name: validate
                command: atmos casts validate all

          - name: featured
            description: Regenerate every featured example cast
            env: *cast_bin_env
            steps:
              - type: shell
                name: setup
                command: atmos casts setup

              - type: shell
                name: quick-start-simple
                command: atmos casts generate quick-start-simple

              - type: shell
                name: quick-start-advanced
                command: atmos casts generate quick-start-advanced

              - type: shell
                name: sops-secrets
                command: atmos casts generate sops-secrets

              - type: shell
                name: toolchain
                command: atmos casts generate toolchain

              - type: shell
                name: custom-commands
                command: atmos casts generate custom-commands

              - type: shell
                name: validate
                command: atmos casts validate featured

          - name: terraform-plan
            description: Regenerate the Terraform plan cast
            env: *cast_bin_env
            steps:
              - type: shell
                name: setup
                command: atmos casts setup
              - type: shell
                name: clean
                command: rm -f ../../website/static/casts/terraform/plan.cast
              - type: cast
                name: terraform-plan
                command: atmos terraform plan vpc -s dev
                mode: steps
                width: 120
                height: 36
                output:
                  cast: ../../website/static/casts/terraform/plan.cast
                steps:
                  - type: shell
                    name: terraform-plan
                    working_directory: ../../.context/cast-fixtures/native-terraform
                    env: &force_color_env
                      TERM: xterm-256color
                      COLORTERM: truecolor
                      ATMOS_FORCE_COLOR: "1"
                      CLICOLOR_FORCE: "1"
                      FORCE_COLOR: "1"
                      ATMOS_FORCE_TTY: "true"
                      ATMOS_KEYRING_TYPE: memory
                    command: atmos terraform plan vpc -s dev
              - type: shell
                name: validate
                command: atmos casts validate terraform-plan

          - name: terraform-deploy
            description: Regenerate the Terraform deploy cast
            env: *cast_bin_env
            steps:
              - type: shell
                name: setup
                command: atmos casts setup
              - type: shell
                name: clean
                command: rm -f ../../website/static/casts/terraform/deploy.cast
              - type: cast
                name: terraform-deploy
                command: atmos terraform deploy vpc -s dev -auto-approve
                mode: steps
                width: 120
                height: 36
                output:
                  cast: ../../website/static/casts/terraform/deploy.cast
                steps:
                  - type: shell
                    name: terraform-deploy
                    working_directory: ../../.context/cast-fixtures/native-terraform
                    env: *force_color_env
                    command: atmos terraform deploy vpc -s dev -auto-approve
              - type: shell
                name: validate
                command: atmos casts validate terraform-deploy

          - name: terraform-output
            description: Regenerate the Terraform output cast
            env: *cast_bin_env
            steps:
              - type: shell
                name: setup
                command: atmos casts setup
              - type: shell
                name: prepare-state
                working_directory: ../../.context/cast-fixtures/native-terraform
                env: *force_color_env
                output: none
                command: atmos --logs-level Off terraform deploy vpc -s dev -auto-approve
              - type: shell
                name: clean
                command: rm -f ../../website/static/casts/terraform/output.cast
              - type: cast
                name: terraform-output
                command: atmos terraform output vpc -s dev
                mode: steps
                width: 120
                height: 36
                output:
                  cast: ../../website/static/casts/terraform/output.cast
                steps:
                  - type: shell
                    name: terraform-output
                    working_directory: ../../.context/cast-fixtures/native-terraform
                    env: *force_color_env
                    command: atmos terraform output vpc -s dev
              - type: shell
                name: validate
                command: atmos casts validate terraform-output

          - name: vendor-pull
            description: Regenerate the vendor pull cast
            env: *cast_bin_env
            steps:
              - type: shell
                name: setup
                command: atmos casts setup
              - type: shell
                name: clean
                command: rm -f ../../website/static/casts/vendor/pull.cast
              - type: cast
                name: vendor-pull
                command: atmos vendor pull --everything
                mode: steps
                width: 120
                height: 36
                output:
                  cast: ../../website/static/casts/vendor/pull.cast
                steps:
                  - type: shell
                    name: vendor-pull
                    working_directory: ../../.context/cast-fixtures/demo-vendoring
                    env: *force_color_env
                    command: atmos vendor pull --everything
              - type: shell
                name: validate
                command: atmos casts validate vendor-pull

          - name: list-stacks
            description: Regenerate the list stacks cast
            env: *cast_bin_env
            steps:
              - type: shell
                name: setup
                command: atmos casts setup
              - type: shell
                name: clean
                command: rm -f ../../website/static/casts/cli/list-stacks.cast
              - type: cast
                name: list-stacks
                command: atmos list stacks --format tree
                mode: steps
                width: 120
                height: 36
                output:
                  cast: ../../website/static/casts/cli/list-stacks.cast
                steps:
                  - type: shell
                    name: list-stacks
                    working_directory: ../../.context/cast-fixtures/native-terraform
                    output: raw
                    env: *force_color_env
                    command: atmos list stacks --format tree
              - type: shell
                name: validate
                command: atmos casts validate list-stacks

          - name: describe-component
            description: Regenerate the describe component cast
            env: *cast_bin_env
            steps:
              - type: shell
                name: setup
                command: atmos casts setup
              - type: shell
                name: clean
                command: rm -f ../../website/static/casts/cli/describe-component.cast
              - type: cast
                name: describe-component
                command: atmos describe component vpc -s dev
                mode: steps
                width: 120
                height: 36
                output:
                  cast: ../../website/static/casts/cli/describe-component.cast
                steps:
                  - type: shell
                    name: describe-component
                    working_directory: ../../.context/cast-fixtures/native-terraform
                    output: raw
                    env: *force_color_env
                    command: atmos describe component vpc -s dev
              - type: shell
                name: validate
                command: atmos casts validate describe-component

          - name: describe-stacks
            description: Regenerate the describe stacks cast
            env: *cast_bin_env
            steps:
              - type: shell
                name: setup
                command: atmos casts setup
              - type: shell
                name: clean
                command: rm -f ../../website/static/casts/cli/describe-stacks.cast
              - type: cast
                name: describe-stacks
                command: atmos describe stacks --components mycomponent
                mode: steps
                width: 120
                height: 36
                output:
                  cast: ../../website/static/casts/cli/describe-stacks.cast
                steps:
                  - type: shell
                    name: describe-stacks
                    working_directory: ../../.context/cast-fixtures/basic
                    output: raw
                    env: *force_color_env
                    command: atmos describe stacks --components mycomponent
              - type: shell
                name: validate
                command: atmos casts validate describe-stacks

          - name: emulator-aws-lifecycle
            description: Regenerate the AWS emulator lifecycle cast
            env: *cast_bin_env
            steps:
              - type: shell
                name: setup
                command: atmos casts setup
              - type: shell
                name: reset-stale-state
                working_directory: ../../.context/cast-fixtures/emulator-aws
                env: *force_color_env
                output: none
                command: |
                  atmos --logs-level Off emulator down aws -s dev || true
                  atmos --logs-level Off terraform reset || true
              - type: shell
                name: clean
                command: rm -f ../../website/static/casts/emulator/aws-lifecycle.cast
              - type: cast
                name: emulator-aws-lifecycle
                command: atmos emulator up aws -s dev --ephemeral
                mode: steps
                width: 120
                height: 36
                output:
                  cast: ../../website/static/casts/emulator/aws-lifecycle.cast
                steps:
                  - type: shell
                    name: emulator-up
                    working_directory: ../../.context/cast-fixtures/emulator-aws
                    env: *force_color_env
                    command: atmos emulator up aws -s dev --ephemeral
                  - type: shell
                    name: emulator-ps
                    working_directory: ../../.context/cast-fixtures/emulator-aws
                    env: *force_color_env
                    command: atmos emulator ps aws -s dev
                  - type: shell
                    name: terraform-apply
                    working_directory: ../../.context/cast-fixtures/emulator-aws
                    env: *force_color_env
                    command: atmos terraform apply demo -s dev -auto-approve
                  - type: shell
                    name: terraform-output
                    working_directory: ../../.context/cast-fixtures/emulator-aws
                    env: *force_color_env
                    command: atmos terraform output demo -s dev
                  - type: shell
                    name: emulator-down
                    working_directory: ../../.context/cast-fixtures/emulator-aws
                    env: *force_color_env
                    command: atmos emulator down aws -s dev
              - type: shell
                name: validate
                command: atmos casts validate emulator-aws-lifecycle

          - name: quick-start-simple
            description: Regenerate the Quick Start Simple example cast
            env: *cast_bin_env
            steps:
              - type: shell
                name: setup
                command: atmos casts setup
              - type: shell
                name: clean
                command: rm -f ../../website/static/casts/examples/quick-start-simple.cast
              - type: cast
                name: quick-start-simple
                command: atmos list stacks --format tree
                mode: steps
                width: 120
                height: 36
                output:
                  cast: ../../website/static/casts/examples/quick-start-simple.cast
                steps:
                  - type: shell
                    name: list-stacks
                    working_directory: ../../.context/cast-fixtures/quick-start-simple
                    env: *force_color_env
                    command: atmos list stacks --format tree
                  - type: shell
                    name: list-components
                    working_directory: ../../.context/cast-fixtures/quick-start-simple
                    env: *force_color_env
                    command: atmos list components
              - type: shell
                name: validate
                command: atmos casts validate quick-start-simple

          - name: quick-start-advanced
            description: Regenerate the Quick Start Advanced example cast
            env: *cast_bin_env
            steps:
              - type: shell
                name: setup
                command: atmos casts setup
              - type: shell
                name: clean
                command: rm -f ../../website/static/casts/examples/quick-start-advanced.cast
              - type: cast
                name: quick-start-advanced
                command: atmos list stacks --format tree
                mode: steps
                width: 120
                height: 36
                output:
                  cast: ../../website/static/casts/examples/quick-start-advanced.cast
                steps:
                  - type: shell
                    name: list-stacks
                    working_directory: ../../.context/cast-fixtures/quick-start-advanced
                    env: *force_color_env
                    command: atmos list stacks --format tree
                  - type: shell
                    name: list-instances
                    working_directory: ../../.context/cast-fixtures/quick-start-advanced
                    env: *force_color_env
                    command: atmos list instances --stack plat-ue2-dev --format tree
              - type: shell
                name: validate
                command: atmos casts validate quick-start-advanced

          - name: sops-secrets
            description: Regenerate the SOPS secrets example cast
            env: *cast_bin_env
            steps:
              - type: shell
                name: setup
                command: atmos casts setup
              - type: shell
                name: clean
                command: rm -f ../../website/static/casts/examples/sops-secrets.cast
              - type: cast
                name: sops-secrets
                command: atmos describe component api --stack dev
                mode: steps
                width: 120
                height: 36
                output:
                  cast: ../../website/static/casts/examples/sops-secrets.cast
                steps:
                  - type: shell
                    name: describe-masked-secrets
                    working_directory: ../../.context/cast-fixtures/sops-secrets
                    env: *force_color_env
                    command: atmos describe component api --stack dev | grep -E 'datadog_api_key|redis_url|<MASKED>|secrets:'
              - type: shell
                name: validate
                command: atmos casts validate sops-secrets

          - name: toolchain
            description: Regenerate the Toolchain example cast
            env: *cast_bin_env
            steps:
              - type: shell
                name: setup
                command: atmos casts setup
              - type: shell
                name: prepare-tools
                working_directory: ../../.context/cast-fixtures/toolchain
                env: *force_color_env
                output: none
                command: atmos --logs-level Off toolchain install
              - type: shell
                name: clean
                command: rm -f ../../website/static/casts/examples/toolchain.cast
              - type: cast
                name: toolchain
                command: atmos demo convert
                mode: steps
                width: 120
                height: 36
                output:
                  cast: ../../website/static/casts/examples/toolchain.cast
                steps:
                  - type: shell
                    name: demo-convert
                    working_directory: ../../.context/cast-fixtures/toolchain
                    env: *force_color_env
                    command: atmos demo convert
              - type: shell
                name: validate
                command: atmos casts validate toolchain

          - name: custom-commands
            description: Regenerate the Custom Commands example cast
            env: *cast_bin_env
            steps:
              - type: shell
                name: setup
                command: atmos casts setup
              - type: shell
                name: clean
                command: rm -f ../../website/static/casts/examples/custom-commands.cast
              - type: cast
                name: custom-commands
                command: atmos hello
                mode: steps
                width: 120
                height: 36
                output:
                  cast: ../../website/static/casts/examples/custom-commands.cast
                steps:
                  - type: shell
                    name: hello
                    working_directory: ../../.context/cast-fixtures/custom-commands
                    env: *force_color_env
                    command: atmos hello
                  - type: shell
                    name: greet
                    working_directory: ../../.context/cast-fixtures/custom-commands
                    env: *force_color_env
                    command: atmos greet Alice
              - type: shell
                name: validate
                command: atmos casts validate custom-commands

      - name: validate
        description: Validate committed website cast demos
        commands:
          - name: all
            description: Validate every committed website cast demo
            env: *cast_bin_env
            steps:
              - type: shell
                name: terraform-plan
                command: atmos casts validate terraform-plan

              - type: shell
                name: terraform-deploy
                command: atmos casts validate terraform-deploy

              - type: shell
                name: terraform-output
                command: atmos casts validate terraform-output

              - type: shell
                name: vendor-pull
                command: atmos casts validate vendor-pull

              - type: shell
                name: list-stacks
                command: atmos casts validate list-stacks

              - type: shell
                name: describe-component
                command: atmos casts validate describe-component

              - type: shell
                name: describe-stacks
                command: atmos casts validate describe-stacks

              - type: shell
                name: emulator-aws-lifecycle
                command: atmos casts validate emulator-aws-lifecycle

              - type: shell
                name: featured
                command: atmos casts validate featured

          - name: featured
            description: Validate every featured example cast
            env: *cast_bin_env
            steps:
              - type: shell
                name: quick-start-simple
                command: atmos casts validate quick-start-simple

              - type: shell
                name: quick-start-advanced
                command: atmos casts validate quick-start-advanced

              - type: shell
                name: sops-secrets
                command: atmos casts validate sops-secrets

              - type: shell
                name: toolchain
                command: atmos casts validate toolchain

              - type: shell
                name: custom-commands
                command: atmos casts validate custom-commands

          - name: terraform-plan
            description: Validate the Terraform plan cast
            steps:
              - type: script
                name: validate
                interpreter: python3
                script: |
                  from pathlib import Path
                  text = Path("../../website/static/casts/terraform/plan.cast").read_text()
                  for needle in ["Terraform will perform the following actions", "Plan:", "vpc_cidr"]:
                      if needle not in text:
                          raise SystemExit(f"terraform plan cast missing {needle!r}")
                  for bad in ["# Error", "Incorrect Usage", "unknown flag", "panic", "not found"]:
                      if bad in text:
                          raise SystemExit(f"terraform plan cast contains {bad!r}")

          - name: terraform-deploy
            description: Validate the Terraform deploy cast
            steps:
              - type: script
                name: validate
                interpreter: python3
                script: |
                  from pathlib import Path
                  text = Path("../../website/static/casts/terraform/deploy.cast").read_text()
                  for needle in ["Apply complete!", "Resources: 1 added", "vpc_cidr"]:
                      if needle not in text:
                          raise SystemExit(f"terraform deploy cast missing {needle!r}")
                  for bad in ["# Error", "Incorrect Usage", "unknown flag", "panic", "not found"]:
                      if bad in text:
                          raise SystemExit(f"terraform deploy cast contains {bad!r}")

          - name: terraform-output
            description: Validate the Terraform output cast
            steps:
              - type: script
                name: validate
                interpreter: python3
                script: |
                  from pathlib import Path
                  text = Path("../../website/static/casts/terraform/output.cast").read_text()
                  for needle in ["environment =", "dev", "vpc_cidr", "10.0.0.0/16"]:
                      if needle not in text:
                          raise SystemExit(f"terraform output cast missing {needle!r}")
                  for bad in ["# Error", "Incorrect Usage", "unknown flag", "panic", "not found"]:
                      if bad in text:
                          raise SystemExit(f"terraform output cast contains {bad!r}")

          - name: vendor-pull
            description: Validate the vendor pull cast
            steps:
              - type: script
                name: validate
                interpreter: python3
                script: |
                  from pathlib import Path
                  text = Path("../../website/static/casts/vendor/pull.cast").read_text()
                  for needle in ["Vendoring from", "Pulling", "github/stargazers"]:
                      if needle not in text:
                          raise SystemExit(f"vendor pull cast missing {needle!r}")
                  for bad in ["# Error", "Incorrect Usage", "unknown flag", "panic", "--dry-run"]:
                      if bad in text:
                          raise SystemExit(f"vendor pull cast contains {bad!r}")

          - name: list-stacks
            description: Validate the list stacks cast
            steps:
              - type: script
                name: validate
                interpreter: python3
                script: |
                  from pathlib import Path
                  text = Path("../../website/static/casts/cli/list-stacks.cast").read_text()
                  for needle in ["Stacks", "dev", "production"]:
                      if needle not in text:
                          raise SystemExit(f"list stacks cast missing {needle!r}")
                  for bad in ["# Error", "Incorrect Usage", "unknown flag", "panic", "not found"]:
                      if bad in text:
                          raise SystemExit(f"list stacks cast contains {bad!r}")

          - name: describe-component
            description: Validate the describe component cast
            steps:
              - type: script
                name: validate
                interpreter: python3
                script: |
                  from pathlib import Path
                  text = Path("../../website/static/casts/cli/describe-component.cast").read_text()
                  for needle in ["component: vpc", "stack: dev", "cidr_block"]:
                      if needle not in text:
                          raise SystemExit(f"describe component cast missing {needle!r}")
                  for bad in ["# Error", "Incorrect Usage", "unknown flag", "panic", "not found"]:
                      if bad in text:
                          raise SystemExit(f"describe component cast contains {bad!r}")

          - name: describe-stacks
            description: Validate the describe stacks cast
            steps:
              - type: script
                name: validate
                interpreter: python3
                script: |
                  from pathlib import Path
                  text = Path("../../website/static/casts/cli/describe-stacks.cast").read_text()
                  for needle in ["nonprod", "prod", "mycomponent"]:
                      if needle not in text:
                          raise SystemExit(f"describe stacks cast missing {needle!r}")
                  for bad in ["# Error", "Incorrect Usage", "unknown flag", "panic", "not found"]:
                      if bad in text:
                          raise SystemExit(f"describe stacks cast contains {bad!r}")

          - name: emulator-aws-lifecycle
            description: Validate the AWS emulator lifecycle cast
            steps:
              - type: script
                name: validate
                interpreter: python3
                script: |
                  from pathlib import Path
                  text = Path("../../website/static/casts/emulator/aws-lifecycle.cast").read_text()
                  for needle in [
                      "emulator aws is up",
                      "floci/floci",
                      "running",
                      "Apply complete!",
                      "stage =",
                      "dev",
                      "emulator aws is down",
                  ]:
                      if needle not in text:
                          raise SystemExit(f"emulator aws lifecycle cast missing {needle!r}")
                  for bad in ["# Error", "Incorrect Usage", "unknown flag", "panic", "not found", "Error:", "WARN"]:
                      if bad in text:
                          raise SystemExit(f"emulator aws lifecycle cast contains {bad!r}")

          - name: quick-start-simple
            description: Validate the Quick Start Simple example cast
            steps:
              - type: script
                name: validate
                interpreter: python3
                script: |
                  from pathlib import Path
                  text = Path("../../website/static/casts/examples/quick-start-simple.cast").read_text()
                  for needle in ["Stacks", "dev", "staging", "prod", "station", "terraform"]:
                      if needle not in text:
                          raise SystemExit(f"quick-start-simple cast missing {needle!r}")
                  for bad in ["# Error", "Incorrect Usage", "unknown flag", "panic", "not found", "/Users/"]:
                      if bad in text:
                          raise SystemExit(f"quick-start-simple cast contains {bad!r}")

          - name: quick-start-advanced
            description: Validate the Quick Start Advanced example cast
            steps:
              - type: script
                name: validate
                interpreter: python3
                script: |
                  from pathlib import Path
                  text = Path("../../website/static/casts/examples/quick-start-advanced.cast").read_text()
                  for needle in ["Stacks", "plat-ue2-dev", "Component Instances", "s3-bucket", "app-config"]:
                      if needle not in text:
                          raise SystemExit(f"quick-start-advanced cast missing {needle!r}")
                  for bad in ["# Error", "Incorrect Usage", "unknown flag", "panic", "not found", "/Users/"]:
                      if bad in text:
                          raise SystemExit(f"quick-start-advanced cast contains {bad!r}")

          - name: sops-secrets
            description: Validate the SOPS secrets example cast
            steps:
              - type: script
                name: validate
                interpreter: python3
                script: |
                  from pathlib import Path
                  text = Path("../../website/static/casts/examples/sops-secrets.cast").read_text()
                  for needle in ["secrets:", "datadog_api_key", "redis_url", "MASKED"]:
                      if needle not in text:
