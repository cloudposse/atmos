commands:
  - name: casts
    description: Generate published website asciicast demos
    commands:
      - name: setup
        description: Prepare isolated fixtures and build the local Atmos binary
        steps:
          - type: workdir
            name: native-terraform-fixture
            source: demo/casts/fixtures/native-terraform
            path: .context/cast-fixtures/native-terraform
            reset: true

          - type: workdir
            name: demo-vendoring-fixture
            source: demo/casts/fixtures/demo-vendoring
            path: .context/cast-fixtures/demo-vendoring
            reset: true

          - type: workdir
            name: basic-fixture
            source: demo/casts/fixtures/basic
            path: .context/cast-fixtures/basic
            reset: true

          - type: workdir
            name: emulator-aws-fixture
            source: examples/emulator-aws
            path: .context/cast-fixtures/emulator-aws
            reset: true

          - type: shell
            name: isolate-xdg-state
            command: |
              rm -rf .context/cast-xdg
              mkdir -p .context/cast-xdg/config .context/cast-xdg/cache .context/cast-xdg/data
              : > .context/cast-terraformrc

          - type: shell
            name: build-atmos
            env:
              GOBIN: "{{ .env.PWD }}/.context/bin"
            command: go install .

      - name: generate
        description: Regenerate committed website cast demos
        commands:
          - name: all
            description: Regenerate every committed website cast demo
            steps:
              - type: shell
                name: clean-casts
                command: rm -f website/static/casts/terraform/*.cast website/static/casts/vendor/*.cast website/static/casts/cli/*.cast website/static/casts/emulator/*.cast

              - type: atmos
                name: terraform-plan
                command: casts generate terraform-plan

              - type: atmos
                name: terraform-deploy
                command: casts generate terraform-deploy

              - type: atmos
                name: terraform-output
                command: casts generate terraform-output

              - type: atmos
                name: vendor-pull
                command: casts generate vendor-pull

              - type: atmos
                name: list-stacks
                command: casts generate list-stacks

              - type: atmos
                name: describe-component
                command: casts generate describe-component

              - type: atmos
                name: describe-stacks
                command: casts generate describe-stacks

              - type: atmos
                name: emulator-aws-lifecycle
                command: casts generate emulator-aws-lifecycle

              - type: atmos
                name: validate
                command: casts validate all

          - name: terraform-plan
            description: Regenerate the Terraform plan cast
            steps:
              - type: atmos
                name: setup
                command: casts setup
              - type: shell
                name: clean
                command: rm -f website/static/casts/terraform/plan.cast
              - type: cast
                name: terraform-plan
                command: atmos terraform plan vpc -s dev
                mode: steps
                width: 120
                height: 36
                working_directory: .context/cast-fixtures/native-terraform
                output:
                  cast: website/static/casts/terraform/plan.cast
                steps:
                  - type: shell
                    name: terraform-plan
                    tty: true
                    env: &force_color_env
                      TERM: xterm-256color
                      COLORTERM: truecolor
                      ATMOS_FORCE_COLOR: "1"
                      CLICOLOR_FORCE: "1"
                      FORCE_COLOR: "1"
                      ATMOS_FORCE_TTY: "true"
                      ATMOS_KEYRING_TYPE: memory
                      PATH: "{{ .env.PWD }}/.context/bin:{{ .env.PATH }}"
                      XDG_CONFIG_HOME: "{{ .env.PWD }}/.context/cast-xdg/config"
                      XDG_CACHE_HOME: "{{ .env.PWD }}/.context/cast-xdg/cache"
                      XDG_DATA_HOME: "{{ .env.PWD }}/.context/cast-xdg/data"
                      TF_CLI_CONFIG_FILE: "{{ .env.PWD }}/.context/cast-terraformrc"
                    command: atmos terraform plan vpc -s dev
              - type: atmos
                name: validate
                command: casts validate terraform-plan

          - name: terraform-deploy
            description: Regenerate the Terraform deploy cast
            steps:
              - type: atmos
                name: setup
                command: casts setup
              - type: shell
                name: clean
                command: rm -f website/static/casts/terraform/deploy.cast
              - type: cast
                name: terraform-deploy
                command: atmos terraform deploy vpc -s dev -auto-approve
                mode: steps
                width: 120
                height: 36
                working_directory: .context/cast-fixtures/native-terraform
                output:
                  cast: website/static/casts/terraform/deploy.cast
                steps:
                  - type: shell
                    name: terraform-deploy
                    tty: true
                    env: *force_color_env
                    command: atmos terraform deploy vpc -s dev -auto-approve
              - type: atmos
                name: validate
                command: casts validate terraform-deploy

          - name: terraform-output
            description: Regenerate the Terraform output cast
            steps:
              - type: atmos
                name: setup
                command: casts setup
              - type: shell
                name: prepare-state
                env: *force_color_env
                command: |
                  cd .context/cast-fixtures/native-terraform
                  atmos --logs-level Off terraform deploy vpc -s dev -auto-approve >/dev/null
              - type: shell
                name: clean
                command: rm -f website/static/casts/terraform/output.cast
              - type: cast
                name: terraform-output
                command: atmos terraform output vpc -s dev
                mode: steps
                width: 120
                height: 36
                working_directory: .context/cast-fixtures/native-terraform
                output:
                  cast: website/static/casts/terraform/output.cast
                steps:
                  - type: shell
                    name: terraform-output
                    tty: true
                    env: *force_color_env
                    command: atmos terraform output vpc -s dev
              - type: atmos
                name: validate
                command: casts validate terraform-output

          - name: vendor-pull
            description: Regenerate the vendor pull cast
            steps:
              - type: atmos
                name: setup
                command: casts setup
              - type: shell
                name: clean
                command: rm -f website/static/casts/vendor/pull.cast
              - type: cast
                name: vendor-pull
                command: atmos vendor pull --everything
                mode: steps
                width: 120
                height: 36
                working_directory: .context/cast-fixtures/demo-vendoring
                output:
                  cast: website/static/casts/vendor/pull.cast
                steps:
                  - type: shell
                    name: vendor-pull
                    tty: true
                    env: *force_color_env
                    command: atmos vendor pull --everything
              - type: atmos
                name: validate
                command: casts validate vendor-pull

          - name: list-stacks
            description: Regenerate the list stacks cast
            steps:
              - type: atmos
                name: setup
                command: casts setup
              - type: shell
                name: clean
                command: rm -f website/static/casts/cli/list-stacks.cast
              - type: cast
                name: list-stacks
                command: atmos list stacks --format tree
                mode: steps
                width: 120
                height: 36
                working_directory: .context/cast-fixtures/native-terraform
                output:
                  cast: website/static/casts/cli/list-stacks.cast
                steps:
                  - type: atmos
                    name: list-stacks
                    output: raw
                    env: *force_color_env
                    command: list stacks --format tree
              - type: atmos
                name: validate
                command: casts validate list-stacks

          - name: describe-component
            description: Regenerate the describe component cast
            steps:
              - type: atmos
                name: setup
                command: casts setup
              - type: shell
                name: clean
                command: rm -f website/static/casts/cli/describe-component.cast
              - type: cast
                name: describe-component
                command: atmos describe component vpc -s dev
                mode: steps
                width: 120
                height: 36
                working_directory: .context/cast-fixtures/native-terraform
                output:
                  cast: website/static/casts/cli/describe-component.cast
                steps:
                  - type: atmos
                    name: describe-component
                    output: raw
                    env: *force_color_env
                    command: describe component vpc -s dev
              - type: atmos
                name: validate
                command: casts validate describe-component

          - name: describe-stacks
            description: Regenerate the describe stacks cast
            steps:
              - type: atmos
                name: setup
                command: casts setup
              - type: shell
                name: clean
                command: rm -f website/static/casts/cli/describe-stacks.cast
              - type: cast
                name: describe-stacks
                command: atmos describe stacks --components mycomponent
                mode: steps
                width: 120
                height: 36
                working_directory: .context/cast-fixtures/basic
                output:
                  cast: website/static/casts/cli/describe-stacks.cast
                steps:
                  - type: atmos
                    name: describe-stacks
                    output: raw
                    env: *force_color_env
                    command: describe stacks --components mycomponent
              - type: atmos
                name: validate
                command: casts validate describe-stacks

          - name: emulator-aws-lifecycle
            description: Regenerate the AWS emulator lifecycle cast
            steps:
              - type: atmos
                name: setup
                command: casts setup
              - type: shell
                name: reset-stale-state
                env: *force_color_env
                command: |
                  cd .context/cast-fixtures/emulator-aws
                  atmos --logs-level Off emulator down aws -s dev >/dev/null 2>&1 || true
                  atmos --logs-level Off terraform reset >/dev/null 2>&1 || true
              - type: shell
                name: clean
                command: mkdir -p website/static/casts/emulator && rm -f website/static/casts/emulator/aws-lifecycle.cast
              - type: cast
                name: emulator-aws-lifecycle
                command: atmos emulator up aws -s dev --ephemeral
                mode: steps
                width: 120
                height: 36
                working_directory: .context/cast-fixtures/emulator-aws
                output:
                  cast: website/static/casts/emulator/aws-lifecycle.cast
                steps:
                  - type: shell
                    name: emulator-up
                    tty: true
                    env: *force_color_env
                    command: atmos emulator up aws -s dev --ephemeral
                  - type: shell
                    name: emulator-ps
                    tty: true
                    env: *force_color_env
                    command: atmos emulator ps aws -s dev
                  - type: shell
                    name: terraform-apply
                    tty: true
                    env: *force_color_env
                    command: atmos terraform apply demo -s dev -auto-approve
                  - type: shell
                    name: terraform-output
                    tty: true
                    env: *force_color_env
                    command: atmos terraform output demo -s dev
                  - type: shell
                    name: emulator-down
                    tty: true
                    env: *force_color_env
                    command: atmos emulator down aws -s dev
              - type: atmos
                name: validate
                command: casts validate emulator-aws-lifecycle

          - name: vendor-diff
            description: Reserved for a future vendor diff cast
            steps:
              - type: shell
                name: unavailable
                command: |
                  echo "atmos vendor diff is not registered in this branch yet." >&2
                  exit 1

      - name: validate
        description: Validate committed website cast demos
        commands:
          - name: all
            description: Validate every committed website cast demo
            steps:
              - type: atmos
                name: terraform-plan
                command: casts validate terraform-plan

              - type: atmos
                name: terraform-deploy
                command: casts validate terraform-deploy

              - type: atmos
                name: terraform-output
                command: casts validate terraform-output

              - type: atmos
                name: vendor-pull
                command: casts validate vendor-pull

              - type: atmos
                name: list-stacks
                command: casts validate list-stacks

              - type: atmos
                name: describe-component
                command: casts validate describe-component

              - type: atmos
                name: describe-stacks
                command: casts validate describe-stacks

              - type: atmos
                name: emulator-aws-lifecycle
                command: casts validate emulator-aws-lifecycle

          - name: terraform-plan
            description: Validate the Terraform plan cast
            steps:
              - type: shell
                name: validate
                command: |
                  python3 - <<'PY'
                  from pathlib import Path
                  text = Path("website/static/casts/terraform/plan.cast").read_text()
                  for needle in ["Terraform will perform the following actions", "Plan:", "vpc_cidr"]:
                      if needle not in text:
                          raise SystemExit(f"terraform plan cast missing {needle!r}")
                  for bad in ["# Error", "Incorrect Usage", "unknown flag", "panic", "not found"]:
                      if bad in text:
                          raise SystemExit(f"terraform plan cast contains {bad!r}")
                  PY

          - name: terraform-deploy
            description: Validate the Terraform deploy cast
            steps:
              - type: shell
                name: validate
                command: |
                  python3 - <<'PY'
                  from pathlib import Path
                  text = Path("website/static/casts/terraform/deploy.cast").read_text()
                  for needle in ["Apply complete!", "Resources: 1 added", "vpc_cidr"]:
                      if needle not in text:
                          raise SystemExit(f"terraform deploy cast missing {needle!r}")
                  for bad in ["# Error", "Incorrect Usage", "unknown flag", "panic", "not found"]:
                      if bad in text:
                          raise SystemExit(f"terraform deploy cast contains {bad!r}")
                  PY

          - name: terraform-output
            description: Validate the Terraform output cast
            steps:
              - type: shell
                name: validate
                command: |
                  python3 - <<'PY'
                  from pathlib import Path
                  text = Path("website/static/casts/terraform/output.cast").read_text()
                  for needle in ["environment =", "dev", "vpc_cidr", "10.0.0.0/16"]:
                      if needle not in text:
                          raise SystemExit(f"terraform output cast missing {needle!r}")
                  for bad in ["# Error", "Incorrect Usage", "unknown flag", "panic", "not found"]:
                      if bad in text:
                          raise SystemExit(f"terraform output cast contains {bad!r}")
                  PY

          - name: vendor-pull
            description: Validate the vendor pull cast
            steps:
              - type: shell
                name: validate
                command: |
                  python3 - <<'PY'
                  from pathlib import Path
                  text = Path("website/static/casts/vendor/pull.cast").read_text()
                  for needle in ["Vendoring from", "Pulling", "github/stargazers"]:
                      if needle not in text:
                          raise SystemExit(f"vendor pull cast missing {needle!r}")
                  for bad in ["# Error", "Incorrect Usage", "unknown flag", "panic", "--dry-run"]:
                      if bad in text:
                          raise SystemExit(f"vendor pull cast contains {bad!r}")
                  PY

          - name: list-stacks
            description: Validate the list stacks cast
            steps:
              - type: shell
                name: validate
                command: |
                  python3 - <<'PY'
                  from pathlib import Path
                  text = Path("website/static/casts/cli/list-stacks.cast").read_text()
                  for needle in ["Stacks", "dev", "production"]:
                      if needle not in text:
                          raise SystemExit(f"list stacks cast missing {needle!r}")
                  for bad in ["# Error", "Incorrect Usage", "unknown flag", "panic", "not found"]:
                      if bad in text:
                          raise SystemExit(f"list stacks cast contains {bad!r}")
                  PY

          - name: describe-component
            description: Validate the describe component cast
            steps:
              - type: shell
                name: validate
                command: |
                  python3 - <<'PY'
                  from pathlib import Path
                  text = Path("website/static/casts/cli/describe-component.cast").read_text()
                  for needle in ["component: vpc", "stack: dev", "cidr_block"]:
                      if needle not in text:
                          raise SystemExit(f"describe component cast missing {needle!r}")
                  for bad in ["# Error", "Incorrect Usage", "unknown flag", "panic", "not found"]:
                      if bad in text:
                          raise SystemExit(f"describe component cast contains {bad!r}")
                  PY

          - name: describe-stacks
            description: Validate the describe stacks cast
            steps:
              - type: shell
                name: validate
                command: |
                  python3 - <<'PY'
                  from pathlib import Path
                  text = Path("website/static/casts/cli/describe-stacks.cast").read_text()
                  for needle in ["nonprod", "prod", "mycomponent"]:
                      if needle not in text:
                          raise SystemExit(f"describe stacks cast missing {needle!r}")
                  for bad in ["# Error", "Incorrect Usage", "unknown flag", "panic", "not found"]:
                      if bad in text:
                          raise SystemExit(f"describe stacks cast contains {bad!r}")
                  PY

          - name: emulator-aws-lifecycle
            description: Validate the AWS emulator lifecycle cast
            steps:
              - type: shell
                name: validate
                command: |
                  python3 - <<'PY'
                  from pathlib import Path
                  text = Path("website/static/casts/emulator/aws-lifecycle.cast").read_text()
                  for needle in [
                      "emulator aws is up",
                      "floci/floci",
                      "running",
                      "Apply complete!",
                      "stage =",
                      "dev",
                      "emulator aws is down",
                  ]:
                      if needle not in text:
                          raise SystemExit(f"emulator aws lifecycle cast missing {needle!r}")
                  for bad in ["# Error", "Incorrect Usage", "unknown flag", "panic", "not found", "Error:", "WARN"]:
                      if bad in text:
                          raise SystemExit(f"emulator aws lifecycle cast contains {bad!r}")
                  PY
