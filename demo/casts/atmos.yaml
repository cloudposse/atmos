commands:
  - name: casts
    description: Generate published website asciicast demos
  - name: casts setup
    description: Prepare isolated fixtures and build the local Atmos binary
    env:
      GOBIN: '{{ env "PWD" }}/../../.context/bin'
    steps:
      - type: workdir
        name: native-terraform-fixture
        source: fixtures/native-terraform
        path: "../../.context/cast-fixtures/native-terraform"
        reset: true
      - type: workdir
        name: demo-vendoring-fixture
        source: fixtures/demo-vendoring
        path: "../../.context/cast-fixtures/demo-vendoring"
        reset: true
      - type: workdir
        name: basic-fixture
        source: fixtures/basic
        path: "../../.context/cast-fixtures/basic"
        reset: true
      - type: workdir
        name: emulator-aws-fixture
        source: "../../examples/emulator-aws"
        path: "../../.context/cast-fixtures/emulator-aws"
        reset: true
      - type: workdir
        name: quick-start-simple-fixture
        source: "../../examples/quick-start-simple"
        path: "../../.context/cast-fixtures/quick-start-simple"
        reset: true
      - type: workdir
        name: quick-start-advanced-fixture
        source: "../../examples/quick-start-advanced"
        path: "../../.context/cast-fixtures/quick-start-advanced"
        reset: true
      - type: workdir
        name: sops-secrets-fixture
        source: "../../examples/sops-secrets"
        path: "../../.context/cast-fixtures/sops-secrets"
        reset: true
      - type: workdir
        name: onepassword-secrets-fixture
        source: "../../examples/onepassword-secrets"
        path: "../../.context/cast-fixtures/onepassword-secrets"
        reset: true
      - type: workdir
        name: toolchain-fixture
        source: "../../examples/toolchain"
        path: "../../.context/cast-fixtures/toolchain"
        reset: true
      - type: workdir
        name: custom-commands-fixture
        source: "../../examples/custom-commands"
        path: "../../.context/cast-fixtures/custom-commands"
        reset: true
      - type: workdir
        name: demo-stacks-fixture
        source: "../../examples/demo-stacks"
        path: "../../.context/cast-fixtures/demo-stacks"
        reset: true
      - type: workdir
        name: locals-fixture
        source: "../../examples/locals"
        path: "../../.context/cast-fixtures/locals"
        reset: true
      - type: workdir
        name: demo-context-fixture
        source: "../../examples/demo-context"
        path: "../../.context/cast-fixtures/demo-context"
        reset: true
      - type: workdir
        name: demo-env-fixture
        source: "../../examples/demo-env"
        path: "../../.context/cast-fixtures/demo-env"
        reset: true
      - type: workdir
        name: stack-names-fixture
        source: "../../examples/stack-names"
        path: "../../.context/cast-fixtures/stack-names"
        reset: true
      - type: workdir
        name: demo-schemas-fixture
        source: "../../examples/demo-schemas"
        path: "../../.context/cast-fixtures/demo-schemas"
        reset: true
      - type: workdir
        name: custom-components-fixture
        source: "../../examples/custom-components"
        path: "../../.context/cast-fixtures/custom-components"
        reset: true
      - type: workdir
        name: demo-component-versions-fixture
        source: "../../examples/demo-component-versions"
        path: "../../.context/cast-fixtures/demo-component-versions"
        reset: true
      - type: workdir
        name: caching-fixture
        source: "../../examples/caching"
        path: "../../.context/cast-fixtures/caching"
        reset: true
      - type: workdir
        name: generate-files-fixture
        source: "../../examples/generate-files"
        path: "../../.context/cast-fixtures/generate-files"
        reset: true
      - type: workdir
        name: demo-workflows-fixture
        source: "../../examples/demo-workflows"
        path: "../../.context/cast-fixtures/demo-workflows"
        reset: true
      - type: workdir
        name: parallel-steps-fixture
        source: "../../examples/parallel-steps"
        path: "../../.context/cast-fixtures/parallel-steps"
        reset: true
      - type: workdir
        name: workflow-retries-fixture
        source: "../../examples/workflow-retries"
        path: "../../.context/cast-fixtures/workflow-retries"
        reset: true
      - type: workdir
        name: http-webhooks-fixture
        source: "../../examples/http-webhooks"
        path: "../../.context/cast-fixtures/http-webhooks"
        reset: true
      - type: workdir
        name: say-something-fixture
        source: "../../examples/say-something"
        path: "../../.context/cast-fixtures/say-something"
        reset: true
      - type: workdir
        name: demo-ansible-fixture
        source: "../../examples/demo-ansible"
        path: "../../.context/cast-fixtures/demo-ansible"
        reset: true
      - type: workdir
        name: demo-atlantis-fixture
        source: "../../examples/demo-atlantis"
        path: "../../.context/cast-fixtures/demo-atlantis"
        reset: true
      - type: workdir
        name: interactive-workflows-fixture
        source: "../../examples/interactive-workflows"
        path: "../../.context/cast-fixtures/interactive-workflows"
        reset: true
      - type: workdir
        name: secrets-masking-fixture
        source: "../../examples/secrets-masking"
        path: "../../.context/cast-fixtures/secrets-masking"
        reset: true
      - type: workdir
        name: remote-stack-imports-fixture
        source: "../../examples/remote-stack-imports"
        path: "../../.context/cast-fixtures/remote-stack-imports"
        reset: true
      - type: workdir
        name: demo-library-fixture
        source: "../../examples/demo-library"
        path: "../../.context/cast-fixtures/demo-library"
        reset: true
      - type: workdir
        name: source-provisioning-fixture
        source: "../../examples/source-provisioning"
        path: "../../.context/cast-fixtures/source-provisioning"
        reset: true
      - type: workdir
        name: config-profiles-fixture
        source: "../../examples/config-profiles"
        path: "../../.context/cast-fixtures/config-profiles"
        reset: true
      - type: workdir
        name: terraform-tests-fixture
        source: "../../examples/terraform-tests"
        path: "../../.context/cast-fixtures/terraform-tests"
        reset: true
      - type: workdir
        name: hooks-custom-command-fixture
        source: "../../examples/hooks-custom-command"
        path: "../../.context/cast-fixtures/hooks-custom-command"
        reset: true
      - type: shell
        name: build-atmos
        # CGO off to match the release build; with CGO on, transitive deps
        # like bearsh/hid need libudev headers that CI runners don't have.
        env:
          CGO_ENABLED: '0'
        command: go install ../..
