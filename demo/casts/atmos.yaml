commands:
  - name: casts
    description: Generate published website asciicast demos
    commands:
      - name: setup
        description: Prepare isolated fixtures and build the local Atmos binary
        steps:
          - type: workdir
            name: native-terraform-fixture
            source: demo/casts/fixtures/native-terraform
            path: .context/cast-fixtures/native-terraform
            reset: true

          - type: workdir
            name: demo-vendoring-fixture
            source: demo/casts/fixtures/demo-vendoring
            path: .context/cast-fixtures/demo-vendoring
            reset: true

          - type: workdir
            name: basic-fixture
            source: demo/casts/fixtures/basic
            path: .context/cast-fixtures/basic
            reset: true

          - type: shell
            name: build-atmos
            env:
              GOBIN: "{{ .env.PWD }}/.context/bin"
            command: go install .

      - name: generate
        description: Regenerate committed website cast demos
        commands:
          - name: all
            description: Regenerate every committed website cast demo
            steps:
              - type: atmos
                name: setup
                command: casts setup

              - type: shell
                name: clean-casts
                command: rm -f website/static/casts/terraform/*.cast website/static/casts/vendor/*.cast website/static/casts/cli/*.cast

              - type: cast
                name: terraform-plan
                mode: steps
                width: 120
                height: 36
                output:
                  cast: website/static/casts/terraform/plan.cast
                steps:
                  - type: shell
                    name: terraform-plan
                    working_directory: .context/cast-fixtures/native-terraform
                    tty: true
                    env: &force_color_env
                      TERM: xterm-256color
                      COLORTERM: truecolor
                      ATMOS_FORCE_COLOR: "1"
                      CLICOLOR_FORCE: "1"
                      FORCE_COLOR: "1"
                      ATMOS_CLI_CONFIG_PATH: "."
                      ATMOS_FORCE_TTY: "true"
                      PATH: "{{ .env.PWD }}/.context/bin:{{ .env.PATH }}"
                    command: atmos terraform plan vpc -s dev

              - type: cast
                name: terraform-deploy
                mode: steps
                width: 120
                height: 36
                output:
                  cast: website/static/casts/terraform/deploy.cast
                steps:
                  - type: shell
                    name: terraform-deploy
                    working_directory: .context/cast-fixtures/native-terraform
                    tty: true
                    env: *force_color_env
                    command: atmos terraform deploy vpc -s dev -auto-approve

              - type: cast
                name: terraform-output
                mode: steps
                width: 120
                height: 36
                output:
                  cast: website/static/casts/terraform/output.cast
                steps:
                  - type: shell
                    name: terraform-output
                    working_directory: .context/cast-fixtures/native-terraform
                    tty: true
                    env: *force_color_env
                    command: atmos terraform output vpc -s dev

              - type: cast
                name: vendor-pull
                mode: steps
                width: 120
                height: 36
                output:
                  cast: website/static/casts/vendor/pull.cast
                steps:
                  - type: shell
                    name: vendor-pull
                    working_directory: .context/cast-fixtures/demo-vendoring
                    tty: true
                    env: *force_color_env
                    command: atmos vendor pull --everything

              - type: cast
                name: list-stacks
                mode: steps
                width: 120
                height: 36
                output:
                  cast: website/static/casts/cli/list-stacks.cast
                steps:
                  - type: atmos
                    name: list-stacks
                    working_directory: .context/cast-fixtures/native-terraform
                    output: raw
                    env: *force_color_env
                    command: list stacks --format tree

              - type: cast
                name: describe-component
                mode: steps
                width: 120
                height: 36
                output:
                  cast: website/static/casts/cli/describe-component.cast
                steps:
                  - type: atmos
                    name: describe-component
                    working_directory: .context/cast-fixtures/native-terraform
                    output: raw
                    env: *force_color_env
                    command: describe component vpc -s dev

              - type: cast
                name: describe-stacks
                mode: steps
                width: 120
                height: 36
                output:
                  cast: website/static/casts/cli/describe-stacks.cast
                steps:
                  - type: atmos
                    name: describe-stacks
                    working_directory: .context/cast-fixtures/basic
                    output: raw
                    env: *force_color_env
                    command: describe stacks --components mycomponent

              - type: shell
                name: verify-casts
                command: |
                  python3 - <<'PY'
                  from pathlib import Path

                  expected = [
                      "website/static/casts/terraform/plan.cast",
                      "website/static/casts/terraform/deploy.cast",
                      "website/static/casts/terraform/output.cast",
                      "website/static/casts/vendor/pull.cast",
                      "website/static/casts/cli/list-stacks.cast",
                      "website/static/casts/cli/describe-component.cast",
                      "website/static/casts/cli/describe-stacks.cast",
                  ]
                  missing = [path for path in expected if not Path(path).exists()]
                  if missing:
                      raise SystemExit(f"missing cast files: {missing}")

                  vendor = Path("website/static/casts/vendor/pull.cast").read_text()
                  if "Pulling" not in vendor:
                      raise SystemExit("vendor cast did not capture spinner/progress output")
                  if "--dry-run" in vendor:
                      raise SystemExit("vendor cast must use real vendoring output, not dry-run")
                  PY

          - name: terraform-plan
            description: Regenerate the Terraform plan cast
            steps:
              - type: atmos
                name: setup
                command: casts setup
              - type: shell
                name: clean
                command: rm -f website/static/casts/terraform/plan.cast
              - type: cast
                name: terraform-plan
                mode: steps
                width: 120
                height: 36
                output:
                  cast: website/static/casts/terraform/plan.cast
                steps:
                  - type: shell
                    name: terraform-plan
                    working_directory: .context/cast-fixtures/native-terraform
                    tty: true
                    env: *force_color_env
                    command: atmos terraform plan vpc -s dev

          - name: terraform-deploy
            description: Regenerate the Terraform deploy cast
            steps:
              - type: atmos
                name: setup
                command: casts setup
              - type: shell
                name: clean
                command: rm -f website/static/casts/terraform/deploy.cast
              - type: cast
                name: terraform-deploy
                mode: steps
                width: 120
                height: 36
                output:
                  cast: website/static/casts/terraform/deploy.cast
                steps:
                  - type: shell
                    name: terraform-deploy
                    working_directory: .context/cast-fixtures/native-terraform
                    tty: true
                    env: *force_color_env
                    command: atmos terraform deploy vpc -s dev -auto-approve

          - name: terraform-output
            description: Regenerate the Terraform output cast
            steps:
              - type: atmos
                name: setup
                command: casts setup
              - type: shell
                name: prepare-state
                working_directory: .context/cast-fixtures/native-terraform
                env: *force_color_env
                command: atmos --logs-level Off terraform deploy vpc -s dev -auto-approve >/dev/null
              - type: shell
                name: clean
                command: rm -f website/static/casts/terraform/output.cast
              - type: cast
                name: terraform-output
                mode: steps
                width: 120
                height: 36
                output:
                  cast: website/static/casts/terraform/output.cast
                steps:
                  - type: shell
                    name: terraform-output
                    working_directory: .context/cast-fixtures/native-terraform
                    tty: true
                    env: *force_color_env
                    command: atmos terraform output vpc -s dev

          - name: vendor-pull
            description: Regenerate the vendor pull cast
            steps:
              - type: atmos
                name: setup
                command: casts setup
              - type: shell
                name: clean
                command: rm -f website/static/casts/vendor/pull.cast
              - type: cast
                name: vendor-pull
                mode: steps
                width: 120
                height: 36
                output:
                  cast: website/static/casts/vendor/pull.cast
                steps:
                  - type: shell
                    name: vendor-pull
                    working_directory: .context/cast-fixtures/demo-vendoring
                    tty: true
                    env: *force_color_env
                    command: atmos vendor pull --everything

          - name: list-stacks
            description: Regenerate the list stacks cast
            steps:
              - type: atmos
                name: setup
                command: casts setup
              - type: shell
                name: clean
                command: rm -f website/static/casts/cli/list-stacks.cast
              - type: cast
                name: list-stacks
                mode: steps
                width: 120
                height: 36
                output:
                  cast: website/static/casts/cli/list-stacks.cast
                steps:
                  - type: atmos
                    name: list-stacks
                    working_directory: .context/cast-fixtures/native-terraform
                    output: raw
                    env: *force_color_env
                    command: list stacks --format tree

          - name: describe-component
            description: Regenerate the describe component cast
            steps:
              - type: atmos
                name: setup
                command: casts setup
              - type: shell
                name: clean
                command: rm -f website/static/casts/cli/describe-component.cast
              - type: cast
                name: describe-component
                mode: steps
                width: 120
                height: 36
                output:
                  cast: website/static/casts/cli/describe-component.cast
                steps:
                  - type: atmos
                    name: describe-component
                    working_directory: .context/cast-fixtures/native-terraform
                    output: raw
                    env: *force_color_env
                    command: describe component vpc -s dev

          - name: describe-stacks
            description: Regenerate the describe stacks cast
            steps:
              - type: atmos
                name: setup
                command: casts setup
              - type: shell
                name: clean
                command: rm -f website/static/casts/cli/describe-stacks.cast
              - type: cast
                name: describe-stacks
                mode: steps
                width: 120
                height: 36
                output:
                  cast: website/static/casts/cli/describe-stacks.cast
                steps:
                  - type: atmos
                    name: describe-stacks
                    working_directory: .context/cast-fixtures/basic
                    output: raw
                    env: *force_color_env
                    command: describe stacks --components mycomponent

          - name: vendor-diff
            description: Reserved for a future vendor diff cast
            steps:
              - type: shell
                name: unavailable
                command: |
                  echo "atmos vendor diff is not registered in this branch yet." >&2
                  exit 1
