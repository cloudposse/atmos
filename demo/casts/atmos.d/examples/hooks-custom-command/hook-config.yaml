commands:
  - name: casts generate examples hooks-custom-command hook-config
    description: Regenerate the Custom Command Hook example cast
    env: !include cast-defaults.yaml .env.command
    steps:
      - type: shell
        name: setup
        command: atmos casts setup
      - type: cast
        name: hook-config
        working_directory: "../../.context/cast-fixtures/hooks-custom-command"
        title: "Hooks: custom command hook contract"
        mode: steps
        defaults:
          cast: !include cast-defaults.yaml .cast
          simulate: !include cast-defaults.yaml .simulate
        env: !include cast-defaults.yaml .env.recording
        show:
          labels: false
        output:
          mode: raw
          cast: "../../website/static/casts/examples/hooks-custom-command/hook-config.cast"
        steps:
          - type: simulate
            text: "# inspect the hook attached to the demo component"
          - type: simulate
            text: &hook_cmd atmos describe component demo -s test --format yaml -q .hooks
          - type: shell
            name: hook-config
            duration: 450ms
            interval: 750ms
            command: *hook_cmd
          - type: simulate
            text: "# the hook script writes markdown to the Atmos output file"
          - type: simulate
            text: &script_cmd sed -n '1,90p' scripts/notify.py
          - type: shell
            name: hook-script
            duration: 450ms
            interval: 750ms
            command: *script_cmd
      - type: shell
        name: validate
        command: atmos casts validate examples hooks-custom-command hook-config
  - name: casts validate examples hooks-custom-command hook-config
    description: Validate the Custom Command Hook example cast
    steps:
      - type: script
        name: validate
        interpreter: python3
        script: |
          import os, sys
          sys.path.insert(0, os.getcwd())
          from cast_checks import load_text, strip_ansi, assert_no_experimental, assert_no_error_output, assert_no_local_paths
          text = load_text("../../website/static/casts/examples/hooks-custom-command/hook-config.cast")
          plain = strip_ansi(text)
          assert_no_experimental(text)
          for needle in ["-q .hooks", "notify:", "command: python3", "after.terraform.plan", "kind: command", "format: markdown", "ATMOS_OUTPUT_FILE", "custom-command demo"]:
              if needle not in plain:
                  raise SystemExit(f"hooks-custom-command cast missing {needle!r}")
          assert_no_error_output(text)
          assert_no_local_paths(text)
