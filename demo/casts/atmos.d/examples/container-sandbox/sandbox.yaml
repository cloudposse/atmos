commands:
  - name: casts generate examples container-sandbox sandbox
    description: Regenerate the Container Sandbox example cast
    env: !include cast-defaults.yaml .env.command
    steps:
      - type: shell
        name: setup
        command: atmos casts setup
      - type: cast
        name: sandbox
        working_directory: "../../.context/cast-fixtures/container-sandbox"
        title: "Container Sandbox: shared workflow container"
        mode: steps
        defaults:
          cast: !include cast-defaults.yaml .cast
          simulate: !include cast-defaults.yaml .simulate
        env: !include cast-defaults.yaml .env.recording
        show:
          labels: false
        output:
          mode: raw
          cast: "../../website/static/casts/examples/container-sandbox/sandbox.cast"
        steps:
          - type: simulate
            text: "# run the workflow inside one shared container sandbox"
          - type: simulate
            text: &cmd atmos workflow sandbox -f container-sandbox
          - type: shell
            name: sandbox
            duration: 650ms
            interval: 750ms
            command: *cmd
      - type: shell
        name: validate
        command: atmos casts validate examples container-sandbox sandbox
  - name: casts validate examples container-sandbox sandbox
    description: Validate the Container Sandbox example cast
    steps:
      - type: script
        name: validate
        interpreter: python3
        script: |
          import os, sys
          sys.path.insert(0, os.getcwd())
          from cast_checks import load_text, strip_ansi, assert_no_experimental, assert_no_error_output, assert_no_local_paths
          text = load_text("../../website/static/casts/examples/container-sandbox/sandbox.cast")
          plain = strip_ansi(text)
          assert_no_experimental(text)
          for needle in [
              "atmos workflow sandbox -f container-sandbox",
              "container context:",
              "created inside the workflow sandbox",
              "host step opted out of the workflow sandbox",
              "cleaned .sandbox",
          ]:
              if needle not in plain:
                  raise SystemExit(f"container-sandbox cast missing {needle!r}")
          assert_no_error_output(text)
          assert_no_local_paths(text)
