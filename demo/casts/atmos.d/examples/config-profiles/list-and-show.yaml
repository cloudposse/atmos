commands:
  - name: casts generate examples config-profiles list-and-show
    description: Regenerate the Config Profiles example cast
    env: !include cast-defaults.yaml .env.command
    steps:
      - type: shell
        name: setup
        command: atmos casts setup
      - type: cast
        name: list-and-show
        working_directory: "../../.context/cast-fixtures/config-profiles"
        title: "Config Profiles: list and inspect profile layers"
        mode: steps
        defaults:
          cast: !include cast-defaults.yaml .cast
          simulate: !include cast-defaults.yaml .simulate
        env: !include cast-defaults.yaml .env.recording
        show:
          labels: false
        output:
          mode: raw
          cast: "../../website/static/casts/examples/config-profiles/list-and-show.cast"
        steps:
          - type: simulate
            text: "# list project profiles"
          - type: simulate
            text: &list_cmd atmos profile list
          - type: shell
            name: list-profiles
            duration: 450ms
            interval: 750ms
            command: atmos profile list | sed "s#$(pwd)#.#g"
          - type: simulate
            text: "# inspect the developer profile files"
          - type: simulate
            text: &show_cmd atmos profile show developer
          - type: shell
            name: show-developer
            duration: 450ms
            interval: 750ms
            command: atmos profile show developer | sed "s#$(pwd)#.#g"
      - type: shell
        name: validate
        command: atmos casts validate examples config-profiles list-and-show
  - name: casts validate examples config-profiles list-and-show
    description: Validate the Config Profiles example cast
    steps:
      - type: script
        name: validate
        interpreter: python3
        script: |
          import os, sys
          sys.path.insert(0, os.getcwd())
          from cast_checks import load_text, strip_ansi, assert_no_experimental, assert_no_error_output, assert_no_local_paths
          text = load_text("../../website/static/casts/examples/config-profiles/list-and-show.cast")
          plain = strip_ansi(text)
          assert_no_experimental(text)
          for needle in ["atmos profile list", "developer", "production", "PROFILE: developer", "auth.yaml", "settings.yaml", "Use with: atmos --profile developer <command>"]:
              if needle not in plain:
                  raise SystemExit(f"config-profiles cast missing {needle!r}")
          assert_no_error_output(text)
          assert_no_local_paths(text)
