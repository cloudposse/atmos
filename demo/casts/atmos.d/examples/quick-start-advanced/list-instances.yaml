commands:
  - name: casts generate examples quick-start-advanced list-instances
    description: Regenerate the Quick Start Advanced example cast
    env: !include cast-defaults.yaml .env.command
    steps:
      - type: shell
        name: setup
        command: atmos casts setup
      - type: shell
        name: reset-stale-state
        working_directory: &quick_start_advanced_fixture "../../.context/cast-fixtures/quick-start-advanced"
        env: !include cast-defaults.yaml .env.recording
        output: none
        command: |
          atmos --logs-level=Off emulator down aws -s local || true
          atmos --logs-level=Off terraform reset || true
      - type: shell
        name: emulator-up
        working_directory: *quick_start_advanced_fixture
        env: !include cast-defaults.yaml .env.recording
        output: none
        command: atmos emulator up aws -s local --ephemeral
      - type: shell
        name: seed-secrets
        working_directory: *quick_start_advanced_fixture
        env: !include cast-defaults.yaml .env.recording
        output: none
        command: |
          atmos secret set API_KEY=sk-quickstart-example -s plat-ue2-dev -c app-config --force
          atmos secret set 'DB_CONFIG={"username":"app","password":"s3cr3t"}' -s plat-ue2-dev -c app-config --force
      - type: cast
        name: list-instances
        working_directory: *quick_start_advanced_fixture
        title: "Quick Start Advanced: list instances"
        mode: steps
        defaults:
          cast: !include cast-defaults.yaml .cast
          simulate: !include cast-defaults.yaml .simulate
        env: !include cast-defaults.yaml .env.recording
        show:
          labels: false
        output:
          mode: raw
          cast: "../../website/static/casts/examples/quick-start-advanced/list-instances.cast"
        steps:
          - type: simulate
            text: "# a small AWS application stack, entirely offline against a local AWS emulator"
          - type: simulate
            text: &list_stacks_cmd atmos list stacks --format=tree
          - type: shell
            name: list-stacks
            duration: 450ms
            interval: 750ms
            command: *list_stacks_cmd
          - type: simulate
            text: "# every component instance in the dev stack: s3, sqs, sns, dynamodb, kms"
          - type: simulate
            text: &list_instances_cmd atmos list instances --stack=plat-ue2-dev --format=tree
          - type: shell
            name: list-instances
            duration: 450ms
            interval: 750ms
            command: *list_instances_cmd
          - type: simulate
            text: "# every component carries metadata.tags/metadata.labels for bulk selection"
          - type: simulate
            text: &list_tags_cmd atmos list components --tags messaging
          - type: shell
            name: list-tags
            duration: 450ms
            interval: 750ms
            command: *list_tags_cmd
          - type: simulate
            text: "# --labels matches every key=value pair (AND); --tags matches any (OR)"
          - type: simulate
            text: &list_labels_cmd atmos list components --labels tier=foundational
          - type: shell
            name: list-labels
            duration: 450ms
            interval: 750ms
            command: *list_labels_cmd
          - type: simulate
            text: "# plan every component while upstream state is cold"
          - type: simulate
            text: &plan_all_cmd atmos terraform plan --all -s plat-ue2-dev
          - type: shell
            name: plan-all
            duration: 550ms
            interval: 900ms
            # A plan with changes exits 2. CI exit-code mapping accepts that
            # expected result without changing the user-facing command.
            env:
              ATMOS_CI_ENABLED: "true"
              # The security hook is covered by the example workflow; excluding it
              # here keeps this user-facing graph demo focused and deterministic.
              ATMOS_SKIP_HOOKS: security
            command: *plan_all_cmd
          - type: simulate
            text: "# deploy the whole component graph when the local AWS emulator is running"
          - type: simulate
            text: &deploy_all_cmd atmos terraform deploy --all -s plat-ue2-dev
          - type: shell
            name: deploy-all
            duration: 550ms
            interval: 900ms
            env:
              ATMOS_SKIP_HOOKS: security
            command: *deploy_all_cmd
      - type: script
        name: sanitize-cast-paths
        interpreter: python3
        script: |
          # `provision.workdir.enabled` logs the real source path when syncing
          # component files ("Local component files synced: <path>"), which is the
          # first thing an examples/* cast has ever captured that contains a
          # machine-specific absolute path (the type: cast step itself has no
          # built-in sanitization, unlike the screengrabs recorder). Rewrite it to
          # the same "/absolute/path/to/repo" placeholder cast_checks.assert_no_local_paths
          # requires, mirroring atmos.d/screengrabs/cli.yaml's sanitize_paths usage.
          import os, sys
          from pathlib import Path

          sys.path.insert(0, os.getcwd())
          from cast_checks import sanitize_paths

          out = Path("../../website/static/casts/examples/quick-start-advanced/list-instances.cast")
          # Script steps may inherit a fixture working directory. Derive the repo
          # root from the output location instead of assuming cwd is demo/casts.
          repo = next(parent.parent for parent in out.resolve().parents if parent.name == "website")
          out.write_text(sanitize_paths(out.read_text(), repo))
      - type: shell
        name: teardown
        working_directory: *quick_start_advanced_fixture
        env: !include cast-defaults.yaml .env.recording
        output: none
        when: always
        command: |
          atmos --logs-level=Off terraform destroy --all -s plat-ue2-dev -auto-approve || true
          atmos --logs-level=Off emulator down aws -s local || true
      - type: shell
        name: validate
        command: atmos casts validate examples quick-start-advanced list-instances
  - name: casts validate examples quick-start-advanced list-instances
    description: Validate the Quick Start Advanced example cast
    steps:
      - type: script
        name: validate
        interpreter: python3
        script: |
          import os, sys
          sys.path.insert(0, os.getcwd())
          from cast_checks import load_text, strip_ansi, assert_no_experimental, assert_body_color, assert_colored, assert_no_error_output, assert_no_local_paths
          text = load_text("../../website/static/casts/examples/quick-start-advanced/list-instances.cast")
          plain = strip_ansi(text)
          assert_no_experimental(text)
          assert_body_color(text)
          assert_colored(text, "plat-ue2-dev")
          for needle in ["Stacks", "Component Instances", "s3-bucket", "app-config", "sns-topic", "kms-key", "atmos list components --tags messaging", "atmos list components --labels tier=foundational"]:
              if needle not in plain:
                  raise SystemExit(f"list-instances cast missing {needle!r}")
          for bad in ["# Error", "Incorrect Usage", "unknown flag", "panic", "not found", "/Users/", "[list-stacks]", "[list-instances]", "completed"]:
              if bad in plain:
                  raise SystemExit(f"list-instances cast contains {bad!r}")
          assert_no_error_output(text)
          assert_no_local_paths(text)
