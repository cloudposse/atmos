commands:
  - name: casts generate examples secrets-masking masked-plan
    description: Regenerate the Secrets Masking example cast
    env: !include cast-defaults.yaml .env.command
    steps:
      - type: shell
        name: setup
        command: atmos casts setup
      - type: shell
        name: reset-terraform-workdir
        working_directory: &secrets_fixture "../../.context/cast-fixtures/secrets-masking"
        output: none
        command: rm -rf components/terraform/secrets-demo/.terraform components/terraform/secrets-demo/.terraform.lock.hcl components/terraform/secrets-demo/demo-dev-test-secrets-demo.terraform.tfvars.json
      - type: cast
        name: masked-plan
        working_directory: *secrets_fixture
        title: "Secrets Masking: redact Terraform plan output"
        mode: steps
        defaults:
          cast: !include cast-defaults.yaml .cast
          simulate: !include cast-defaults.yaml .simulate
        env: !include cast-defaults.yaml .env.recording
        show:
          labels: false
        output:
          mode: raw
          cast: "../../website/static/casts/examples/secrets-masking/masked-plan.cast"
        steps:
          - type: simulate
            text: "# custom mask patterns redact Terraform subprocess output"
          - type: simulate
            text: &plan_cmd atmos terraform plan secrets-demo -s demo-dev-test
          - type: shell
            name: masked-plan
            duration: 450ms
            interval: 750ms
            command: *plan_cmd
      - type: shell
        name: validate
        command: atmos casts validate examples secrets-masking masked-plan
  - name: casts validate examples secrets-masking masked-plan
    description: Validate the Secrets Masking example cast
    steps:
      - type: script
        name: validate
        interpreter: python3
        script: |
          import os, re, sys
          sys.path.insert(0, os.getcwd())
          from cast_checks import load_text, strip_ansi, assert_no_experimental, assert_no_error_output, assert_no_local_paths
          text = load_text("../../website/static/casts/examples/secrets-masking/masked-plan.cast")
          plain = strip_ansi(text)
          assert_no_experimental(text)
          for needle in [
              "atmos terraform plan secrets-demo -s demo-dev-test",
              '"custom_token"   = "[REDACTED]"',
              '"demo_api_key"   = "[REDACTED]"',
              '"internal_id"    = "[REDACTED]"',
              '"literal_secret" = "[REDACTED]"',
              '"plain_value"    = "this-is-not-a-secret"',
          ]:
              if needle not in plain:
                  raise SystemExit(f"secrets-masking cast missing {needle!r}")
          for bad in [
              "tkn_live_abcdefghijklmnopqrstuvwx",
              "demo-key-ABCD1234EFGH5678",
              "internal-0123456789abcdef0123456789abcdef",
              "super-secret-demo-value",
          ]:
              if bad in plain:
                  raise SystemExit(f"secrets-masking cast leaks {bad!r}")
          assert_no_error_output(text)
          assert_no_local_paths(text)
