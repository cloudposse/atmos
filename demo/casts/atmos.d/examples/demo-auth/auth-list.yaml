commands:
  - name: casts generate examples demo-auth auth-list
    description: Regenerate the Authentication example cast
    env: !include cast-defaults.yaml .env.command
    steps:
      - type: shell
        name: setup
        command: atmos casts setup
      - type: cast
        name: auth-list
        working_directory: "../../.context/cast-fixtures/demo-auth"
        title: "Authentication: list configured identities"
        mode: steps
        defaults:
          cast: !include cast-defaults.yaml .cast
          simulate: !include cast-defaults.yaml .simulate
        env: !include cast-defaults.yaml .env.recording
        show:
          labels: false
        output:
          mode: raw
          cast: "../../website/static/casts/examples/demo-auth/auth-list.cast"
        steps:
          - type: simulate
            text: "# list providers and identities without contacting real clouds"
          - type: simulate
            text: &cmd atmos auth list
          - type: shell
            name: auth-list
            duration: 450ms
            interval: 750ms
            command: *cmd
      - type: shell
        name: validate
        command: atmos casts validate examples demo-auth auth-list
  - name: casts validate examples demo-auth auth-list
    description: Validate the Authentication example cast
    steps:
      - type: script
        name: validate
        interpreter: python3
        script: |
          import os, sys
          sys.path.insert(0, os.getcwd())
          from cast_checks import load_text, strip_ansi, assert_no_experimental, assert_body_color, assert_no_error_output, assert_no_local_paths
          text = load_text("../../website/static/casts/examples/demo-auth/auth-list.cast")
          plain = strip_ansi(text)
          assert_no_experimental(text)
          assert_body_color(text)
          for needle in ["atmos auth list", "Authentication Configuration", "idp-acme-saml", "idp-acme-sso", "oidc", "superuser"]:
              if needle not in plain:
                  raise SystemExit(f"demo-auth cast missing {needle!r}")
          assert_no_error_output(text)
          assert_no_local_paths(text)
