commands:
  - name: casts generate examples demo-schemas validate
    description: Regenerate the Schema Validation example cast
    env: !include cast-defaults.yaml .env.command
    steps:
      - type: shell
        name: setup
        command: atmos casts setup
      - type: cast
        name: validate
        working_directory: "../../.context/cast-fixtures/demo-schemas"
        title: "Schema Validation: local, remote, and inline JSON Schemas"
        mode: steps
        defaults:
          cast: !include cast-defaults.yaml .cast
          simulate: !include cast-defaults.yaml .simulate
        env: !include cast-defaults.yaml .env.recording
        show:
          labels: false
        output:
          mode: raw
          cast: "../../website/static/casts/examples/demo-schemas/validate.cast"
        steps:
          - type: simulate
            text: "# validate local, remote, and inline schemas"
          - type: simulate
            text: &validate_cmd atmos validate schema
          - type: shell
            name: validate-schema
            duration: 550ms
            interval: 900ms
            command: *validate_cmd
      - type: shell
        name: validate
        command: atmos casts validate examples demo-schemas validate
  - name: casts validate examples demo-schemas validate
    description: Validate the Schema Validation example cast
    steps:
      - type: script
        name: validate
        interpreter: python3
        script: |
          import os, sys
          sys.path.insert(0, os.getcwd())
          from cast_checks import load_text, strip_ansi, assert_no_experimental, assert_body_color, assert_no_error_output, assert_no_local_paths
          text = load_text("../../website/static/casts/examples/demo-schemas/validate.cast")
          plain = strip_ansi(text)
          assert_no_experimental(text)
          assert_body_color(text)
          for needle in [
              "# validate local, remote, and inline schemas",
              "atmos validate schema",
              "Validated bower.yaml",
              "Validated config.yaml",
              "Validated inline.yaml",
              "All schemas validated successfully",
          ]:
              if needle not in plain:
                  raise SystemExit(f"validate cast missing {needle!r}")
          for bad in ["# Error", "Incorrect Usage", "unknown flag", "panic", "[validate-schema]", "completed"]:
              if bad in plain:
                  raise SystemExit(f"validate cast contains {bad!r}")
          assert_no_error_output(text)
          assert_no_local_paths(text)
