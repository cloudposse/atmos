commands:
  - name: casts generate examples demo-ansible dry-run
    description: Regenerate the Ansible example cast
    env: !include cast-defaults.yaml .env.command
    steps:
      - type: shell
        name: setup
        command: atmos casts setup
      - type: cast
        name: dry-run
        working_directory: "../../.context/cast-fixtures/demo-ansible"
        title: "Ansible: inspect the generated playbook command"
        mode: steps
        defaults:
          cast: !include cast-defaults.yaml .cast
          simulate: !include cast-defaults.yaml .simulate
        env: !include cast-defaults.yaml .env.recording
        show:
          labels: false
        output:
          mode: raw
          cast: "../../website/static/casts/examples/demo-ansible/dry-run.cast"
        steps:
          - type: simulate
            text: "# dry run shows the ansible-playbook invocation with stack vars"
          - type: simulate
            text: &ansible_cmd atmos ansible playbook hello-world -s dev --dry-run
          - type: shell
            name: ansible-dry-run
            duration: 450ms
            interval: 750ms
            command: atmos ansible playbook hello-world -s dev --dry-run | sed "s#$(pwd)#.#g"
      - type: shell
        name: validate
        command: atmos casts validate examples demo-ansible dry-run
  - name: casts validate examples demo-ansible dry-run
    description: Validate the Ansible example cast
    steps:
      - type: script
        name: validate
        interpreter: python3
        script: |
          import os, sys
          sys.path.insert(0, os.getcwd())
          from cast_checks import load_text, strip_ansi, assert_no_experimental, assert_no_error_output, assert_no_local_paths
          text = load_text("../../website/static/casts/examples/demo-ansible/dry-run.cast")
          plain = strip_ansi(text)
          assert_no_experimental(text)
          for needle in [
              "atmos ansible playbook hello-world -s dev --dry-run",
              "ansible-playbook",
              "--extra-vars @./components/ansible/hello-world/dev-hello-world.ansible.vars.yaml",
              "-i inventory.ini site.yml",
          ]:
              if needle not in plain:
                  raise SystemExit(f"demo-ansible cast missing {needle!r}")
          assert_no_error_output(text)
          assert_no_local_paths(text)
