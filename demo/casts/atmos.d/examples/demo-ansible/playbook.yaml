commands:
  - name: casts generate examples demo-ansible playbook
    description: Regenerate the Ansible example cast
    env: !include cast-defaults.yaml .env.command
    steps:
      - type: shell
        name: setup
        command: atmos casts setup
      - type: cast
        name: playbook
        working_directory: "../../.context/cast-fixtures/demo-ansible"
        title: "Ansible: run a playbook with stack vars"
        mode: steps
        defaults:
          cast: !include cast-defaults.yaml .cast
          simulate: !include cast-defaults.yaml .simulate
        env:
          NO_COLOR: ''
          TERM: xterm-256color
          COLORTERM: truecolor
          ATMOS_FORCE_COLOR: '1'
          CLICOLOR_FORCE: '1'
          FORCE_COLOR: '1'
          ATMOS_FORCE_TTY: 'true'
          ATMOS_KEYRING_TYPE: memory
          ATMOS_EXPERIMENTAL: silence
          ATMOS_LOGS_LEVEL: Warning
          ANSIBLE_FORCE_COLOR: '1'
        show:
          labels: false
        output:
          mode: raw
          cast: "../../website/static/casts/examples/demo-ansible/playbook.cast"
        steps:
          - type: simulate
            text: "# run the playbook with dev stack variables"
          - type: simulate
            text: &ansible_cmd atmos ansible playbook hello-world -s dev
          - type: shell
            name: ansible-playbook
            duration: 650ms
            interval: 750ms
            command: *ansible_cmd
      - type: shell
        name: validate
        command: atmos casts validate examples demo-ansible playbook
  - name: casts validate examples demo-ansible playbook
    description: Validate the Ansible example cast
    steps:
      - type: script
        name: validate
        interpreter: python3
        script: |
          import os, sys
          sys.path.insert(0, os.getcwd())
          from cast_checks import load_text, strip_ansi, assert_no_experimental, assert_body_color, assert_no_error_output, assert_no_local_paths
          text = load_text("../../website/static/casts/examples/demo-ansible/playbook.cast")
          plain = strip_ansi(text)
          assert_no_experimental(text)
          assert_body_color(text)
          for needle in [
              "atmos ansible playbook hello-world -s dev",
              "TASK [Say hello]",
              "Hello from my-app (version 1.0.0-dev) on port 8080",
              "PLAY RECAP",
              "failed=0",
          ]:
              if needle not in plain:
                  raise SystemExit(f"demo-ansible cast missing {needle!r}")
          for bad in ["--dry-run", "ansible-playbook --extra-vars"]:
              if bad in plain:
                  raise SystemExit(f"demo-ansible cast contains {bad!r}")
          assert_no_error_output(text)
          assert_no_local_paths(text)
