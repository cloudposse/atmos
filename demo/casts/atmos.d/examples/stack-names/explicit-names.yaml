commands:
  - name: casts generate examples stack-names explicit-names
    description: Regenerate the Stack Names example cast
    env: !include cast-defaults.yaml .env.command
    steps:
      - type: shell
        name: setup
        command: atmos casts setup
      - type: cast
        name: explicit-names
        working_directory: "../../.context/cast-fixtures/stack-names"
        title: "Stack Names: explicit names beat filenames"
        mode: steps
        defaults:
          cast: !include cast-defaults.yaml .cast
          simulate: !include cast-defaults.yaml .simulate
        env: !include cast-defaults.yaml .env.recording
        show:
          labels: false
        output:
          mode: raw
          cast: "../../website/static/casts/examples/stack-names/explicit-names.cast"
        steps:
          - type: simulate
            text: "# prod.yaml sets `name: production` - the explicit name wins over the filename"
          - type: simulate
            text: &list_stacks_cmd atmos list stacks
          - type: shell
            name: list-stacks
            duration: 450ms
            interval: 750ms
            command: *list_stacks_cmd
          - type: simulate
            text: "# the canonical name is what you pass to -s"
          - type: simulate
            text: &plan_cmd atmos terraform plan mock -s production
          - type: shell
            name: plan-production
            duration: 550ms
            interval: 900ms
            command: *plan_cmd
      - type: shell
        name: validate
        command: atmos casts validate examples stack-names explicit-names
  - name: casts validate examples stack-names explicit-names
    description: Validate the Stack Names example cast
    steps:
      - type: script
        name: validate
        interpreter: python3
        script: |
          import os, sys
          sys.path.insert(0, os.getcwd())
          from cast_checks import load_text, strip_ansi, assert_no_experimental, assert_body_color, assert_no_error_output, assert_no_local_paths
          text = load_text("../../website/static/casts/examples/stack-names/explicit-names.cast")
          plain = strip_ansi(text)
          assert_no_experimental(text)
          assert_body_color(text)
          for needle in [
              "# prod.yaml sets `name: production` - the explicit name wins over the filename",
              "atmos list stacks",
              "production",
              "atmos terraform plan mock -s production",
              "Hello from production",
              "Changes to Outputs",
          ]:
              if needle not in plain:
                  raise SystemExit(f"explicit-names cast missing {needle!r}")
          for bad in ["# Error", "Incorrect Usage", "unknown flag", "panic", "[list-stacks]", "completed"]:
              if bad in plain:
                  raise SystemExit(f"explicit-names cast contains {bad!r}")
          assert_no_error_output(text)
          assert_no_local_paths(text)
