commands:
  - name: casts generate examples kustomize lifecycle
    description: Regenerate the Kustomize example cast
    env: !include cast-defaults.yaml .env.command
    steps:
      - type: shell
        name: setup
        command: atmos casts setup
      - type: cast
        name: lifecycle
        working_directory: "../../.context/cast-fixtures/kustomize"
        title: "Kustomize: apply overlays to a local emulator"
        mode: steps
        defaults:
          cast: !include cast-defaults.yaml .cast
          simulate: !include cast-defaults.yaml .simulate
        env: !include cast-defaults.yaml .env.recording
        show:
          labels: false
        output:
          mode: raw
          cast: "../../website/static/casts/examples/kustomize/lifecycle.cast"
        steps:
          - type: simulate
            text: "# bring up k3s, apply the overlay, then tear it down"
          - type: simulate
            text: &validate atmos validate stacks
          - type: shell
            name: validate
            duration: 650ms
            interval: 750ms
            command: *validate
          - type: simulate
            text: &up atmos emulator up kubernetes -s dev
          - type: shell
            name: up
            duration: 650ms
            interval: 750ms
            command: *up
          - type: simulate
            text: &render atmos kubernetes render demo -s dev --identity local-k3s
          - type: shell
            name: render
            duration: 650ms
            interval: 750ms
            command: *render
          - type: simulate
            text: &apply atmos kubernetes apply demo -s dev --identity local-k3s
          - type: shell
            name: apply
            duration: 650ms
            interval: 750ms
            command: *apply
          - type: simulate
            text: &diff atmos kubernetes diff demo -s dev --identity local-k3s
          - type: shell
            name: diff
            duration: 650ms
            interval: 750ms
            command: *diff
          - type: simulate
            text: &delete atmos kubernetes delete demo -s dev --identity local-k3s
          - type: shell
            name: delete
            duration: 650ms
            interval: 750ms
            command: *delete
          - type: simulate
            text: &down atmos emulator down kubernetes -s dev
          - type: shell
            name: down
            duration: 650ms
            interval: 750ms
            command: *down
      - type: shell
        name: validate
        command: atmos casts validate examples kustomize lifecycle
  - name: casts validate examples kustomize lifecycle
    description: Validate the Kustomize example cast
    steps:
      - type: script
        name: validate
        interpreter: python3
        script: |
          import os, sys
          sys.path.insert(0, os.getcwd())
          from cast_checks import load_text, strip_ansi, assert_no_experimental, assert_body_color, assert_no_error_output, assert_no_local_paths
          text = load_text("../../website/static/casts/examples/kustomize/lifecycle.cast")
          plain = strip_ansi(text).lower()
          assert_no_experimental(text)
          assert_body_color(text)
          for needle in [
              "atmos validate stacks",
              "atmos emulator up kubernetes -s dev",
              "atmos kubernetes render demo -s dev --identity local-k3s",
              "atmos kubernetes diff demo -s dev --identity local-k3s",
              "atmos kubernetes apply demo -s dev --identity local-k3s",
              "atmos kubernetes delete demo -s dev --identity local-k3s",
              "atmos emulator down kubernetes -s dev",
              "emulator kubernetes is up",
              "applied apps/v1/deployment",
              "applied v1/service",
              "emulator kubernetes is down",
          ]:
              if needle not in plain:
                  raise SystemExit(f"kustomize cast missing {needle!r}")
          if "atmos test" in plain:
              raise SystemExit("kustomize cast must not run atmos test")
          assert_no_error_output(text)
          assert_no_local_paths(text)
