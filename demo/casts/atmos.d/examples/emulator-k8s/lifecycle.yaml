commands:
  - name: casts generate examples emulator-k8s lifecycle
    description: Regenerate the Kubernetes Emulator example cast
    env: !include cast-defaults.yaml .env.command
    steps:
      - type: shell
        name: setup
        command: atmos casts setup
      - type: cast
        name: lifecycle
        working_directory: "../../.context/cast-fixtures/emulator-k8s"
        title: "Kubernetes Emulator: deploy into k3s"
        mode: steps
        defaults:
          cast: !include cast-defaults.yaml .cast
          simulate: !include cast-defaults.yaml .simulate
        env: !include cast-defaults.yaml .env.recording
        show:
          labels: false
        output:
          mode: raw
          cast: "../../website/static/casts/examples/emulator-k8s/lifecycle.cast"
        steps:
          - type: simulate
            text: "# run the emulator-backed Helmfile lifecycle"
          - type: simulate
            text: &validate atmos validate stacks
          - type: shell
            name: validate
            duration: 650ms
            interval: 750ms
            command: *validate
          - type: simulate
            text: &up atmos emulator up kubernetes -s local
          - type: shell
            name: up
            duration: 650ms
            interval: 750ms
            command: *up
          - type: simulate
            text: &apply atmos helmfile apply demo -s local
          - type: shell
            name: apply
            duration: 650ms
            interval: 750ms
            command: *apply
          - type: simulate
            text: &destroy atmos helmfile destroy demo -s local
          - type: shell
            name: destroy
            duration: 650ms
            interval: 750ms
            command: *destroy
          - type: simulate
            text: &down atmos emulator down kubernetes -s local
          - type: shell
            name: down
            duration: 650ms
            interval: 750ms
            command: *down
      - type: shell
        name: validate
        command: atmos casts validate examples emulator-k8s lifecycle
  - name: casts validate examples emulator-k8s lifecycle
    description: Validate the Kubernetes Emulator example cast
    steps:
      - type: script
        name: validate
        interpreter: python3
        script: |
          import os, sys
          sys.path.insert(0, os.getcwd())
          from cast_checks import load_text, strip_ansi, assert_no_experimental, assert_body_color, assert_no_error_output, assert_no_local_paths
          text = load_text("../../website/static/casts/examples/emulator-k8s/lifecycle.cast")
          plain = strip_ansi(text).lower()
          assert_no_experimental(text)
          assert_body_color(text)
          for needle in [
              "atmos validate stacks",
              "atmos emulator up kubernetes -s local",
              "atmos helmfile apply demo -s local",
              "atmos helmfile destroy demo -s local",
              "atmos emulator down kubernetes -s local",
              "emulator kubernetes is up",
              "helmfile",
              "emulator kubernetes is down",
          ]:
              if needle not in plain:
                  raise SystemExit(f"emulator-k8s cast missing {needle!r}")
          if "atmos test" in plain:
              raise SystemExit("emulator-k8s cast must not run atmos test")
          assert_no_error_output(text)
          assert_no_local_paths(text)
