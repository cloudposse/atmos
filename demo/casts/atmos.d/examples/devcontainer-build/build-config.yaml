commands:
  - name: casts generate examples devcontainer-build build-config
    description: Regenerate the Devcontainer Build example cast
    env: !include cast-defaults.yaml .env.command
    steps:
      - type: shell
        name: setup
        command: atmos casts setup
      - type: cast
        name: build-config
        working_directory: "../../.context/cast-fixtures/devcontainer-build"
        title: "Devcontainer: render custom Dockerfile build config"
        mode: steps
        defaults:
          cast: !include cast-defaults.yaml .cast
          simulate: !include cast-defaults.yaml .simulate
        env: !include cast-defaults.yaml .env.recording
        show:
          labels: false
        output:
          mode: raw
          cast: "../../website/static/casts/examples/devcontainer-build/build-config.cast"
        steps:
          - type: simulate
            text: "# inspect the custom Dockerfile build without building it"
          - type: simulate
            text: &cmd atmos devcontainer config geodesic
          - type: shell
            name: config
            duration: 450ms
            interval: 750ms
            command: *cmd
      - type: shell
        name: validate
        command: atmos casts validate examples devcontainer-build build-config
  - name: casts validate examples devcontainer-build build-config
    description: Validate the Devcontainer Build example cast
    steps:
      - type: script
        name: validate
        interpreter: python3
        script: |
          import os, sys
          sys.path.insert(0, os.getcwd())
          from cast_checks import load_text, strip_ansi, assert_no_experimental, assert_no_error_output, assert_no_local_paths
          text = load_text("../../website/static/casts/examples/devcontainer-build/build-config.cast")
          plain = strip_ansi(text)
          assert_no_experimental(text)
          for needle in ["atmos devcontainer config geodesic", "Build:", "Dockerfile: Dockerfile", "Context: .", "geodesic_version: latest", "Workspace Folder: /workspace"]:
              if needle not in plain:
                  raise SystemExit(f"devcontainer-build cast missing {needle!r}")
          assert_no_error_output(text)
          assert_no_local_paths(text)
