commands:
  - name: casts generate examples toolchain proxies
    description: Regenerate the Toolchain Proxies cast
    env: !include cast-defaults.yaml .env.command
    steps:
      - type: shell
        name: setup
        command: atmos casts setup
      - type: cast
        name: toolchain-proxies
        title: "atmos toolchain proxies"
        mode: steps
        shell: /bin/sh
        write_rate: 25ms
        key_interval: 250ms
        timeout: 60s
        defaults:
          cast: !include cast-defaults.yaml .cast
          simulate: !include cast-defaults.yaml .simulate
        env: !include cast-defaults.yaml .env.recording
        show:
          labels: false
        output:
          mode: raw
          cast: "../../website/static/casts/examples/toolchain/proxies.cast"
        steps:
          - type: simulate
            text: "# activate the project toolchain and its configured command proxies"
          - type: simulate
            text: &activate_proxy_cmd 'eval "$(atmos toolchain env)" && ls -d atmos.d'
          - type: shell
            name: activate-proxy
            command: *activate_proxy_cmd
          - type: simulate
            text: "# ls is the pinned uutils/coreutils implementation, invoked by its familiar name"
      - type: shell
        name: validate
        command: atmos casts validate examples toolchain proxies
  - name: casts validate examples toolchain proxies
    description: Validate the Toolchain Proxies cast
    steps:
      - type: script
        name: validate
        interpreter: python3
        script: |
          import os, sys
          sys.path.insert(0, os.getcwd())
          from cast_checks import load_text, strip_ansi, assert_no_error_output, assert_no_experimental, assert_no_local_paths
          text = load_text("../../website/static/casts/examples/toolchain/proxies.cast")
          plain = strip_ansi(text)
          assert_no_experimental(text)
          for needle in [
              "# activate the project toolchain and its configured command proxies",
              'eval "$(atmos toolchain env)"',
              "ls -d atmos.d",
              "atmos.d",
              "# ls is the pinned uutils/coreutils implementation",
          ]:
              if needle not in plain:
                  raise SystemExit(f"toolchain proxies cast missing {needle!r}")
          for bad in ["# Error", "Incorrect Usage", "unknown flag", "panic", "not found", "/Users/"]:
              if bad in plain:
                  raise SystemExit(f"toolchain proxies cast contains {bad!r}")
          assert_no_error_output(text)
          assert_no_local_paths(text)
