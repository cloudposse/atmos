commands:
  - name: casts generate examples quick-start-simple list-and-plan
    description: Regenerate the Quick Start Simple example cast
    env: !include cast-defaults.yaml .env.command
    steps:
      - type: shell
        name: setup
        command: atmos casts setup
      - type: shell
        name: clean
        command: rm -f ../../website/static/casts/examples/quick-start-simple/list-and-plan.cast
      - type: cast
        name: list-and-plan
        working_directory: "../../.context/cast-fixtures/quick-start-simple"
        command: atmos terraform plan station -s dev
        mode: steps
        defaults:
          simulate: !include cast-defaults.yaml .simulate
        rate: 12ms
        width: 120
        height: 36
        env: !include cast-defaults.yaml .env.recording
        show:
          labels: false
        output:
          mode: raw
          cast: "../../website/static/casts/examples/quick-start-simple/list-and-plan.cast"
        steps:
          - type: simulate
            text: "# see the stacks in this quick start"
          - type: simulate
            text: &list_stacks_cmd atmos list stacks --format=tree
          - type: shell
            name: list-stacks
            duration: 450ms
            interval: 750ms
            command: *list_stacks_cmd
          - type: simulate
            text: "# station is a Terraform component instance in all three stacks"
          - type: simulate
            text: &list_components_cmd atmos list components
          - type: shell
            name: list-components
            duration: 450ms
            interval: 750ms
            command: *list_components_cmd
          - type: simulate
            text: "# plan the dev station instance"
          - type: simulate
            text: &terraform_plan_cmd atmos terraform plan station -s dev
          - type: shell
            name: terraform-plan
            duration: 550ms
            interval: 900ms
            command: *terraform_plan_cmd
      - type: shell
        name: validate
        command: atmos casts validate examples quick-start-simple list-and-plan
  - name: casts validate examples quick-start-simple list-and-plan
    description: Validate the Quick Start Simple example cast
    steps:
      - type: script
        name: validate
        interpreter: python3
        script: |
          import json
          from pathlib import Path
          raw = Path("../../website/static/casts/examples/quick-start-simple/list-and-plan.cast").read_text()
          rows = raw.splitlines()
          text = "".join(json.loads(line)[2] for line in rows[1:] if json.loads(line)[1] in ("o", "e"))
          for needle in [
              "# see the stacks in this quick start",
              "atmos list stacks --format=tree",
              "Stacks",
              "atmos list components",
              "station",
              "# plan the dev station instance",
              "atmos terraform plan station -s dev",
              "Terraform will perform the following actions",
              "local_file.cache",
              "https://wttr.in/Stockholm?0m",
              "lang=sv",
              "Plan:",
          ]:
              if needle not in text:
                  raise SystemExit(f"list-and-plan cast missing {needle!r}")
          if "\\u001b[" not in raw:
              raise SystemExit("list-and-plan cast is missing ANSI color sequences")
          for bad in ["# Error", "Incorrect Usage", "unknown flag", "panic", "not found", "/Users/", "[list-stacks]", "[list-components]", "completed"]:
              if bad in raw or bad in text:
                  raise SystemExit(f"list-and-plan cast contains {bad!r}")
