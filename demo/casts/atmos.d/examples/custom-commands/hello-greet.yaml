commands:
- name: casts
  commands:
  - name: generate
    commands:
    - name: examples
      commands:
      - name: custom-commands
        commands:
        - name: hello-greet
          description: Regenerate the Custom Commands example cast
          env:
            PATH: '{{ env "PWD" }}/../../.context/bin:{{ env "PATH" }}'
          steps:
          - type: shell
            name: setup
            command: atmos casts setup
          - type: shell
            name: clean
            command: rm -f ../../website/static/casts/examples/custom-commands/hello-greet.cast
          - type: cast
            name: hello-greet
            working_directory: "../../.context/cast-fixtures/custom-commands"
            command: atmos hello
            mode: steps
            width: 120
            height: 36
            output:
              cast: "../../website/static/casts/examples/custom-commands/hello-greet.cast"
            steps:
            - type: shell
              name: hello
              env: &1
                TERM: xterm-256color
                COLORTERM: truecolor
                ATMOS_FORCE_COLOR: '1'
                CLICOLOR_FORCE: '1'
                FORCE_COLOR: '1'
                ATMOS_FORCE_TTY: 'true'
                ATMOS_KEYRING_TYPE: memory
              command: atmos hello
            - type: shell
              name: greet
              env: *1
              command: atmos greet Alice
          - type: shell
            name: validate
            command: atmos casts validate examples custom-commands hello-greet
  - name: validate
    commands:
    - name: examples
      commands:
      - name: custom-commands
        commands:
        - name: hello-greet
          description: Validate the Custom Commands example cast
          steps:
          - type: script
            name: validate
            interpreter: python3
            script: |
              from pathlib import Path
              text = Path("../../website/static/casts/examples/custom-commands/hello-greet.cast").read_text()
              for needle in ["Hello world!", "Hello, Alice"]:
                  if needle not in text:
                      raise SystemExit(f"hello-greet cast missing {needle!r}")
              for bad in ["# Error", "Incorrect Usage", "unknown flag", "panic", "not found", "/Users/"]:
                  if bad in text:
                      raise SystemExit(f"hello-greet cast contains {bad!r}")
