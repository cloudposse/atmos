commands:
  - name: casts generate examples sops-secrets secret-lifecycle
    description: Regenerate the SOPS secrets example cast
    env: !include cast-defaults.yaml .env.command
    steps:
      - type: shell
        name: setup
        command: atmos casts setup
      - type: shell
        name: clean
        command: rm -f ../../website/static/casts/examples/sops-secrets/secret-lifecycle.cast
      - type: shell
        name: prepare-sops-secrets
        working_directory: &sops_secrets_fixture "../../.context/cast-fixtures/sops-secrets"
        output: none
        command: cp secrets/dev.enc.yaml secrets/dev.enc.yaml.cast.bak
      - type: cast
        name: secret-lifecycle
        working_directory: *sops_secrets_fixture
        command: atmos secret lifecycle api --stack=dev
        mode: steps
        defaults:
          cast: !include cast-defaults.yaml .cast
          simulate: !include cast-defaults.yaml .simulate
        env: !include cast-defaults.yaml .env.recording
        show:
          labels: false
        output:
          mode: raw
          cast: "../../website/static/casts/examples/sops-secrets/secret-lifecycle.cast"
        steps:
          - type: simulate
            text: &describe_secrets_cmd atmos describe component api --stack=dev --query='.secrets'
          - type: shell
            name: describe-secrets
            command: *describe_secrets_cmd
          - type: simulate
            text: &list_vars_cmd atmos list vars api --stack=dev
          - type: shell
            name: list-vars
            command: *list_vars_cmd
          - type: simulate
            text: &set_datadog_api_key_cmd atmos secret set DATADOG_API_KEY=dd-abc123secret --stack=dev --component=api
          - type: shell
            name: set-datadog-api-key
            command: *set_datadog_api_key_cmd
          - type: simulate
            text: &set_redis_url_cmd atmos secret set REDIS_URL=redis://prod:6379 --stack=dev --component=api
          - type: shell
            name: set-redis-url
            command: *set_redis_url_cmd
          - type: simulate
            text: &list_secrets_cmd atmos secret list --stack=dev --component=api
          - type: shell
            name: list-secrets
            command: *list_secrets_cmd
          - type: simulate
            text: &validate_secrets_cmd atmos secret validate --stack=dev --component=api
          - type: shell
            name: validate-secrets
            command: *validate_secrets_cmd
          - type: shell
            name: prepare-workspace
            output: none
            command: |
              atmos terraform workspace new api --stack=dev >/dev/null 2>&1 \
                || atmos terraform workspace select api --stack=dev >/dev/null 2>&1
          - type: simulate
            text: &deploy_api_cmd atmos terraform deploy api --stack=dev
          - type: shell
            name: deploy-api
            command: *deploy_api_cmd
          - type: simulate
            text: &output_api_cmd atmos terraform output api --stack=dev
          - type: shell
            name: output-api
            command: *output_api_cmd
      - type: shell
        name: destroy-api
        when: always
        working_directory: *sops_secrets_fixture
        output: none
        command: atmos terraform destroy api --stack=dev -auto-approve >/dev/null 2>&1 || true
      - type: shell
        name: clean-api
        when: always
        working_directory: *sops_secrets_fixture
        output: none
        command: atmos terraform clean api --stack=dev --everything --force >/dev/null 2>&1 || true
      - type: shell
        name: restore-secret-file
        when: always
        working_directory: *sops_secrets_fixture
        output: none
        command: mv -f secrets/dev.enc.yaml.cast.bak secrets/dev.enc.yaml
      - type: shell
        name: validate
        command: atmos casts validate examples sops-secrets secret-lifecycle
  - name: casts validate examples sops-secrets secret-lifecycle
    description: Validate the SOPS secrets example cast
    steps:
      - type: script
        name: validate
        interpreter: python3
        script: |
          import json
          from pathlib import Path
          raw = Path("../../website/static/casts/examples/sops-secrets/secret-lifecycle.cast").read_text()
          text = "".join(
              json.loads(line)[2]
              for line in raw.splitlines()[1:]
              if line and json.loads(line)[1] in ("o", "e")
          )
          for needle in [
              "atmos describe component api --stack=dev --query='.secrets'",
              "atmos list vars api --stack=dev",
              "atmos secret set DATADOG_API_KEY",
              "atmos secret set REDIS_URL",
              "atmos secret list --stack=dev --component=api",
              "atmos secret validate --stack=dev --component=api",
              "atmos terraform deploy api --stack=dev",
              "atmos terraform output api --stack=dev",
              "redis_url",
              "MASKED",
          ]:
              if needle not in text:
                  raise SystemExit(f"secret-lifecycle cast missing {needle!r}")
          if "\\u001b[" not in raw:
              raise SystemExit("secret-lifecycle cast is missing ANSI color sequences")
          for bad in [
              "# Error",
              "Incorrect Usage",
              "unknown flag",
              "panic",
              "UNEXPECTED",
              "/Users/",
              "[describe-masked]",
              "[describe-secrets]",
              "[list-vars]",
              "completed",
              "printf '> ",
              "grep -E",
              "workspace new api",
              "workspace select api",
          ]:
              if bad in raw or bad in text:
                  raise SystemExit(f"secret-lifecycle cast contains {bad!r}")
