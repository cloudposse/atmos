commands:
- name: casts
  commands:
  - name: generate
    commands:
    - name: examples
      commands:
      - name: sops-secrets
        commands:
        - name: secret-lifecycle
          description: Regenerate the SOPS secrets example cast
          env:
            PATH: '{{ env "PWD" }}/../../.context/bin:{{ env "PATH" }}'
          steps:
          - type: shell
            name: setup
            command: atmos casts setup
          - type: shell
            name: clean
            command: rm -f ../../website/static/casts/examples/sops-secrets/secret-lifecycle.cast
          - type: shell
            name: prepare-sops-secrets
            working_directory: "../../.context/cast-fixtures/sops-secrets"
            output: none
            command: 'cp secrets/dev.enc.yaml secrets/dev.enc.yaml.cast.bak

'
          - type: cast
            name: secret-lifecycle
            working_directory: "../../.context/cast-fixtures/sops-secrets"
            command: atmos secret lifecycle api --stack dev
            mode: steps
            width: 120
            height: 36
            env:
              TERM: xterm-256color
              COLORTERM: truecolor
              ATMOS_FORCE_COLOR: '1'
              CLICOLOR_FORCE: '1'
              FORCE_COLOR: '1'
              ATMOS_FORCE_TTY: 'true'
              ATMOS_KEYRING_TYPE: memory
              ATMOS_STACKS_BASE_PATH: stacks
              ATMOS_STACKS_INCLUDED_PATHS: deploy/**/*
              ATMOS_STACKS_EXCLUDED_PATHS: "**/_defaults.yaml"
            show:
              labels: false
            output:
              mode: raw
              cast: "../../website/static/casts/examples/sops-secrets/secret-lifecycle.cast"
            steps:
            - type: simulate
              mode: typed
              prompt: &1
                text: "> "
                style: command
              rate: 35ms
              text: atmos describe component api --stack dev --query '.secrets'
            - type: shell
              name: describe-secrets
              working_directory: "../../.context/cast-fixtures/sops-secrets"
              env: &2
                TERM: xterm-256color
                COLORTERM: truecolor
                ATMOS_FORCE_COLOR: '1'
                CLICOLOR_FORCE: '1'
                FORCE_COLOR: '1'
                ATMOS_FORCE_TTY: 'true'
                ATMOS_KEYRING_TYPE: memory
              command: atmos describe component api --stack dev --query '.secrets'
            - type: simulate
              mode: typed
              prompt: *1
              rate: 35ms
              text: atmos list vars api --stack dev
            - type: shell
              name: list-vars
              working_directory: "../../.context/cast-fixtures/sops-secrets"
              env: *2
              command: atmos list vars api --stack dev
            - type: simulate
              mode: typed
              prompt: *1
              rate: 35ms
              text: atmos secret set DATADOG_API_KEY=dd-abc123secret --stack dev --component
                api
            - type: shell
              name: set-datadog-api-key
              working_directory: "../../.context/cast-fixtures/sops-secrets"
              env: *2
              command: atmos secret set DATADOG_API_KEY=dd-abc123secret --stack dev
                --component api
            - type: simulate
              mode: typed
              prompt: *1
              rate: 35ms
              text: atmos secret set REDIS_URL=redis://prod:6379 --stack dev --component
                api
            - type: shell
              name: set-redis-url
              working_directory: "../../.context/cast-fixtures/sops-secrets"
              env: *2
              command: atmos secret set REDIS_URL=redis://prod:6379 --stack dev --component
                api
            - type: simulate
              mode: typed
              prompt: *1
              rate: 35ms
              text: atmos secret list --stack dev --component api
            - type: shell
              name: list-secrets
              working_directory: "../../.context/cast-fixtures/sops-secrets"
              env: *2
              command: atmos secret list --stack dev --component api
            - type: simulate
              mode: typed
              prompt: *1
              rate: 35ms
              text: atmos secret validate --stack dev --component api
            - type: shell
              name: validate-secrets
              working_directory: "../../.context/cast-fixtures/sops-secrets"
              env: *2
              command: atmos secret validate --stack dev --component api
            - type: shell
              name: prepare-workspace
              working_directory: "../../.context/cast-fixtures/sops-secrets"
              env: *2
              output: none
              command: |
                atmos terraform workspace new api --stack dev >/dev/null 2>&1 \
                  || atmos terraform workspace select api --stack dev >/dev/null 2>&1
            - type: simulate
              mode: typed
              prompt: *1
              rate: 35ms
              text: atmos terraform deploy api --stack dev
            - type: shell
              name: deploy-api
              working_directory: "../../.context/cast-fixtures/sops-secrets"
              env: *2
              command: atmos terraform deploy api --stack dev
            - type: simulate
              mode: typed
              prompt: *1
              rate: 35ms
              text: atmos terraform output api --stack dev
            - type: shell
              name: output-api
              working_directory: "../../.context/cast-fixtures/sops-secrets"
              env: *2
              command: atmos terraform output api --stack dev
          - type: shell
            name: cleanup-sops-secrets
            when: always
            working_directory: "../../.context/cast-fixtures/sops-secrets"
            output: none
            command: |
              set +e
              atmos terraform destroy api --stack dev -auto-approve >/dev/null 2>&1
              rm -rf components/terraform/api/.terraform components/terraform/api/.terraform.lock.hcl
              rm -rf components/terraform/api/terraform.tfstate components/terraform/api/terraform.tfstate.backup
              rm -rf components/terraform/api/terraform.tfstate.d components/terraform/api/.terraform.tfstate
              rm -f components/terraform/api/*.terraform.tfvars.json
              mv -f secrets/dev.enc.yaml.cast.bak secrets/dev.enc.yaml
          - type: shell
            name: validate
            command: atmos casts validate examples sops-secrets secret-lifecycle
  - name: validate
    commands:
    - name: examples
      commands:
      - name: sops-secrets
        commands:
        - name: secret-lifecycle
          description: Validate the SOPS secrets example cast
          steps:
          - type: script
            name: validate
            interpreter: python3
            script: |
              import json
              from pathlib import Path
              raw = Path("../../website/static/casts/examples/sops-secrets/secret-lifecycle.cast").read_text()
              text = "".join(
                  json.loads(line)[2]
                  for line in raw.splitlines()[1:]
                  if line and json.loads(line)[1] in ("o", "e")
              )
              for needle in [
                  "atmos describe component api --stack dev --query '.secrets'",
                  "atmos list vars api --stack dev",
                  "atmos secret set DATADOG_API_KEY",
                  "atmos secret set REDIS_URL",
                  "atmos secret list --stack dev --component api",
                  "atmos secret validate --stack dev --component api",
                  "atmos terraform deploy api --stack dev",
                  "atmos terraform output api --stack dev",
                  "redis_url",
                  "MASKED",
              ]:
                  if needle not in text:
                      raise SystemExit(f"secret-lifecycle cast missing {needle!r}")
              if "\\u001b[" not in raw:
                  raise SystemExit("secret-lifecycle cast is missing ANSI color sequences")
              for bad in [
                  "# Error",
                  "Incorrect Usage",
                  "unknown flag",
                  "panic",
                  "UNEXPECTED",
                  "/Users/",
                  "[describe-masked]",
                  "[describe-secrets]",
                  "[list-vars]",
                  "completed",
                  "printf '> ",
                  "grep -E",
                  "workspace new api",
                  "workspace select api",
              ]:
                  if bad in raw or bad in text:
                      raise SystemExit(f"secret-lifecycle cast contains {bad!r}")
