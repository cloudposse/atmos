commands:
  - name: casts generate examples demo-context name-template
    description: Regenerate the Configuration Context example cast
    env: !include cast-defaults.yaml .env.command
    steps:
      - type: shell
        name: setup
        command: atmos casts setup
      - type: cast
        name: name-template
        working_directory: "../../.context/cast-fixtures/demo-context"
        title: "Configuration Context: name templates from context values"
        mode: steps
        defaults:
          cast: !include cast-defaults.yaml .cast
          simulate: !include cast-defaults.yaml .simulate
        env: !include cast-defaults.yaml .env.recording
        show:
          labels: false
        output:
          mode: raw
          cast: "../../website/static/casts/examples/demo-context/name-template.cast"
        steps:
          - type: simulate
            text: "# stack names are computed from context values via a name template"
          - type: simulate
            text: &describe_config_cmd atmos describe config --format=yaml --query .stacks.name_template
          - type: shell
            name: describe-config
            duration: 450ms
            interval: 750ms
            command: *describe_config_cmd
          - type: simulate
            text: "# the template produces these stack names"
          - type: simulate
            text: &list_stacks_cmd atmos list stacks
          - type: shell
            name: list-stacks
            duration: 450ms
            interval: 750ms
            command: *list_stacks_cmd
          - type: simulate
            text: "# inspect the resolved component in one of them"
          - type: simulate
            text: &describe_component_cmd atmos describe component demo -s acme-west-dev --query .vars
          - type: shell
            name: describe-component
            duration: 450ms
            interval: 750ms
            command: *describe_component_cmd
      - type: shell
        name: validate
        command: atmos casts validate examples demo-context name-template
  - name: casts validate examples demo-context name-template
    description: Validate the Configuration Context example cast
    steps:
      - type: script
        name: validate
        interpreter: python3
        script: |
          import os, sys
          sys.path.insert(0, os.getcwd())
          from cast_checks import load_text, strip_ansi, assert_no_experimental, assert_body_color, assert_no_error_output, assert_no_local_paths
          text = load_text("../../website/static/casts/examples/demo-context/name-template.cast")
          plain = strip_ansi(text)
          assert_no_experimental(text)
          assert_body_color(text)
          name_template = chr(123) + chr(123) + ".providers.context.values.product" + chr(125) + chr(125)
          for needle in [
              "# stack names are computed from context values via a name template",
              "atmos describe config --format=yaml --query .stacks.name_template",
              name_template,
              "atmos list stacks",
              "acme-west-dev",
              "acme-west-prod",
              "acme-west-staging",
              "atmos describe component demo -s acme-west-dev --query .vars",
              "pet: dog",
          ]:
              if needle not in plain:
                  raise SystemExit(f"name-template cast missing {needle!r}")
          for bad in ["# Error", "Incorrect Usage", "unknown flag", "panic", "[describe-config]", "completed"]:
              if bad in plain:
                  raise SystemExit(f"name-template cast contains {bad!r}")
          assert_no_error_output(text)
          assert_no_local_paths(text)
