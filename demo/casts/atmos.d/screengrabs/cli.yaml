          commands = [line.strip() for line in COMMANDS.splitlines() if line.strip()]

          # Every manifest command must have a committed cast, and every cast
          # must be clean: no error output, no machine-specific paths, and
          # colored body output. (Help text may legitimately mention
          # "experimental", so the experimental assert does not apply here.)
          for command in commands:
              slug = command_slug(command)
              path = OUT / f"{slug}.cast"
              if not path.is_file():
                  raise SystemExit(f"screengrab cast missing for {command!r}: {path.name}")
              text = load_text(path)
              assert_no_error_output(text)
              assert_no_local_paths(text)
              assert_body_color(text)

          # Every cast referenced by the docs must exist so pages never embed
          # a broken player.
          referenced = set()
          for doc in (REPO / "website" / "docs").rglob("*.mdx"):
              referenced.update(
                  re.findall(r"casts/screengrabs/[A-Za-z0-9._-]+\.cast", doc.read_text())
              )
          for ref in sorted(referenced):
              if not (REPO / "website" / "static" / ref).is_file():
                  raise SystemExit(f"docs reference a missing cast: {ref}")
