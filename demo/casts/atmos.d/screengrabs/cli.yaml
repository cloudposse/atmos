          atmos ci cache delete --help
          atmos ci cache list --help
          atmos ci cache paths --help
          atmos ci cache restore --help
          atmos ci cache save --help
          atmos init --help
          atmos scaffold --help
          atmos scaffold list --help
          atmos scaffold validate --help
          atmos scaffold generate --help
          """
          FIXTURE = REPO / ".context" / "cast-fixtures" / "demo-stacks"
          OUT = REPO / "website" / "static" / "casts" / "screengrabs"

          # Screengrabs are recorded at the docs column width; COLUMNS drives
          # the help layout and ATMOS_CAST_RECORDING_* the cast header. The
          # pager stays off so output is captured, not paged.
          env = os.environ.copy()
          env.update({
              "COLUMNS": "90",
              "ATMOS_CAST_RECORDING_WIDTH": "90",
              "ATMOS_CAST_RECORDING_HEIGHT": "36",
              "ATMOS_PAGER": "false",
              "LESS": "-X",
          })

          commands = [line.strip() for line in COMMANDS.splitlines() if line.strip()]
          OUT.mkdir(parents=True, exist_ok=True)
          with tempfile.TemporaryDirectory() as tmpdir:
              for index, command in enumerate(commands, 1):
                  slug = command_slug(command)
                  tmp_cast = Path(tmpdir) / f"{slug}.cast"
                  argv = command.split() + [f"--cast={tmp_cast}"]
                  proc = subprocess.run(
                      argv, cwd=FIXTURE, env=env, capture_output=True, text=True
                  )
                  if proc.returncode != 0:
                      sys.stderr.write(proc.stdout + proc.stderr)
                      raise SystemExit(
                          f"screengrab command failed ({proc.returncode}): {command}"
                      )
                  # Sanitize machine-specific paths, then move into place so a
                  # failed run never leaves a partial cast behind.
                  raw = sanitize_paths(tmp_cast.read_text(), REPO)
                  tmp_cast.write_text(raw)
                  os.replace(tmp_cast, OUT / f"{slug}.cast")
                  print(f"[{index}/{len(commands)}] {slug}.cast")
