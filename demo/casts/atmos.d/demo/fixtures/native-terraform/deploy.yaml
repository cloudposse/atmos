commands:
  - name: casts generate demo fixtures native-terraform deploy
    description: Regenerate the Terraform deploy cast
    env: !include cast-defaults.yaml .env.command
    steps:
      - type: shell
        name: setup
        command: atmos casts setup
      - type: shell
        name: clean
        command: rm -f ../../website/static/casts/demo/fixtures/native-terraform/deploy.cast
      - type: cast
        name: deploy
        working_directory: "../../.context/cast-fixtures/native-terraform"
        command: atmos terraform deploy vpc -s dev -auto-approve
        mode: steps
        defaults:
          cast: !include cast-defaults.yaml .cast
          simulate: !include cast-defaults.yaml .simulate
        output:
          cast: "../../website/static/casts/demo/fixtures/native-terraform/deploy.cast"
        env: !include cast-defaults.yaml .env.recording
        steps:
          - type: shell
            name: deploy
            command: atmos terraform deploy vpc -s dev -auto-approve
      - type: shell
        name: validate
        command: atmos casts validate demo fixtures native-terraform deploy
  - name: casts validate demo fixtures native-terraform deploy
    description: Validate the Terraform deploy cast
    steps:
      - type: script
        name: validate
        interpreter: python3
        script: |
          from pathlib import Path
          text = Path("../../website/static/casts/demo/fixtures/native-terraform/deploy.cast").read_text()
          for needle in ["Apply complete!", "Resources: 1 added", "vpc_cidr"]:
              if needle not in text:
                  raise SystemExit(f"terraform deploy cast missing {needle!r}")
          for bad in ["# Error", "Incorrect Usage", "unknown flag", "panic", "not found"]:
              if bad in text:
                  raise SystemExit(f"terraform deploy cast contains {bad!r}")
