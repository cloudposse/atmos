commands:
  - name: casts generate demo fixtures native-terraform plan
    description: Regenerate the Terraform plan cast
    env: !include cast-defaults.yaml .env.command
    steps:
      - type: shell
        name: setup
        command: atmos casts setup
      - type: shell
        name: clean
        command: rm -f ../../website/static/casts/demo/fixtures/native-terraform/plan.cast
      - type: cast
        name: plan
        working_directory: "../../.context/cast-fixtures/native-terraform"
        command: atmos terraform plan vpc -s dev
        mode: steps
        defaults:
          cast: !include cast-defaults.yaml .cast
          simulate: !include cast-defaults.yaml .simulate
        output:
          cast: "../../website/static/casts/demo/fixtures/native-terraform/plan.cast"
        env: !include cast-defaults.yaml .env.recording
        steps:
          - type: shell
            name: plan
            command: atmos terraform plan vpc -s dev
      - type: shell
        name: validate
        command: atmos casts validate demo fixtures native-terraform plan
  - name: casts validate demo fixtures native-terraform plan
    description: Validate the Terraform plan cast
    steps:
      - type: script
        name: validate
        interpreter: python3
        script: |
          from pathlib import Path
          text = Path("../../website/static/casts/demo/fixtures/native-terraform/plan.cast").read_text()
          for needle in ["Terraform will perform the following actions", "Plan:", "vpc_cidr"]:
              if needle not in text:
                  raise SystemExit(f"terraform plan cast missing {needle!r}")
          for bad in ["# Error", "Incorrect Usage", "unknown flag", "panic", "not found"]:
              if bad in text:
                  raise SystemExit(f"terraform plan cast contains {bad!r}")
