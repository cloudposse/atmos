commands:
  - name: casts generate demo fixtures basic list-stacks
    description: Regenerate the list stacks cast
    env: !include cast-defaults.yaml .env.command
    steps:
      - type: shell
        name: setup
        command: atmos casts setup
      - type: cast
        name: list-stacks
        working_directory: "../../.context/cast-fixtures/native-terraform"
        title: atmos list stacks
        mode: steps
        defaults:
          cast: !include cast-defaults.yaml .cast
          simulate: !include cast-defaults.yaml .simulate
        show:
          labels: false
        output:
          cast: "../../website/static/casts/demo/fixtures/basic/list-stacks.cast"
        env: !include cast-defaults.yaml .env.recording
        steps:
          - type: shell
            name: list-stacks
            output: raw
            command: atmos list stacks --format=tree
      - type: shell
        name: validate
        command: atmos casts validate demo fixtures basic list-stacks
  - name: casts validate demo fixtures basic list-stacks
    description: Validate the list stacks cast
    steps:
      - type: script
        name: validate
        interpreter: python3
        script: |
          import os, sys
          sys.path.insert(0, os.getcwd())
          from cast_checks import load_text, strip_ansi, assert_body_color, assert_no_error_output, assert_no_local_paths
          decoded = load_text("../../website/static/casts/demo/fixtures/basic/list-stacks.cast")
          plain = strip_ansi(decoded)
          for needle in ["Stacks", "dev", "production"]:
              if needle not in plain:
                  raise SystemExit(f"list stacks cast missing {needle!r}")
          for bad in ["# Error", "Incorrect Usage", "unknown flag", "panic", "not found"]:
              if bad in plain:
                  raise SystemExit(f"list stacks cast contains {bad!r}")
          assert_body_color(decoded)
          assert_no_error_output(decoded)
          assert_no_local_paths(decoded)
