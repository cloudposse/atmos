commands:
  - name: casts generate demo fixtures basic describe-component
    description: Regenerate the describe component cast
    env: !include cast-defaults.yaml .env.command
    steps:
      - type: shell
        name: setup
        command: atmos casts setup
      - type: cast
        name: describe-component
        working_directory: "../../.context/cast-fixtures/native-terraform"
        title: atmos describe component
        mode: steps
        defaults:
          cast: !include cast-defaults.yaml .cast
          simulate: !include cast-defaults.yaml .simulate
        show:
          labels: false
        output:
          cast: "../../website/static/casts/demo/fixtures/basic/describe-component.cast"
        env: !include cast-defaults.yaml .env.recording
        steps:
          - type: shell
            name: describe-component
            output: raw
            command: atmos describe component vpc -s dev
      - type: script
        name: sanitize-runtime-paths
        interpreter: python3
        script: |
          from pathlib import Path

          path = Path("../../website/static/casts/demo/fixtures/basic/describe-component.cast")
          fixture = Path("../../.context/cast-fixtures/native-terraform").resolve()
          text = path.read_text()
          text = text.replace(str(fixture), ".")
          path.write_text(text)
          import os, sys
          sys.path.insert(0, os.getcwd())
          from cast_checks import load_text, assert_no_error_output, assert_no_local_paths
          decoded = load_text("../../website/static/casts/demo/fixtures/basic/describe-component.cast")
          assert_no_error_output(decoded)
          assert_no_local_paths(decoded)
      - type: shell
        name: validate
        command: atmos casts validate demo fixtures basic describe-component
  - name: casts validate demo fixtures basic describe-component
    description: Validate the describe component cast
    steps:
      - type: script
        name: validate
        interpreter: python3
        script: |
          import os, sys
          sys.path.insert(0, os.getcwd())
          from cast_checks import load_text, strip_ansi, assert_body_color, assert_no_error_output, assert_no_local_paths
          decoded = load_text("../../website/static/casts/demo/fixtures/basic/describe-component.cast")
          # Highlighted YAML puts SGR codes between keys and values, so match
          # needles against stripped text.
          plain = strip_ansi(decoded)
          for needle in ["component: vpc", "stack: dev", "cidr_block"]:
              if needle not in plain:
                  raise SystemExit(f"describe component cast missing {needle!r}")
          for bad in ["# Error", "Incorrect Usage", "unknown flag", "panic", "not found", "/Users/"]:
              if bad in plain:
                  raise SystemExit(f"describe component cast contains {bad!r}")
          assert_body_color(decoded)
          assert_no_error_output(decoded)
          assert_no_local_paths(decoded)
