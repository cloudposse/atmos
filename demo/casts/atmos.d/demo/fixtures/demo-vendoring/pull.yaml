commands:
  - name: casts generate demo fixtures demo-vendoring pull
    description: Regenerate the vendor pull cast
    env: !include cast-defaults.yaml .env.command
    steps:
      - type: shell
        name: setup
        command: atmos casts setup
      - type: shell
        name: clean
        command: rm -f ../../website/static/casts/demo/fixtures/demo-vendoring/pull.cast
      - type: cast
        name: pull
        working_directory: "../../.context/cast-fixtures/demo-vendoring"
        command: atmos vendor pull --everything
        mode: steps
        defaults:
          cast: !include cast-defaults.yaml .cast
          simulate: !include cast-defaults.yaml .simulate
        output:
          cast: "../../website/static/casts/demo/fixtures/demo-vendoring/pull.cast"
        env: !include cast-defaults.yaml .env.recording
        steps:
          - type: shell
            name: pull
            command: atmos vendor pull --everything
      - type: shell
        name: validate
        command: atmos casts validate demo fixtures demo-vendoring pull
  - name: casts validate demo fixtures demo-vendoring pull
    description: Validate the vendor pull cast
    steps:
      - type: script
        name: validate
        interpreter: python3
        script: |
          from pathlib import Path
          text = Path("../../website/static/casts/demo/fixtures/demo-vendoring/pull.cast").read_text()
          for needle in ["Vendoring from", "Vendored components success=3", "github/stargazers"]:
              if needle not in text:
                  raise SystemExit(f"vendor pull cast missing {needle!r}")
          for bad in ["# Error", "Incorrect Usage", "unknown flag", "panic"]:
              if bad in text:
                  raise SystemExit(f"vendor pull cast contains {bad!r}")
