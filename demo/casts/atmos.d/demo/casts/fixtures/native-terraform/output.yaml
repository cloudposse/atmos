commands:
- name: casts
  commands:
  - name: generate
    commands:
    - name: demo
      commands:
      - name: casts
        commands:
        - name: fixtures
          commands:
          - name: native-terraform
            commands:
            - name: output
              description: Regenerate the Terraform output cast
              env:
                PATH: '{{ env "PWD" }}/../../.context/bin:{{ env "PATH" }}'
              steps:
              - type: shell
                name: setup
                command: atmos casts setup
              - type: shell
                name: prepare-state
                working_directory: "../../.context/cast-fixtures/native-terraform"
                env: &1
                  TERM: xterm-256color
                  COLORTERM: truecolor
                  ATMOS_FORCE_COLOR: '1'
                  CLICOLOR_FORCE: '1'
                  FORCE_COLOR: '1'
                  ATMOS_FORCE_TTY: 'true'
                  ATMOS_KEYRING_TYPE: memory
                output: none
                command: atmos --logs-level Off terraform deploy vpc -s dev -auto-approve
              - type: shell
                name: clean
                command: rm -f ../../website/static/casts/demo/casts/fixtures/native-terraform/output.cast
              - type: cast
                name: output
                working_directory: "../../.context/cast-fixtures/native-terraform"
                command: atmos terraform output vpc -s dev
                mode: steps
                width: 120
                height: 36
                output:
                  cast: "../../website/static/casts/demo/casts/fixtures/native-terraform/output.cast"
                steps:
                - type: shell
                  name: output
                  working_directory: "../../.context/cast-fixtures/native-terraform"
                  env: *1
                  command: atmos terraform output vpc -s dev
              - type: shell
                name: validate
                command: atmos casts validate demo casts fixtures native-terraform
                  output
  - name: validate
    commands:
    - name: demo
      commands:
      - name: casts
        commands:
        - name: fixtures
          commands:
          - name: native-terraform
            commands:
            - name: output
              description: Validate the Terraform output cast
              steps:
              - type: script
                name: validate
                interpreter: python3
                script: |
                  from pathlib import Path
                  text = Path("../../website/static/casts/demo/casts/fixtures/native-terraform/output.cast").read_text()
                  for needle in ["environment =", "dev", "vpc_cidr", "10.0.0.0/16"]:
                      if needle not in text:
                          raise SystemExit(f"terraform output cast missing {needle!r}")
                  for bad in ["# Error", "Incorrect Usage", "unknown flag", "panic", "not found"]:
                      if bad in text:
                          raise SystemExit(f"terraform output cast contains {bad!r}")
