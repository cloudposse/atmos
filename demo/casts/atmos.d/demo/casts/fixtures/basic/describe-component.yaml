commands:
  - name: casts generate demo casts fixtures basic describe-component
    description: Regenerate the describe component cast
    env:
      PATH: '{{ env "PWD" }}/../../.context/bin:{{ env "PATH" }}'
    steps:
      - type: shell
        name: setup
        command: atmos casts setup
      - type: shell
        name: clean
        command: rm -f ../../website/static/casts/demo/casts/fixtures/basic/describe-component.cast
      - type: cast
        name: describe-component
        working_directory: "../../.context/cast-fixtures/native-terraform"
        command: atmos describe component vpc -s dev
        mode: steps
        defaults:
          simulate: !include cast-defaults.yaml .simulate
        rate: 12ms
        width: 120
        height: 36
        output:
          cast: "../../website/static/casts/demo/casts/fixtures/basic/describe-component.cast"
        env: !include cast-defaults.yaml .env
        steps:
          - type: shell
            name: describe-component
            output: raw
            command: atmos describe component vpc -s dev
      - type: shell
        name: validate
        command: atmos casts validate demo casts fixtures basic describe-component
  - name: casts validate demo casts fixtures basic describe-component
    description: Validate the describe component cast
    steps:
      - type: script
        name: validate
        interpreter: python3
        script: |
          from pathlib import Path
          text = Path("../../website/static/casts/demo/casts/fixtures/basic/describe-component.cast").read_text()
          for needle in ["component: vpc", "stack: dev", "cidr_block"]:
              if needle not in text:
                  raise SystemExit(f"describe component cast missing {needle!r}")
          for bad in ["# Error", "Incorrect Usage", "unknown flag", "panic", "not found"]:
              if bad in text:
                  raise SystemExit(f"describe component cast contains {bad!r}")
