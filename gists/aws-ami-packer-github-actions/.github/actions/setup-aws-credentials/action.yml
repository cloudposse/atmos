name: Setup AWS Credentials
description: Assume an AWS IAM role via GitHub OIDC (no long-lived secrets).

inputs:
  role-arn:
    description: ARN of the IAM role to assume via OIDC.
    required: true
  aws-region:
    description: AWS region.
    required: true
  role-session-name:
    description: Session name for the assumed role.
    required: false
    default: github-actions-ami-pipeline

runs:
  using: composite
  steps:
    # Short-lived credentials via OIDC. The IAM role must trust GitHub's OIDC
    # provider — see docs/oidc-trust-policy.json and the README for setup.
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.role-arn }}
        aws-region: ${{ inputs.aws-region }}
        role-session-name: ${{ inputs.role-session-name }}

    - name: Verify identity
      shell: bash
      run: aws sts get-caller-identity
