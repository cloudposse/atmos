<svg width="236" height="48" viewBox="0 0 236 48" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Powered by atmos CI</title>
  <desc id="desc">A compact Powered by atmos CI badge with an animated atmos gradient wordmark.</desc>
  <defs>
    <linearGradient id="badgeAccent" x1="26" y1="10" x2="216" y2="38" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#97f597">
        <animate attributeName="stop-color" values="#97f597;#2ec8ff;#583ce7;#23d5ab;#97f597" dur="15s" repeatCount="indefinite"/>
      </stop>
      <stop offset="0.5" stop-color="#2ec8ff">
        <animate attributeName="stop-color" values="#2ec8ff;#23d5ab;#97f597;#583ce7;#2ec8ff" dur="15s" repeatCount="indefinite"/>
      </stop>
      <stop offset="1" stop-color="#583ce7">
        <animate attributeName="stop-color" values="#583ce7;#97f597;#2ec8ff;#23d5ab;#583ce7" dur="15s" repeatCount="indefinite"/>
      </stop>
      <animateTransform attributeName="gradientTransform" type="translate" values="-45 0;45 0;-45 0" dur="15s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="badgeSurface" x1="0" y1="0" x2="236" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0d141d"/>
      <stop offset="1" stop-color="#050914"/>
    </linearGradient>
  </defs>
  <rect x="0.75" y="0.75" width="234.5" height="46.5" rx="12" fill="url(#badgeSurface)"/>
  <rect x="0.75" y="0.75" width="234.5" height="46.5" rx="12" fill="none" stroke="#ffffff" stroke-opacity="0.14" stroke-width="1.5"/>
  <text x="22" y="29" fill="#b7c2cc" font-family="Inter, Arial, Helvetica, sans-serif" font-size="12.5" font-weight="600" letter-spacing="0.2">Powered by</text>
  <text x="100" y="32" fill="url(#badgeAccent)" font-family="Inter, Arial, Helvetica, sans-serif" font-size="26" font-weight="800" letter-spacing="0">atmos</text>
  <rect x="183" y="13" width="28" height="21" rx="6" fill="url(#badgeAccent)" fill-opacity="0.14" stroke="url(#badgeAccent)" stroke-opacity="0.7"/>
  <text x="189" y="29" fill="#e8f0f7" font-family="Inter, Arial, Helvetica, sans-serif" font-size="13" font-weight="800" letter-spacing="0.45">CI</text>
</svg>
